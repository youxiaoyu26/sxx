<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ 魔法星星收集器 - D老师出品</title>
    <style>
        :root {
            --bg: #0a0a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none;
        }

        /* 星空背景 */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 游戏画布 */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 提示层 */
        .hint-layer {
            position: fixed;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            letter-spacing: 0.06em;
            text-align: center;
            pointer-events: none;
            animation: hintFloat 2.8s ease-in-out infinite;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
        }

        @keyframes hintFloat {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.7;
            }
            50% {
                transform: translateX(-50%) translateY(-7px);
                opacity: 1;
            }
        }

        /* 分数卡片 */
        .score-card {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.4);
        }

        .score-card .star-icon {
            font-size: 1.8rem;
            animation: spinStar 3s linear infinite;
        }

        @keyframes spinStar {
            0% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(90deg) scale(1.2);
            }
            50% {
                transform: rotate(180deg) scale(1);
            }
            75% {
                transform: rotate(270deg) scale(1.2);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .score-card .score-num {
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 60px;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0 0 15px rgba(255, 200, 0, 0.6));
        }

        .score-card .label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
        }

        /* 底部 */
        .footer {
            position: fixed;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .score-card {
                padding: 10px 22px;
                border-radius: 30px;
                bottom: 12%;
            }
            .score-card .star-icon {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <canvas class="stars-bg" id="starsBgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <div class="hint-layer">✨ 移动鼠标或手指，追逐星星 ✨</div>

    <div class="score-card">
        <span class="star-icon">⭐</span>
        <span class="score-num" id="scoreDisplay">0</span>
        <span class="label">颗星星</span>
    </div>

    <div class="footer">D老师的小收集 · 追星星会上瘾哦 🌟</div>

    <script>
        (function() {
            // ========== 星空背景 ==========
            const bgCanvas = document.getElementById('starsBgCanvas');
            const bgCtx = bgCanvas.getContext('2d');
            let bgStars = [];

            function resizeBg() {
                bgCanvas.width = window.innerWidth;
                bgCanvas.height = window.innerHeight;
                initBgStars();
            }

            function initBgStars() {
                bgStars = [];
                const count = 150;
                for (let i = 0; i < count; i++) {
                    bgStars.push({
                        x: Math.random() * bgCanvas.width,
                        y: Math.random() * bgCanvas.height,
                        r: Math.random() * 1.2 + 0.3,
                        alpha: Math.random() * 0.6 + 0.3,
                        speed: Math.random() * 0.01 + 0.004,
                        offset: Math.random() * Math.PI * 2,
                    });
                }
            }

            function drawBg(timestamp) {
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                for (const s of bgStars) {
                    const a = s.alpha + Math.sin(timestamp * s.speed + s.offset) * 0.35;
                    const ca = Math.max(0.05, Math.min(1, a));
                    bgCtx.beginPath();
                    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    bgCtx.fillStyle = `rgba(220,230,255,${ca})`;
                    bgCtx.fill();
                }
                requestAnimationFrame(drawBg);
            }

            resizeBg();
            window.addEventListener('resize', resizeBg);
            requestAnimationFrame(drawBg);

            // ========== 游戏主逻辑 ==========
            const gameCanvas = document.getElementById('gameCanvas');
            const ctx = gameCanvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');

            let score = 0;
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let playerX = mouseX;
            let playerY = mouseY;
            let playerRadius = 22;

            // 星星数组
            let stars = [];
            const MAX_STARS = 8;
            const STAR_RADIUS = 18;

            // 粒子数组
            let particles = [];

            // Web Audio
            let audioCtx = null;

            function getAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playCollectSound() {
                try {
                    const ctx = getAudio();
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } catch (e) {}
            }

            function resizeGame() {
                gameCanvas.width = window.innerWidth;
                gameCanvas.height = window.innerHeight;
                // 重新分布星星
                if (stars.length === 0) spawnStars();
            }

            function spawnStars() {
                while (stars.length < MAX_STARS) {
                    stars.push({
                        x: Math.random() * (gameCanvas.width - 80) + 40,
                        y: Math.random() * (gameCanvas.height - 80) + 40,
                        r: STAR_RADIUS,
                        angle: Math.random() * Math.PI * 2,
                        wobble: Math.random() * 0.03 + 0.01,
                        wobbleOffset: Math.random() * Math.PI * 2,
                    });
                }
            }

            function spawnParticles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: Math.random() * 0.03 + 0.02,
                        size: Math.random() * 4 + 2,
                        color: `hsl(${Math.random()*30+40}, 100%, 65%)`,
                    });
                }
            }

            // 初始化星星
            spawnStars();
            resizeGame();
            window.addEventListener('resize', () => {
                resizeGame();
                stars = [];
                spawnStars();
            });

            // ========== 输入跟踪 ==========
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }, { passive: false });

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            });

            // ========== 绘制函数 ==========
            function drawPlayer(x, y) {
                // 光晕
                const glowGrad = ctx.createRadialGradient(x, y, playerRadius * 0.3, x, y, playerRadius * 2.2);
                glowGrad.addColorStop(0, 'rgba(255,255,200,0.7)');
                glowGrad.addColorStop(0.4, 'rgba(255,200,100,0.3)');
                glowGrad.addColorStop(1, 'rgba(255,150,50,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(x, y, playerRadius * 2.2, 0, Math.PI * 2);
                ctx.fill();

                // 主体
                const bodyGrad = ctx.createRadialGradient(x - 5, y - 6, playerRadius * 0.1, x, y, playerRadius);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.35, '#ffeaa7');
                bodyGrad.addColorStop(1, '#fdcb6e');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.arc(x, y, playerRadius, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(x - 6, y - 8, playerRadius * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawStar(s) {
                const wobX = Math.sin(Date.now() * s.wobble + s.wobbleOffset) * 6;
                const wobY = Math.cos(Date.now() * s.wobble * 1.3 + s.wobbleOffset) * 6;
                const sx = s.x + wobX;
                const sy = s.y + wobY;

                // 星芒
                const spikes = 5;
                const outerR = s.r;
                const innerR = s.r * 0.45;
                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(s.angle);
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                const grad = ctx.createRadialGradient(0, 0, innerR * 0.5, 0, 0, outerR);
                grad.addColorStop(0, '#fffde7');
                grad.addColorStop(0.5, '#ffd54f');
                grad.addColorStop(1, '#ff8f00');
                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(255,200,50,0.9)';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();

                // 更新角度
                s.angle += 0.008;
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // ========== 碰撞检测 ==========
            function checkCollisions() {
                for (let i = stars.length - 1; i >= 0; i--) {
                    const s = stars[i];
                    const dx = playerX - s.x;
                    const dy = playerY - s.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < playerRadius + s.r) {
                        // 吃掉星星
                        score++;
                        scoreDisplay.textContent = score;
                        playCollectSound();
                        spawnParticles(s.x, s.y, 14);
                        stars.splice(i, 1);
                        // 补充星星
                        spawnStars();
                    }
                }
            }

            // ========== 游戏循环 ==========
            function update() {
                // 平滑追踪
                playerX += (mouseX - playerX) * 0.12;
                playerY += (mouseY - playerY) * 0.12;

                // 更新粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                checkCollisions();
            }

            function draw() {
                ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

                // 拖尾轨迹
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                ctx.beginPath();
                ctx.arc(playerX, playerY, playerRadius * 1.6, 0, Math.PI * 2);
                ctx.fill();

                // 绘制星星
                for (const s of stars) {
                    drawStar(s);
                }

                // 绘制粒子
                drawParticles();

                // 绘制玩家
                drawPlayer(playerX, playerY);
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            gameLoop();

            // 按 R 重置分数
            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'r') {
                    score = 0;
                    scoreDisplay.textContent = '0';
                    scoreDisplay.style.transform = 'scale(1.6)';
                    setTimeout(() => { scoreDisplay.style.transform = 'scale(1)'; }, 200);
                }
            });

            console.log('⭐ 魔法星星收集器已就绪！');
            console.log('   🖱️  移动鼠标追逐星星');
            console.log('   📱  手指滑动收集星星');
            console.log('   ⌨️  按 R 键重置分数');
            console.log('   🌟 D老师陪你收集星光~');
        })();
    </script>
</body>
</html>
