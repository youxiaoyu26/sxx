<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>壁纸库（示例）</title>
<style>
  :root{
    --bg:#0b1020;
    --card-alpha:0.4; /* 透明度 40% */
    --card-bg: rgba(255,255,255,var(--card-alpha));
    --card-bg-dark: rgba(10,14,22,var(--card-alpha));
    --muted:#9aa6c1;
    --accent:#60a5fa;
    --blur:60px; /* 模糊 60px */
    --text-light:#e6eef8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto;background:linear-gradient(180deg,#071024,#081427);color:var(--text-light);-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;padding:10px 12px;display:flex;gap:8px;align-items:center;z-index:20;margin:12px;background:rgba(255,255,255,0.02);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border-radius:12px}
  .brand{font-weight:700}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
  .select, .btn{background:rgba(255,255,255,calc(var(--card-alpha) - 0.05));border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:8px 10px;border-radius:8px}
  main{padding:8px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
  .card{position:relative;border-radius:8px;overflow:hidden;background:rgba(255,255,255,var(--card-alpha));backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));box-shadow:0 6px 18px rgba(2,6,23,0.45)}
  .card img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{position:absolute;left:8px;bottom:8px;right:8px;display:flex;justify-content:space-between;align-items:center;color:#07203a;font-size:13px}
  .icon-btn{background:rgba(8,12,18,0.15);border:none;color:var(--text-light);padding:6px;border-radius:8px;backdrop-filter:blur(calc(var(--blur) / 4));}
  .load-more{width:100%;padding:12px;border:none;background:var(--accent);color:#07203a;font-weight:700;border-radius:8px;margin:12px 8px;cursor:pointer}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:#111827;color:#fff;padding:8px 12px;border-radius:8px;display:none;z-index:60}
  .fav{color:#ffcc00}
  .modal{position:fixed;inset:0;background:rgba(2,6,23,0.6);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
  .modal .inner{max-width:960px;width:100%;background:rgba(255,255,255,var(--card-alpha));border-radius:10px;overflow:hidden;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur))}
  .modal .inner img{width:100%;height:auto;display:block}
  .modal .actions{display:flex;gap:8px;padding:10px;background:rgba(0,0,0,0.04)}
  @media(min-width:900px){ .grid{grid-template-columns:repeat(3,1fr)} }
  @media(min-width:1200px){ .grid{grid-template-columns:repeat(4,1fr)} }
</style>
</head>
<body>
<header>
  <div class="brand">壁纸库</div>
  <div class="controls">
    <select id="sort" class="select" title="排序">
      <option value="hot">按热度</option>
      <option value="new">最新</option>
    </select>
    <button id="modeBtn" class="btn">移动视图</button>
  </div>
</header>

<main>
  <div id="grid" class="grid" aria-live="polite"></div>
  <button id="loadMore" class="load-more">加载更多</button>
</main>

<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="inner">
    <img id="modalImg" alt="wallpaper"/>
    <div class="actions">
      <button id="downloadBtn" class="icon-btn">下载</button>
      <button id="favBtn" class="icon-btn">收藏</button>
      <button id="closeModal" class="icon-btn">关闭</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const grid = document.getElementById('grid');
const loadMore = document.getElementById('loadMore');
const sort = document.getElementById('sort');
const toast = document.getElementById('toast');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const downloadBtn = document.getElementById('downloadBtn');
const favBtn = document.getElementById('favBtn');
const closeModal = document.getElementById('closeModal');

let page = 1;
const rows = 13;
let isLoading = false;
let items = [];
let currentItem = null;
const favoritesKey = 'wall_favs_v1';
function loadFavs(){ try{return JSON.parse(localStorage.getItem(favoritesKey)||'[]')}catch(e){return[]} }
function saveFavs(a){ localStorage.setItem(favoritesKey, JSON.stringify(a)) }
function showToast(msg){ toast.textContent = msg; toast.style.display = 'block'; setTimeout(()=>{ toast.style.display = 'none' }, 1400); }

function fetchPage(p=1, r=13, sortBy='hot'){
  return new Promise(res=>{
    setTimeout(()=>{
      const arr = [];
      for(let i=0;i<r;i++){
        const id = 'p'+((p-1)*r + i + 1);
        const w = 600 + Math.floor(Math.random()*800);
        const h = 900 + Math.floor(Math.random()*800);
        arr.push({
          id,
          thumb: `https://picsum.photos/id/${( (p-1)*r + i ) % 1000}/${Math.floor(w/2)}/${Math.floor(h/2)}`,
          full: `https://picsum.photos/id/${( (p-1)*r + i ) % 1000}/${w}/${h}`,
          width:w, height:h,
          likes: Math.floor(Math.random()*2000),
          date: Date.now() - Math.floor(Math.random()*1000*60*60*24*30)
        });
      }
      if(sortBy==='hot') arr.sort((a,b)=>b.likes-a.likes);
      else arr.sort((a,b)=>b.date-b.date);
      res(arr);
    }, 350);
  });
}

function renderItems(newItems, append=true){
  if(!append){ grid.innerHTML=''; items=[] }
  newItems.forEach(it=>{
    items.push(it);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <img loading="lazy" src="${it.thumb}" alt="wallpaper ${it.id}">
      <div class="meta">
        <div><small>❤ ${it.likes}</small></div>
        <div>
          <button class="icon-btn" data-id="${it.id}" title="查看">🔍</button>
          <button class="icon-btn fav-btn" data-id="${it.id}" title="收藏">☆</button>
        </div>
      </div>
    `;
    div.querySelector('[title="查看"]').addEventListener('click', ()=>openModal(it));
    div.querySelector('.fav-btn').addEventListener('click', (e)=>{ toggleFav(it.id, e.target) });
    grid.appendChild(div);
  });
  updateFavUI();
}

function loadNext(){
  if(isLoading) return;
  isLoading = true;
  loadMore.disabled = true;
  fetchPage(page, rows, sort.value).then(data=>{
    renderItems(data, true);
    page++;
    isLoading = false;
    loadMore.disabled = false;
  });
}

loadMore.addEventListener('click', loadNext);
sort.addEventListener('change', ()=>{ page=1; renderItems([] , false); loadNext(); });
loadNext();

function getFavsSet(){ return new Set(loadFavs()) }
function toggleFav(id, btnEl){
  const set = getFavsSet();
  if(set.has(id)){ set.delete(id); showToast('已移除收藏') }
  else { set.add(id); showToast('已收藏') }
  saveFavs([...set]);
  updateFavUI();
}
function updateFavUI(){
  const set = getFavsSet();
  document.querySelectorAll('.fav-btn').forEach(b=>{
    const id = b.getAttribute('data-id');
    if(set.has(id)){ b.textContent='★'; b.classList.add('fav') } else { b.textContent='☆'; b.classList.remove('fav') }
  });
}

function openModal(item){
  currentItem = item;
  modalImg.src = item.full;
  modal.style.display = 'flex';
  updateModalFav();
}
function closeModalFn(){ modal.style.display = 'none'; currentItem = null; }
closeModal.addEventListener('click', closeModalFn);
modal.addEventListener('click', (e)=>{ if(e.target===modal) closeModalFn() });

downloadBtn.addEventListener('click', ()=>{
  if(!currentItem) return;
  const a = document.createElement('a');
  a.href = currentItem.full;
  a.download = `${currentItem.id}.jpg`;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

favBtn.addEventListener('click', ()=>{
  if(!currentItem) return;
  toggleFav(currentItem.id);
  updateModalFav();
});

function updateModalFav(){
  const set = getFavsSet();
  if(currentItem && set.has(currentItem.id)){ favBtn.textContent='已收藏' } else { favBtn.textContent='收藏' }
}

let ticking=false;
window.addEventListener('scroll', ()=>{
  if(ticking) return;
  ticking=true;
  requestAnimationFrame(()=>{
    const nearBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 200);
    if(nearBottom) loadNext();
    ticking=false;
  });
});

window.addEventListener('error', (e)=>{
  const el = e.target;
  if(el && el.tagName === 'IMG'){ el.style.opacity = 0.6 }
}, true);
</script>
</body>
</html>
