<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自律工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* 针对模态框显示/隐藏的微调过渡 */
        .modal-active {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .modal-content-active {
            transform: scale(1) !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-white shadow-sm border-b border-slate-100 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-calendar-check"></i> HabitFlow
            </h1>
            <div class="flex items-center gap-4">
                <span id="current-date" class="text-sm text-slate-500 font-medium hidden sm:inline"></span>
                <div class="flex gap-2">
                    <button onclick="exportData()" title="导出数据备份" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-download"></i> 导出
                    </button>
                    <label title="导入数据备份" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-1 cursor-pointer">
                        <i class="fa-solid fa-upload"></i> 导入
                        <input type="file" id="import-input" accept=".json" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl w-full mx-auto p-4 flex-1">
        
        <section id="progress-card" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-6 hidden">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                    <i class="fa-solid fa-chart-line text-indigo-500"></i> 今日进度复盘
                </h3>
                <span id="progress-percent" class="text-sm font-bold text-indigo-600">0%</span>
            </div>
            <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-full w-0 transition-all duration-500 ease-out rounded-full"></div>
            </div>
            <p id="progress-tip" class="text-xs text-slate-400 mt-2">万事开头难，开启今天的第一个打卡吧！</p>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-6">
            <h2 class="text-md font-semibold text-slate-700 mb-3">养成新习惯</h2>
            <form id="habit-form" class="space-y-4">
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="habit-input" 
                        placeholder="例如：冥想 10 分钟、背单词、跑步..." 
                        required
                        class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm"
                    >
                    <button 
                        type="submit" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-xl text-sm transition-colors flex items-center gap-1 shrink-0"
                    >
                        <i class="fa-solid fa-plus"></i> 添加
                    </button>
                </div>
                
                <div class="flex items-center gap-2 pt-1">
                    <span class="text-xs text-slate-400">选择分类：</span>
                    <div class="flex gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="study" checked class="peer hidden">
                            <span class="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-slate-50 text-slate-600 peer-checked:bg-blue-50 peer-checked:border-blue-300 peer-checked:text-blue-600 transition-all inline-block">
                                <i class="fa-solid fa-book-open mr-1"></i> 学习
                            </span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="health" class="peer hidden">
                            <span class="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-slate-50 text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-300 peer-checked:text-emerald-600 transition-all inline-block">
                                <i class="fa-solid fa-dumbbell mr-1"></i> 健康
                            </span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="category" value="life" class="peer hidden">
                            <span class="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-slate-50 text-slate-600 peer-checked:bg-amber-50 peer-checked:border-amber-300 peer-checked:text-amber-600 transition-all inline-block">
                                <i class="fa-solid fa-mug-hot mr-1"></i> 生活
                            </span>
                        </label>
                    </div>
                </div>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-md font-semibold text-slate-700 flex items-center gap-2">
                    今日任务 <span id="habit-count" class="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </h2>
                <button id="clear-all" class="text-xs text-slate-400 hover:text-rose-500 transition-colors">清空全部</button>
            </div>
            
            <ul id="habit-list" class="space-y-3">
                <div id="empty-state" class="text-center py-12 text-slate-400">
                    <i class="fa-solid fa-clipboard-list text-4xl mb-3 block opacity-40"></i>
                    <p class="text-sm">今天还没有添加习惯，快去创建一个吧！</p>
                </div>
            </ul>
        </section>
    </main>

    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-100 bg-white">
        <p>© 2026 HabitFlow · 极简自律工具</p>
    </footer>

    <div id="custom-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="modal-content" class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-4 text-rose-500">
                <div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shrink-0">
                    <i id="modal-icon" class="fa-solid fa-triangle-exclamation text-lg"></i>
                </div>
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">确认操作吗？</h3>
            </div>
            <p id="modal-message" class="text-sm text-slate-500 mb-6 leading-relaxed">此操作不可逆，请确认是否继续。</p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm font-medium transition-colors">
                    取消
                </button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-medium transition-colors">
                    确认
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 初始化变量与 DOM 获取 ---
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let pendingAction = null; 
        
        const habitForm = document.getElementById('habit-form');
        const habitInput = document.getElementById('habit-input');
        const habitList = document.getElementById('habit-list');
        const habitCount = document.getElementById('habit-count');
        const emptyState = document.getElementById('empty-state');
        const currentDateSpan = document.getElementById('current-date');

        // 进度条卡片相关 DOM
        const progressCard = document.getElementById('progress-card');
        const progressPercent = document.getElementById('progress-percent');
        const progressBar = document.getElementById('progress-bar');
        const progressTip = document.getElementById('progress-tip');

        // 弹窗相关 DOM
        const customModal = document.getElementById('custom-modal');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalIcon = document.getElementById('modal-icon');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');

        // --- 2. 显示当前日期 ---
        const todayStr = new Date().toLocaleDateString('zh-CN');
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        currentDateSpan.textContent = new Date().toLocaleDateString('zh-CN', options);

        // 安全转义函数
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 分类映射表
        const categoryMap = {
            study: { icon: 'fa-solid fa-book-open text-blue-500', bg: 'border-l-4 border-l-blue-500' },
            health: { icon: 'fa-solid fa-dumbbell text-emerald-500', bg: 'border-l-4 border-l-emerald-500' },
            life: { icon: 'fa-solid fa-mug-hot text-amber-500', bg: 'border-l-4 border-l-amber-500' }
        };

        // --- 3. 自定义 HTML 弹窗逻辑 ---
        function showCustomModal(title, message, onConfirm, type = 'danger') {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            pendingAction = onConfirm;

            if (type === 'success') {
                modalIcon.className = "fa-solid fa-circle-check text-lg";
                modalIcon.parentElement.className = "w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center shrink-0 text-emerald-500";
                modalConfirmBtn.className = "px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium transition-colors";
                modalConfirmBtn.textContent = "确定";
            } else {
                modalIcon.className = "fa-solid fa-triangle-exclamation text-lg";
                modalIcon.parentElement.className = "w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shrink-0 text-rose-500";
                modalConfirmBtn.className = "px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-medium transition-colors";
                modalConfirmBtn.textContent = "确认删除";
            }

            customModal.classList.add('modal-active');
            modalContent.classList.add('modal-content-active');
        }

        function closeCustomModal() {
            customModal.classList.remove('modal-active');
            modalContent.classList.remove('modal-content-active');
            pendingAction = null;
        }

        modalConfirmBtn.addEventListener('click', () => { if (pendingAction) pendingAction(); closeCustomModal(); });
        modalCancelBtn.addEventListener('click', closeCustomModal);
        customModal.addEventListener('click', (e) => { if (e.target === customModal) closeCustomModal(); });

        // --- 4. 数据备份导入/导出逻辑 ---
        window.exportData = function() {
            if (habits.length === 0) {
                showCustomModal('提示', '当前没有数据可以导出。', () => {}, 'success');
                return;
            }
            const dataStr = JSON.stringify(habits, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = url;
            downloadAnchor.download = `HabitFlow_备份_${new Date().toISOString().slice(0,10)}.json`;
            downloadAnchor.click();
            URL.revokeObjectURL(url);
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedHabits = JSON.parse(e.target.result);
                    if (Array.isArray(importedHabits)) {
                        showCustomModal('确认覆盖导入吗？','导入新文件将覆盖当前保存的所有数据，确定继续吗？', () => {
                            habits = importedHabits;
                            saveHabits();
                            showCustomModal('导入成功', '数据已成功恢复！', () => {}, 'success');
                        });
                    } else { showCustomModal('错误', '无效的备份文件格式。', () => {}, 'danger'); }
                } catch (err) { showCustomModal('错误', '解析备份文件失败。', () => {}, 'danger'); }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        // --- 5. 核心数据与 UI 渲染 ---
        function saveHabits() {
            localStorage.setItem('habits', JSON.stringify(habits));
            updateUI();
        }

        // 计算与更新进度条小部件
        function updateProgressBar() {
            if (habits.length === 0) {
                progressBar.style.width = '0%';
                progressPercent.textContent = '0%';
                progressCard.classList.add('hidden');
                return;
            }
            progressCard.classList.remove('hidden');
            
            const completedCount = habits.filter(h => h.completed).length;
            const percent = Math.round((completedCount / habits.length) * 100);
            
            progressPercent.textContent = `${percent}%`;
            progressBar.style.width = `${percent}%`;

            if (percent === 0) {
                progressTip.textContent = "万事开头难，开启今天的第一个打卡吧！";
            } else if (percent < 50) {
                progressTip.textContent = "做的好！进度在悄悄积少成多。";
            } else if (percent < 100) {
                progressTip.textContent = "过半啦，再加把劲今天就能完美收官！";
            } else {
                progressTip.textContent = "🎉 达成 100% 全满贯！今天你是自律超人！";
            }
        }

        function updateUI() {
            const items = habitList.querySelectorAll('li');
            items.forEach(item => item.remove());

            habitCount.textContent = habits.length;
            updateProgressBar(); 

            if (habits.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                
                habits.forEach((habit, index) => {
                    const li = document.createElement('li');
                    const catStyle = categoryMap[habit.category || 'study'];

                    // 修复：如果习惯已完成，左侧边框淡化，避免红绿蓝混杂
                    const borderClass = habit.completed ? 'border-l-4 border-l-slate-300' : catStyle.bg;

                    li.className = `flex items-center justify-between p-4 rounded-xl border transition-all duration-300 bg-white ${borderClass} ${
                        habit.completed 
                        ? 'border-emerald-100 bg-emerald-50/30 opacity-75' 
                        : 'border-slate-100 hover:border-indigo-100 hover:shadow-md'
                    }`;

                    const safeText = escapeHTML(habit.text);
                    // 修复：打卡后图标颜色变灰，契合“已完成”的视觉语境
                    const iconStyle = habit.completed ? 'fa-solid fa-check text-slate-400' : catStyle.icon;

                    li.innerHTML = `
                        <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleHabit(${index})">
                            <button class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${
                                habit.completed 
                                ? 'bg-emerald-500 border-emerald-500 text-white' 
                                : 'border-slate-300 hover:border-indigo-500 text-transparent'
                            }">
                                <i class="fa-solid fa-check text-xs"></i>
                            </button>
                            <div class="flex flex-col">
                                <span class="text-sm font-medium transition-all ${
                                    habit.completed ? 'line-through text-slate-400' : 'text-slate-700'
                                }">${safeText}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs px-2 py-0.5 rounded-md bg-slate-100/80 text-slate-500 flex items-center gap-1">
                                <i class="${iconStyle}"></i>
                            </span>
                            <span class="text-xs text-slate-400 flex items-center gap-1">
                                <i class="fa-solid fa-fire text-amber-500"></i> ${habit.streak} 天
                            </span>
                            <button onclick="confirmDeleteIndividual(event, ${index}, '${safeText}')" class="text-slate-300 hover:text-rose-500 transition-colors p-1">
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </div>
                    `;
                    habitList.appendChild(li);
                });
            }
        }

        // --- 6. 交互事件处理 ---

        // 添加新习惯
        habitForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = habitInput.value.trim();
            if (!text) return;

            const selectedCategory = document.querySelector('input[name="category"]:checked').value;

            habits.push({
                text: text,
                completed: false,
                streak: 0,
                lastCompletedDate: null,
                category: selectedCategory 
            });

            habitInput.value = '';
            // 修复：添加完后，将单选按钮重置回第一项 "study"
            document.querySelector('input[name="category"][value="study"]').checked = true;
            
            saveHabits();
        });

        window.toggleHabit = function(index) {
            if (!habits[index]) return;

            const habit = habits[index];
            habit.completed = !habit.completed;
            
            if (habit.completed) {
                if (habit.lastCompletedDate !== todayStr) {
                    habit.streak += 1;
                    habit.lastCompletedDate = todayStr;
                    
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#4f46e5', '#10b981', '#f59e0b', '#ec4899']
                    });
                }
            } else {
                if (habit.lastCompletedDate === todayStr) {
                    habit.streak = Math.max(0, habit.streak - 1);
                    habit.lastCompletedDate = null;
                }
            }
            saveHabits();
        };

        window.confirmDeleteIndividual = function(event, index, habitText) {
            event.stopPropagation();
            if (!habits[index]) return;

            showCustomModal(
                '确定删除习惯吗？',
                `你即将删除“${habitText}”，该习惯的连续打卡记录也将被清空。`,
                () => { habits.splice(index, 1); saveHabits(); }
            );
        };

        document.getElementById('clear-all').addEventListener('click', () => {
            if (habits.length === 0) return;
            showCustomModal(
                '确定清空全部吗？',
                '此操作将永久删除你创建的所有习惯及打卡数据，且无法恢复。',
                () => { habits = []; saveHabits(); }
            );
        });

        // 页面首次加载渲染
        updateUI();
    </script>
</body>
</html>
