<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>暗影冒险者 - 最终完美版</title>
    <style>
        :root {
            --bg: #1a1a2e; --panel: #16213e; --gold: #ffd700;
            --hp: #ff4444; --mp: #4444ff; --exp: #44ff44; --text: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            background: #0a0a1a; font-family: -apple-system, 'Courier New', monospace;
            color: var(--text); width: 100vw; height: 100vh; height: 100dvh;
            overflow: hidden; touch-action: manipulation;
        }
        .game-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .status-bar {
            background: linear-gradient(180deg, #16213e, #0f1a30); padding: 6px 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            border-bottom: 2px solid #2a2a4e; z-index: 10; font-size: 11px;
        }
        .player-main { display: flex; align-items: center; gap: 4px; }
        .player-avatar { font-size: 22px; animation: avatarBounce 2s ease-in-out infinite; }
        @keyframes avatarBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        .player-info-text { display: flex; flex-direction: column; gap: 1px; }
        .player-name { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 3px; }
        .player-level { font-size: 9px; color: var(--gold); }
        .player-title-display { font-size: 8px; color: #ff69b4; font-style: italic; }
        .player-resources { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; font-size: 9px; }
        .resource { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .resource-icon { font-size: 11px; }
        .resource-bar { width: 100%; height: 4px; background: #000; border-radius: 2px; overflow: hidden; border: 1px solid #333; }
        .hp-fill { height: 100%; background: linear-gradient(90deg,#ff4444,#ff6666); transition: width 0.3s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg,#4444ff,#6666ff); transition: width 0.3s; }
        .exp-fill { height: 100%; background: linear-gradient(90deg,#44ff44,#66ff66); transition: width 0.3s; }
        .resource-text { font-size: 7px; color: #aaa; }
        .equipment-display { display: flex; gap: 6px; justify-content: center; padding: 2px 0; font-size: 9px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #222; }
        .quick-info { background: rgba(0,0,0,0.3); padding: 3px 10px; display: flex; justify-content: space-between; font-size: 9px; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 3px; }
        .map-name { color: #4fc3f7; } .potion-count { color: #66bb6a; } .weather-display { color: #ffd700; }
        .game-screen {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(ellipse at center, #1a1a3e, #0a0a1a 70%);
            overflow: hidden; min-height: 0; transition: background 1s;
        }
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .particle { position: absolute; background: white; border-radius: 50%; animation: floatUp 3s ease-in infinite; }
        @keyframes floatUp { 0%{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(-100px) scale(1);opacity:0} }
        .scene { text-align: center; z-index: 1; }
        .enemy-container { position: relative; cursor: pointer; padding: 12px; }
        .enemy-sprite { font-size: 65px; animation: enemyFloat 2s ease-in-out infinite; transition: transform 0.15s; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)); }
        .enemy-sprite:active { transform: scale(0.85); }
        @keyframes enemyFloat { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-12px) rotate(1deg)} }
        .enemy-hp-bar { width: 90px; height: 5px; background: rgba(0,0,0,0.5); border-radius: 3px; margin: 6px auto; overflow: hidden; border: 1px solid #444; }
        .enemy-hp-fill { height: 100%; background: linear-gradient(90deg,#ff4444,#ff6666); transition: width 0.3s; }
        .enemy-name { font-size: 13px; color: #ff6b6b; margin-top: 4px; }
        .enemy-level { font-size: 9px; color: #888; }
        .elite-indicator { color: #ff8800; font-size: 10px; animation: eliteGlow 1s infinite; display: none; }
        @keyframes eliteGlow { 0%,100%{text-shadow:0 0 5px #ff8800} 50%{text-shadow:0 0 15px #ffaa00} }
        .damage-popup { position: absolute; font-weight: bold; animation: popup 0.8s ease-out forwards; pointer-events: none; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .damage-popup.normal { color: #ff6666; font-size: 22px; }
        .damage-popup.crit { color: #ff8800; font-size: 30px; }
        .damage-popup.skill { color: #6666ff; font-size: 24px; }
        .damage-popup.pet { color: #ff69b4; font-size: 18px; }
        .damage-popup.heal { color: #44ff44; font-size: 20px; }
        .damage-popup.gold { color: #ffd700; font-size: 18px; }
        .damage-popup.exp { color: #44ff44; font-size: 16px; }
        @keyframes popup { 0%{transform:translateY(0) scale(0.5);opacity:1} 50%{transform:translateY(-20px) scale(1.2);opacity:1} 100%{transform:translateY(-45px) scale(0.8);opacity:0} }
        .achievement-popup {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg,#2a2a00,#1a1a00); border: 2px solid var(--gold);
            border-radius: 12px; padding: 10px 18px; z-index: 200;
            animation: achievementSlide 3s ease-out forwards; pointer-events: none;
            display: flex; align-items: center; gap: 6px; font-size: 12px;
        }
        @keyframes achievementSlide { 0%{opacity:0;transform:translateX(-50%) translateY(15px)} 10%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-40px)} }
        .achievement-icon { font-size: 22px; }
        .levelup-effect {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 36px; color: #ffd700; z-index: 400; pointer-events: none;
            animation: levelupBurst 1.5s ease-out forwards;
        }
        @keyframes levelupBurst { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 50%{transform:translate(-50%,-50%) scale(1.5);opacity:1} 100%{transform:translate(-50%,-50%) scale(2);opacity:0} }
        .action-bar {
            background: linear-gradient(0deg,#0f1a30,#16213e); padding: 6px;
            border-top: 2px solid #2a2a4e; display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; z-index: 10;
        }
        .action-btn {
            aspect-ratio: 1; max-height: 50px; border: 2px solid #444; border-radius: 10px;
            background: linear-gradient(135deg,#1a1a3e,#0f1a30); color: var(--text);
            font-size: 9px; font-weight: bold; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1px; cursor: pointer; transition: all 0.15s;
        }
        .action-btn:active { transform: scale(0.92); border-color: #888; }
        .action-btn .btn-icon { font-size: 18px; }
        .action-btn.attack { border-color: #ff4444; background: linear-gradient(135deg,#3a1a1a,#2a1010); }
        .action-btn.skill { border-color: #4444ff; background: linear-gradient(135deg,#1a1a3a,#10102a); }
        .action-btn.item { border-color: #44ff44; background: linear-gradient(135deg,#1a3a1a,#102a10); }
        .action-btn.menu { border-color: #ffd700; background: linear-gradient(135deg,#3a3a1a,#2a2a10); }
        .action-btn.auto { border-color: #ff69b4; background: linear-gradient(135deg,#3a1a2a,#2a1020); }
        .speed-bar {
            display: flex; justify-content: center; gap: 4px; padding: 3px 0;
            background: rgba(0,0,0,0.3); border-top: 1px solid #222;
        }
        .speed-btn {
            padding: 2px 8px; background: rgba(255,255,255,0.05); border: 1px solid #444;
            border-radius: 4px; color: #aaa; font-size: 8px; cursor: pointer;
        }
        .speed-btn.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.1); }
        .boss-timer {
            position: fixed; bottom: 160px; right: 15px; background: rgba(0,0,0,0.8);
            border: 1px solid #ff4444; border-radius: 8px; padding: 4px 8px;
            font-size: 10px; color: #ff6b6b; z-index: 20; display: none;
        }
        .checkin-btn {
            position: fixed; bottom: 120px; right: 15px; background: rgba(255,215,0,0.2);
            border: 2px solid #ffd700; border-radius: 50%; width: 42px; height: 42px;
            font-size: 18px; z-index: 20; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .world-boss-btn {
            position: fixed; bottom: 75px; right: 15px; background: rgba(255,0,0,0.3);
            border: 2px solid #ff0000; border-radius: 50%; width: 45px; height: 45px;
            font-size: 22px; z-index: 20; display: none; cursor: pointer; align-items: center; justify-content: center;
        }
        .world-boss-btn.boss-available { display: flex; animation: bossBtnPulse 1s infinite; }
        @keyframes bossBtnPulse { 0%,100%{box-shadow:0 0 10px #ff0000} 50%{box-shadow:0 0 30px #ff0000,0 0 60px #ff4444} }
        .auto-fight-indicator {
            position: fixed; top: 8px; right: 8px; background: rgba(0,255,0,0.2);
            border: 1px solid #44ff44; border-radius: 8px; padding: 3px 6px;
            font-size: 9px; z-index: 20; display: none; animation: autoPulse 2s infinite;
        }
        @keyframes autoPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center;
            align-items: center; z-index: 100; backdrop-filter: blur(3px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg,#16213e,#0f1a30); border: 2px solid #444;
            border-radius: 14px; padding: 12px; width: 92%; max-width: 400px;
            max-height: 80vh; overflow-y: auto; animation: modalSlideIn 0.3s ease-out;
        }
        @keyframes modalSlideIn { 0%{transform:translateY(40px) scale(0.9);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
        .modal-title { text-align: center; font-size: 16px; margin-bottom: 10px; color: var(--gold); }
        .modal-close { display: block; width: 100%; padding: 8px; margin-top: 6px; background: #ff4444; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .tab-buttons { display: flex; gap: 3px; margin-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 4px 8px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 5px; color: var(--text); font-size: 9px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: rgba(255,215,0,0.2); border-color: var(--gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .list-item {
            display: flex; align-items: center; justify-content: space-between; padding: 6px;
            margin: 3px 0; background: rgba(255,255,255,0.03); border: 1px solid #333;
            border-radius: 5px; font-size: 11px; gap: 4px;
        }
        .list-item.unlocked { border-color: var(--gold); background: rgba(255,215,0,0.05); }
        .list-item.locked { opacity: 0.5; }
        .buy-btn { padding: 4px 8px; background: #44ff44; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 9px; white-space: nowrap; }
        .buy-btn:disabled { background: #555; color: #999; }
        .buy-btn.owned { background: #666; color: #333; }
        .skill-node {
            display: flex; align-items: center; gap: 4px; padding: 6px; margin: 3px 0;
            background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 5px;
            font-size: 10px; cursor: pointer;
        }
        .skill-node.learned { border-color: #4444ff; background: rgba(68,68,255,0.1); }
        .skill-node.equipped { border-color: #ff4444; background: rgba(255,68,68,0.1); }
        .skill-desc { font-size: 8px; color: #888; margin-top: 2px; }
        .log-toast {
            position: fixed; bottom: 25%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 6px 14px;
            border-radius: 14px; font-size: 11px; z-index: 50; pointer-events: none;
            animation: toastFade 2s ease-out forwards; white-space: nowrap;
        }
        @keyframes toastFade { 0%{opacity:0;transform:translateX(-50%) translateY(15px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-15px)} }
        .offline-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 299; display: none; }
        .offline-overlay.active { display: block; }
        .offline-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: linear-gradient(135deg,#1a1a3e,#0f1a30); border: 2px solid var(--gold);
            border-radius: 14px; padding: 20px; z-index: 300; text-align: center; display: none;
        }
        .offline-modal.active { display: block; }
        .stat-item { display: flex; justify-content: space-between; padding: 3px 0; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .save-code-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 500; display: flex;
            align-items: center; justify-content: center;
        }
        .save-code-content {
            background: #16213e; border: 2px solid #ffd700; border-radius: 12px;
            padding: 15px; width: 90%; max-width: 400px;
        }
        .battle-log-item {
            font-size: 9px; padding: 2px 4px; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .battle-log-damage { color: #ff6b6b; }
        .battle-log-heal { color: #6bff6b; }
        .battle-log-system { color: #ffd700; }
        .battle-log-loot { color: #4fc3f7; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="status-bar">
            <div class="player-main">
                <div class="player-avatar">⚔️</div>
                <div class="player-info-text">
                    <div class="player-name"><span id="playerName">冒险者</span><span id="petDisplay"></span></div>
                    <div class="player-level" id="level">Lv.1</div>
                    <div class="player-title-display" id="titleDisplay">🌱 初出茅庐</div>
                </div>
            </div>
            <div class="player-resources">
                <div class="resource"><span class="resource-icon">❤️</span><div class="resource-bar"><div class="hp-fill" id="hpBar" style="width:100%"></div></div><span class="resource-text" id="hpText">100/100</span></div>
                <div class="resource"><span class="resource-icon">💎</span><div class="resource-bar"><div class="mp-fill" id="mpBar" style="width:100%"></div></div><span class="resource-text" id="mpText">50/50</span></div>
                <div class="resource"><span class="resource-icon">⭐</span><div class="resource-bar"><div class="exp-fill" id="expBar" style="width:0%"></div></div><span class="resource-text" id="expText">0/100</span></div>
            </div>
        </div>
        <div class="equipment-display">
            <span>⚔️ <span id="weaponDisplay">木剑</span></span>
            <span>🛡️ <span id="armorDisplay">布甲</span></span>
            <span>💍 <span id="rebirthDisplay"></span></span>
        </div>
        <div class="quick-info">
            <span class="map-name" id="mapDisplay">🌲 暗影森林</span>
            <span class="weather-display" id="weatherDisplay">☀️ 晴天</span>
            <span>💰 <span id="gold">0</span></span>
            <span class="potion-count">🧪 x<span id="potionCount">3</span></span>
        </div>
        <div class="speed-bar" id="speedBar">
            <button class="speed-btn active" onclick="setBattleSpeed(1)">⚡1x</button>
            <button class="speed-btn" onclick="setBattleSpeed(2)">⚡2x</button>
            <button class="speed-btn" onclick="setBattleSpeed(3)">⚡3x</button>
            <span style="font-size:8px;color:#888;">速度</span>
        </div>
        <div class="auto-fight-indicator" id="autoFightIndicator">🤖 自动中...</div>
        <div class="boss-timer" id="bossTimer">🐲 可挑战</div>
        <button class="checkin-btn" id="checkinBtn" onclick="doCheckIn()">📅</button>
        <button class="world-boss-btn" id="worldBossBtn" onclick="fightWorldBoss()">🐲</button>
        <div class="game-screen" id="gameScreen">
            <div class="particles" id="particles"></div>
            <div class="scene">
                <div class="enemy-container" id="enemyContainer">
                    <div class="enemy-sprite" id="enemySprite">👾</div>
                    <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpBar" style="width:100%"></div></div>
                    <div class="enemy-name" id="enemyName">史莱姆</div>
                    <div class="enemy-level" id="enemyLevel">Lv.1</div>
                    <div class="elite-indicator" id="eliteIndicator">👑 精英</div>
                </div>
            </div>
        </div>
        <div class="action-bar">
            <button class="action-btn attack" onclick="playerAttack()"><span class="btn-icon">⚔️</span><span>攻击</span></button>
            <button class="action-btn skill" onclick="useEquippedSkill()"><span class="btn-icon" id="skillIcon">💥</span><span id="skillName">重击</span></button>
            <button class="action-btn item" onclick="usePotion()"><span class="btn-icon">🧪</span><span>药水</span></button>
            <button class="action-btn menu" onclick="toggleModal('mainModal')"><span class="btn-icon">📋</span><span>菜单</span></button>
            <button class="action-btn auto" onclick="toggleAutoFight()"><span class="btn-icon" id="autoIcon">🤖</span><span id="autoText">自动</span></button>
        </div>
        <div class="offline-overlay" id="offlineOverlay"></div>
        <div class="offline-modal" id="offlineModal">
            <h3 style="color:var(--gold);">⏰ 离线收益</h3>
            <div id="offlineContent"></div>
            <button class="modal-close" style="margin-top:12px;" onclick="closeOfflineModal()">领取</button>
        </div>
        <div class="modal" id="mainModal">
            <div class="modal-content">
                <div class="modal-title">📋 菜单</div>
                <div class="tab-buttons" id="mainTabs">
                    <button class="tab-btn active" onclick="switchTab('map')">🗺️地图</button>
                    <button class="tab-btn" onclick="switchTab('quests')">📋任务</button>
                    <button class="tab-btn" onclick="switchTab('achievements')">🏆成就</button>
                    <button class="tab-btn" onclick="switchTab('pets')">🐾宠物</button>
                    <button class="tab-btn" onclick="switchTab('skills')">✨技能</button>
                    <button class="tab-btn" onclick="switchTab('craft')">🔨合成</button>
                    <button class="tab-btn" onclick="switchTab('dungeon')">🕳️副本</button>
                    <button class="tab-btn" onclick="switchTab('rebirth')">🔄转生</button>
                    <button class="tab-btn" onclick="switchTab('shop')">🏪商店</button>
                    <button class="tab-btn" onclick="switchTab('cards')">🃏卡牌</button>
                    <button class="tab-btn" onclick="switchTab('stats')">📊统计</button>
                    <button class="tab-btn" onclick="switchTab('life')">🎣生活</button>
                    <button class="tab-btn" onclick="switchTab('arena')">⚔️竞技</button>
                    <button class="tab-btn" onclick="switchTab('log')">📜日志</button>
                </div>
                <div class="tab-content active" id="tab-map"></div>
                <div class="tab-content" id="tab-quests"></div>
                <div class="tab-content" id="tab-achievements"></div>
                <div class="tab-content" id="tab-pets"></div>
                <div class="tab-content" id="tab-skills"></div>
                <div class="tab-content" id="tab-craft"></div>
                <div class="tab-content" id="tab-dungeon"></div>
                <div class="tab-content" id="tab-rebirth"></div>
                <div class="tab-content" id="tab-shop"></div>
                <div class="tab-content" id="tab-cards"></div>
                <div class="tab-content" id="tab-stats"></div>
                <div class="tab-content" id="tab-life"></div>
                <div class="tab-content" id="tab-arena"></div>
                <div class="tab-content" id="tab-log"></div>
                <button class="modal-close" onclick="toggleModal('mainModal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 音效系统 ====================
        class SoundSystem {
            constructor() {
                this.ctx = null; this.enabled = true;
                const h = () => { if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==='suspended') this.ctx.resume(); };
                document.addEventListener('touchstart', h, {once:true}); document.addEventListener('click', h, {once:true});
            }
            play(t) {
                if(!this.enabled||!this.ctx) return;
                const n = { attack:[200,'square',0.1], skill:[400,'sawtooth',0.15], crit:[600,'square',0.12], kill:[800,'sine',0.2], heal:[500,'sine',0.15], buy:[700,'triangle',0.1], craft:[500,'triangle',0.12], fish:[300,'sine',0.2], card:[600,'sine',0.15], event:[400,'sine',0.2] };
                if(t==='levelup'){ this.melody([300,500,800]); return; }
                if(t==='achievement'){ this.melody([400,600,800,1000]); return; }
                if(t==='boss'){ this.melody([200,300,200,300,400]); return; }
                if(t==='rebirth'){ this.melody([200,400,600,800,1000]); return; }
                const v = n[t]||[440,'sine',0.1];
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.frequency.value=v[0]; o.type=v[1]; g.gain.value=0.06;
                o.start(); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+v[2]);
                o.stop(this.ctx.currentTime+v[2]);
            }

                exportDate: new Date().toISOString(),
                info: `Lv.${player.level} | 💰${player.gold} | 击杀${player.totalKills} | 转生${player.rebirthCount}`
            };
        }
        function exportData(){
            const data = buildSaveData();
            if(!data.gameSave) { showToast('❌ 没有存档数据'); return; }
            const jsonStr = JSON.stringify(data, null, 2);
            try {
                const blob = new Blob([jsonStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `冒险者存档_Lv${player.level}_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('💾 存档已下载');
            } catch(e) { showToast('⚠️ 下载失败，请使用存档码'); showSaveCode(); }
        }
        function showSaveCode(){
            const data = buildSaveData();
            if(!data.gameSave) { showToast('❌ 没有存档数据'); return; }
            const codeText = JSON.stringify(data);
            const modal = document.createElement('div');
            modal.className = 'save-code-modal'; modal.id = 'saveCodeModal';
            modal.innerHTML = `<div class="save-code-content"><h3 style="color:#ffd700;text-align:center;">💾存档代码</h3><p style="font-size:10px;color:#aaa;text-align:center;margin:6px 0;">${data.info}</p><p style="font-size:9px;color:#ff9800;text-align:center;margin:4px 0;">👇长按全选复制，粘贴到备忘录</p><textarea id="saveCodeText" style="width:100%;height:120px;background:#000;color:#0f0;border:1px solid #444;border-radius:8px;padding:8px;font-size:8px;resize:none;word-break:break-all;" readonly>${codeText}</textarea><button onclick="copySaveCode()" style="width:100%;padding:10px;margin-top:6px;background:#44ff44;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:bold;">📋一键复制</button><button onclick="document.getElementById('saveCodeModal').remove()" style="width:100%;padding:10px;margin-top:4px;background:#ff4444;color:white;border:none;border-radius:8px;font-size:14px;">关闭</button></div>`;
            document.body.appendChild(modal);
        }
        function copySaveCode(){
            const textarea = document.getElementById('saveCodeText');
            if(!textarea) return;
            try { const data = JSON.parse(textarea.value); if(!data.gameSave) { showToast('❌存档码异常'); return; } } catch(e) { showToast('❌格式错误'); return; }
            textarea.select(); textarea.setSelectionRange(0, 99999);
            try { document.execCommand('copy'); showToast('✅已复制！去备忘录粘贴'); } catch(e) { showToast('❌复制失败，请手动全选'); }
        }
        function importData(){
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => processImportText(ev.target.result); reader.readAsText(file); };
            input.click();
        }
        function importFromClipboard(){
            const modal = document.createElement('div'); modal.className = 'save-code-modal'; modal.id = 'pasteModal';
            modal.innerHTML = `<div class="save-code-content"><h3 style="color:#ffd700;text-align:center;">📥粘贴存档码</h3><textarea id="pasteText" placeholder="在此粘贴..." style="width:100%;height:120px;background:#000;color:#0f0;border:1px solid #444;border-radius:8px;padding:8px;font-size:8px;resize:none;"></textarea><button onclick="confirmPaste()" style="width:100%;padding:10px;margin-top:6px;background:#44ff44;color:#000;border:none;border-radius:8px;font-size:14px;">✅确认导入</button><button onclick="document.getElementById('pasteModal').remove()" style="width:100%;padding:10px;margin-top:4px;background:#ff4444;color:white;border:none;border-radius:8px;font-size:14px;">关闭</button></div>`;
            document.body.appendChild(modal);
        }
        function confirmPaste(){ const text = document.getElementById('pasteText').value; if(!text.trim()) { showToast('❌请粘贴存档码'); return; } document.getElementById('pasteModal').remove(); processImportText(text); }
        function processImportText(text){
            try {
                const data = JSON.parse(text);
                let gameSave = null, checkinData = null, info = '未知';
                if(data.gameSave) { gameSave = data.gameSave; checkinData = data.checkinData; info = data.info || '未知'; }
                else if(data.player) { gameSave = JSON.stringify(data); info = `Lv.${data.player.level} | 💰${data.player.gold}`; }
                else { showToast('❌存档格式不正确'); return; }
                try { const v = JSON.parse(gameSave); if(!v.player) { showToast('❌存档数据无效'); return; } } catch(e) { showToast('❌存档数据损坏'); return; }
                if(confirm(`确认导入？\n\n${info}\n\n⚠️当前进度将被覆盖！`)){
                    localStorage.setItem('shadowAdventurer_save', gameSave);
                    if(checkinData) localStorage.setItem('checkInData', checkinData);
                    showToast('📂导入成功！刷新中...'); setTimeout(() => location.reload(), 1000);
                }
            } catch(err) { showToast('❌格式错误，请检查是否完整复制'); }
        }

        // ==================== 屏幕震动 ====================
        function screenShake(intensity=5){
            const screen=document.getElementById('gameScreen');const orig=screen.style.transform||'';let count=0;
            const interval=setInterval(()=>{const x=(Math.random()-0.5)*intensity*2,y=(Math.random()-0.5)*intensity*2;screen.style.transform=`translate(${x}px,${y}px)`;count++;if(count>8){clearInterval(interval);screen.style.transform=orig;}},30);
        }

        // ==================== 连杀 ====================
        function updateKillStreak(){
            clearTimeout(player.killStreakTimer);player.killStreak++;
            if(player.killStreak>=10){const a=achievements.find(a=>a.id==='combo_10');if(a&&!a.unlocked){a.unlocked=true;showAchievementPopup(a);}}
            player.killStreakTimer=setTimeout(()=>{if(player.killStreak>=5){const bonus=player.killStreak*15;player.gold+=bonus;addBattleLog(`🔥${player.killStreak}连杀+${bonus}💰`,'system');showToast(`🔥${player.killStreak}连杀！+${bonus}💰`);}player.killStreak=0;},5000);
        }

        // ==================== 随机事件 ====================
        function checkRandomEvent(){randomEvents.forEach(e=>{if(Math.random()<e.chance)e.effect();});}

        // ==================== UI更新 ====================
        function updateUI(){
            const st=(i,t)=>{const e=document.getElementById(i);if(e)e.textContent=t;};
            const ss=(i,p,v)=>{const e=document.getElementById(i);if(e)e.style[p]=v;};
            st('level',`Lv.${player.level}`);st('hpText',`${player.hp}/${player.maxHp}`);st('mpText',`${player.mp}/${player.maxMp}`);st('expText',`${player.exp}/${player.expToLevel}`);st('gold',player.gold);st('potionCount',player.potions);
            st('titleDisplay',`${player.titleIcon}${player.title}`);
            ss('hpBar','width',Math.max(0,(player.hp/Math.max(1,player.maxHp))*100)+'%');ss('mpBar','width',Math.max(0,(player.mp/Math.max(1,player.maxMp))*100)+'%');ss('expBar','width',Math.max(0,(player.exp/Math.max(1,player.expToLevel))*100)+'%');
            st('mapDisplay',player.currentDungeon?`🕳️${player.currentDungeon.name}F${player.dungeonFloor}`:getMapDisplayName());
            st('weaponDisplay',player.equipment?.weapon?.name||'木剑');st('armorDisplay',player.equipment?.armor?.name||'布甲');st('rebirthDisplay',player.rebirthCount>0?`转生${player.rebirthCount}`:'');
            if(player.pet){const ev=player.level>=(player.pet.evolveLevel||999);st('petDisplay',ev?(player.pet.evolvedEmoji||player.pet.emoji):player.pet.emoji);}else{st('petDisplay','');}
            if(currentEnemy){
                st('enemySprite',currentEnemy.emoji||'👾');st('enemyName',currentEnemy.name||'未知');st('enemyLevel',`Lv.${currentEnemy.level||1}`);
                ss('enemyHpBar','width',Math.max(0,(currentEnemy.hp/Math.max(1,currentEnemy.maxHp))*100)+'%');
                document.getElementById('eliteIndicator').style.display = currentEnemy.isElite ? 'block' : 'none';
            }
            const sk=findSkill(player.equippedSkill);if(sk){st('skillIcon',sk.emoji);st('skillName',sk.name);}
            updateBossTimer();updateCheckinBtn();
        }
        function getMapDisplayName(){const n={forest:'🌲暗影森林',cave:'🕳️幽暗洞穴',castle:'🏰诅咒城堡',dragon:'🐉龙之巢穴'};return n[player.currentMap]||'🌲暗影森林';}
        function showToast(msg){const t=document.createElement('div');t.className='log-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
        function showAchievementPopup(a){const p=document.createElement('div');p.className='achievement-popup';p.innerHTML=`<span class="achievement-icon">${a.icon}</span><div><b>🏆${a.name}</b><br><small>${a.desc}</small></div>`;document.body.appendChild(p);sound.play('achievement');if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);setTimeout(()=>p.remove(),3000);}
        function showLevelUpEffect(){const e=document.createElement('div');e.className='levelup-effect';e.textContent='⬆️LEVEL UP!';document.body.appendChild(e);setTimeout(()=>e.remove(),1500);}
        function showFloatingText(text,x,y,type='normal'){const el=document.createElement('div');el.className='damage-popup '+type;el.textContent=text;const screen=document.getElementById('gameScreen');el.style.left=x+'px';el.style.top=y+'px';screen.appendChild(el);setTimeout(()=>el.remove(),800);}

        // ==================== 弹窗/标签 ====================
        function toggleModal(id){const m=document.getElementById(id);m.classList.toggle('active');if(id==='mainModal'&&m.classList.contains('active'))updateAllTabs();}
        function switchTab(name){
            document.querySelectorAll('#mainTabs .tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            const tab=document.getElementById('tab-'+name);if(tab)tab.classList.add('active');
            const em={map:'🗺️',quests:'📋',achievements:'🏆',pets:'🐾',skills:'✨',craft:'🔨',dungeon:'🕳️',rebirth:'🔄',shop:'🏪',cards:'🃏',stats:'📊',life:'🎣',arena:'⚔️',log:'📜'};
            const btn=Array.from(document.querySelectorAll('#mainTabs .tab-btn')).find(b=>b.textContent.includes(em[name]||''));if(btn)btn.classList.add('active');
            updateAllTabs();
        }
        // 【修复】检查装备是否拥有（装备栏+背包）
        function hasEquipment(name, type) {
            if (type === 'weapon' && player.equipment.weapon.name === name) return true;
            if (type === 'armor' && player.equipment.armor.name === name) return true;
            return player.inventory.some(i => i.name === name);
        }
        function updateAllTabs(){
            document.getElementById('tab-map').innerHTML=`<div class="list-item"onclick="selectMap('forest')"><span>🌲暗影森林</span><span>Lv.1-5</span></div><div class="list-item"onclick="selectMap('cave')"><span>🕳️幽暗洞穴</span><span>Lv.5-10</span></div><div class="list-item"onclick="selectMap('castle')"><span>🏰诅咒城堡</span><span>Lv.10-15</span></div><div class="list-item"onclick="selectMap('dragon')"><span>🐉龙之巢穴</span><span>Lv.15+</span></div>`;
            document.getElementById('tab-quests').innerHTML=dailyQuests.map(q=>`<div class="list-item"><span>${q.icon}${q.desc}</span><span>${q.progress}/${q.target}${q.claimed?'✅':q.progress>=q.target?'🎁':''}</span></div>`).join('');
            document.getElementById('tab-achievements').innerHTML=achievements.map(a=>`<div class="list-item ${a.unlocked?'unlocked':'locked'}"><span>${a.icon}${a.name}</span><span style="font-size:9px;">${a.desc}</span></div>`).join('');
            document.getElementById('tab-pets').innerHTML=petsDB.map((p,i)=>{const ad=player.pet&&player.pet.name===p.name;const ev=ad&&player.level>=p.evolveLevel;return`<div class="list-item ${ad?'unlocked':''}"onclick="adoptPet(${i})"><span>${ev?(p.evolvedEmoji||p.emoji):p.emoji}${p.name}</span><span style="font-size:9px;">攻+${ev?(p.evolvedAttack||p.attack):p.attack}${p.heal?'治+'+ (ev?(p.evolvedHeal||p.heal):p.heal):''}</span><span style="font-size:8px;color:#888;">${p.desc||''}</span>${ad?'✓':''}</div>`;}).join('');
            document.getElementById('tab-skills').innerHTML=`<div style="margin-bottom:6px;">技能点:<span style="color:var(--gold);">${player.skillPoints}</span></div>`+Object.entries(skillTree).map(([tree,skills])=>`<div style="color:var(--gold);margin:8px 0 4px;font-size:11px;">${tree==='attack'?'⚔️攻击系':tree==='magic'?'🔮魔法系':'💚辅助系'}</div>`+skills.map(s=>{const learned=player.learnedSkills.includes(s.id);const equipped=player.equippedSkill===s.id;const canLearn=!learned&&player.skillPoints>0&&(!s.req||player.learnedSkills.includes(s.req));return`<div class="skill-node ${learned?'learned':''}${equipped?'equipped':''}"onclick="${learned?`equipSkill('${s.id}')`:canLearn?`learnSkill('${s.id}')`:''}"><span>${s.emoji}</span><div style="flex:1;"><div style="font-weight:bold;">${s.name}<span style="font-size:9px;color:#888;">Lv.${s.level}</span></div><div class="skill-desc">${s.desc||''}${s.damage?'|伤害x'+s.damage:''}${s.heal?'|恢复+'+s.heal:''}${s.defense?'|护盾+'+s.defense:''}|MP:${s.mpCost}</div></div>${equipped?'<span style="color:#ff4444;">装备中</span>':learned?'<span style="color:#4444ff;">已学会</span>':canLearn?'<span style="color:#44ff44;">可学习</span>':'<span style="color:#666;">🔒需:'+(s.req?findSkill(s.req)?.name||s.req:'无')+'</span>'}</div>`;}).join('')).join('');
            // 【修复】合成显示 - 检查装备+材料
            document.getElementById('tab-craft').innerHTML=recipes.map((r,i)=>{
                const canCraft = Object.entries(r.materials).every(([m,q]) => {
                    // 检查是否是装备材料
                    const weaponItem = equipmentDB.weapons.find(w => w.name === m);
                    const armorItem = equipmentDB.armors.find(a => a.name === m);
                    if (weaponItem) return hasEquipment(m, 'weapon');
                    if (armorItem) return hasEquipment(m, 'armor');
                    // 普通材料
                    const inv = player.inventory.find(it => it.name === m);
                    return inv && inv.quantity >= q;
                });
                return `<div class="list-item"><span>${r.emoji}${r.name}</span><div style="flex:1;font-size:9px;"><div>需要: ${Object.entries(r.materials).map(([m,q])=>{
                    const wep = equipmentDB.weapons.find(w=>w.name===m);
                    const arm = equipmentDB.armors.find(a=>a.name===m);
                    const has = wep ? hasEquipment(m,'weapon') : arm ? hasEquipment(m,'armor') : (player.inventory.find(it=>it.name===m)?.quantity||0) >= q;
                    return `<span style="color:${has?'#4fc3f7':'#ff6b6b'}">${m}x${q}</span>`;
                }).join(' ')}</div><div style="color:#888;">${r.result.desc||''}</div></div><button class="buy-btn"${!canCraft?'disabled':''}onclick="craftItem(${i})">合成</button></div>`;
            }).join('')+'<div style="color:var(--gold);margin:10px 0;font-size:11px;">📦材料背包</div>'+(player.inventory.filter(i=>i.type==='material').length===0?'<div style="font-size:10px;color:#666;">暂无材料(击败怪物获取)</div>':player.inventory.filter(i=>i.type==='material').map(m=>`<div class="list-item"><span>${m.emoji||'💧'}${m.name}</span><span>x${m.quantity}</span></div>`).join(''))+'<div style="font-size:9px;color:#888;margin-top:4px;">💡装备材料需先在商店购买并拥有</div>';
            document.getElementById('tab-dungeon').innerHTML=dungeons.map((d,i)=>`<div class="list-item"><span>${d.emoji}${d.name}</span><span style="font-size:9px;">${d.floors}层Lv.${d.minLevel}</span><button class="buy-btn"${player.level<d.minLevel?'disabled':''}onclick="enterDungeon(${i})">进入</button></div>`).join('');
            document.getElementById('tab-rebirth').innerHTML=`<div>转生:${player.rebirthCount}次|加成:+${Math.floor(player.rebirthBonus*100)}%</div><button class="buy-btn"style="width:100%;margin:4px 0;"${player.level<30?'disabled':''}onclick="rebirth()">🔄转生(需Lv.30)</button><div style="margin-top:12px;padding-top:12px;border-top:1px solid #444;"><div style="color:var(--gold);margin-bottom:6px;">💾数据管理</div><div style="display:flex;gap:6px;flex-wrap:wrap;"><button class="buy-btn"style="flex:1;background:#4fc3f7;min-width:70px;"onclick="exportData()">📤导出</button><button class="buy-btn"style="flex:1;background:#ff9800;min-width:70px;"onclick="importData()">📥导入</button><button class="buy-btn"style="flex:1;background:#9c27b0;min-width:70px;"onclick="showSaveCode()">📋存档码</button><button class="buy-btn"style="flex:1;background:#00bcd4;min-width:70px;"onclick="importFromClipboard()">📎粘贴导入</button></div></div>`;
            document.getElementById('tab-shop').innerHTML=[...equipmentDB.weapons,...equipmentDB.armors].map(item=>{const type=equipmentDB.weapons.includes(item)?'weapon':'armor';const owned=player.inventory.some(i=>i.name===item.name)||player.equipment[type].name===item.name;const equipped=player.equipment[type].name===item.name;return`<div class="list-item"><span>${item.emoji}</span><span>${item.name}${type==='weapon'?'攻':'防'}+${type==='weapon'?item.attack:item.defense}</span><span>💰${item.price}</span>${equipped?'<button class="buy-btn owned"disabled>已装备</button>':owned?`<button class="buy-btn"onclick="equipItem('${type}','${item.name}')">装备</button>`:`<button class="buy-btn"${player.gold<item.price||player.level<item.level?'disabled':''}onclick="buyItem('${type}','${item.name}')">购买</button>`}</div>`;}).join('');
            document.getElementById('tab-cards').innerHTML=allCards.map(c=>{const col=player.cardCollection.find(cc=>cc.id===c.id);return`<div class="list-item ${col?'unlocked':'locked'}"><span>${c.emoji}${c.name}</span><span style="font-size:9px;">[${c.rarity}]${col?'✅':'❌'}</span></div>`;}).join('')+`<div style="margin-top:6px;">收集:${player.cardCollection.length}/${allCards.length}</div>`;
            document.getElementById('tab-stats').innerHTML=`<div class="stat-item"><span>游戏时间</span><span>${Math.floor(battleStats.playTime/3600)}h</span></div><div class="stat-item"><span>总伤害</span><span>${battleStats.totalDamageDealt}</span></div><div class="stat-item"><span>最高伤害</span><span>${battleStats.maxHit}</span></div><div class="stat-item"><span>暴击次数</span><span>${battleStats.critsLanded}</span></div><div class="stat-item"><span>击杀数</span><span>${player.totalKills}</span></div><div class="stat-item"><span>精英击杀</span><span>${battleStats.elitesKilled}</span></div><div class="stat-item"><span>竞技胜</span><span>${player.arenaWins}</span></div><div class="stat-item"><span>转生</span><span>${player.rebirthCount}</span></div>`;
            document.getElementById('tab-life').innerHTML=`<div class="list-item"onclick="fish()"><span>🎣钓鱼Lv.${lifeSkills.fishing.level}</span><span>${lifeSkills.fishing.exp}/${lifeSkills.fishing.expToLevel}</span></div><div class="list-item"onclick="mine()"><span>⛏️挖矿Lv.${lifeSkills.mining.level}</span><span>${lifeSkills.mining.exp}/${lifeSkills.mining.expToLevel}</span></div>`;
            document.getElementById('tab-arena').innerHTML=arenaOpponents.map(o=>`<div class="list-item"onclick="enterArena();toggleModal('mainModal')"><span>${o.emoji}${o.name}Lv.${o.level}</span><span>💰${o.gold}</span></div>`).join('')+`<div>累计胜利:${player.arenaWins}</div>`;
            // 战斗日志
            document.getElementById('tab-log').innerHTML = '<div style="max-height:300px;overflow-y:auto;">' + battleLog.slice(-30).reverse().map(log => `<div class="battle-log-item battle-log-${log.type}">${log.time} ${log.msg}</div>`).join('') + (battleLog.length === 0 ? '<div style="font-size:10px;color:#666;">暂无战斗记录</div>' : '') + '</div>';
        }

        // ==================== 辅助函数 ====================
        function updatePlayerStats(){let ba=12+(player.level-1)*3;let bd=5+(player.level-1);if(player.equipment?.weapon)ba+=player.equipment.weapon.attack||0;if(player.equipment?.armor)bd+=player.equipment.armor.defense||0;const bonus=1+(player.rebirthBonus||0);player.attack=Math.max(1,Math.floor(ba*bonus));player.defense=Math.max(0,Math.floor(bd*bonus));}
        function updateTitle(){const av=titles.filter(t=>t.condition());const best=av[av.length-1];if(best&&best.name!==player.title){player.title=best.name;player.titleIcon=best.icon;showToast(`🏅${best.icon}${best.name}`);}}
        function findSkill(id){for(const skills of Object.values(skillTree)){const f=skills.find(s=>s.id===id);if(f)return f;}return null;}
        function learnSkill(id){if(player.skillPoints<=0){showToast('❌技能点不足');return;}const skill=findSkill(id);if(!skill||player.learnedSkills.includes(id))return;if(skill.req&&!player.learnedSkills.includes(skill.req)){showToast('❌需前置技能:'+(findSkill(skill.req)?.name||skill.req));return;}player.learnedSkills.push(id);player.skillPoints--;sound.play('buy');showToast(`✅学会${skill.name}`);updateAllTabs();autoSave();}
        function equipSkill(id){if(!player.learnedSkills.includes(id))return;player.equippedSkill=id;showToast(`⚔️装备${findSkill(id).name}`);updateUI();updateAllTabs();}
        function adoptPet(i){player.pet={...petsDB[i]};sound.play('buy');showToast(`🐾${player.pet.name}`);updateUI();updateAllTabs();autoSave();}
        function buyItem(type,name){const db=type==='weapon'?equipmentDB.weapons:equipmentDB.armors;const item=db.find(i=>i.name===name);if(!item||player.gold<item.price||player.level<item.level){showToast('❌无法购买');return;}player.gold-=item.price;player.inventory.push({...item,type});equipItem(type,name);sound.play('buy');addBattleLog(`🛒购买${item.name}`);showToast(`✅${item.name}`);updateAllTabs();updateUI();autoSave();}
        function equipItem(type,name){const db=type==='weapon'?equipmentDB.weapons:equipmentDB.armors;const item=db.find(i=>i.name===name)||player.inventory.find(i=>i.name===name&&i.type===type);if(!item)return;player.equipment[type]={...item};updatePlayerStats();showToast(`⚔️装备${name}`);updateAllTabs();updateUI();autoSave();}
        // 【修复】合成 - 检查装备+材料
        function craftItem(i){
            const r=recipes[i];
            for(const[m,q]of Object.entries(r.materials)){
                const wep = equipmentDB.weapons.find(w=>w.name===m);
                const arm = equipmentDB.armors.find(a=>a.name===m);
                if(wep && !hasEquipment(m,'weapon')){showToast(`❌需要拥有${m}(商店购买)`);return;}
                if(arm && !hasEquipment(m,'armor')){showToast(`❌需要拥有${m}(商店购买)`);return;}
                if(!wep && !arm){
                    const inv=player.inventory.find(it=>it.name===m);
                    if(!inv||inv.quantity<q){showToast(`❌缺少${m}x${q}`);return;}
                }
            }
            // 消耗材料（装备不消耗，只检查拥有）
            for(const[m,q]of Object.entries(r.materials)){
                const wep = equipmentDB.weapons.find(w=>w.name===m);
                const arm = equipmentDB.armors.find(a=>a.name===m);
                if(!wep && !arm){
                    const inv=player.inventory.find(it=>it.name===m);
                    inv.quantity-=q;
                    if(inv.quantity<=0)player.inventory=player.inventory.filter(it=>it.name!==m);
                }
            }
            const result=r.result;
            if(result.type==='potion'){player.potions+=1;showToast(`✅合成${result.name}！`);}
            else{player.inventory.push({...result,type:result.type});showToast(`✅合成${result.name}！`);}
            sound.play('craft');addBattleLog(`🔨合成${r.name}`,'system');updateAllTabs();autoSave();
        }
        function enterDungeon(i){player.currentDungeon=dungeons[i];player.dungeonFloor=1;showToast(`🕳️${dungeons[i].name}`);spawnDungeonMonster();toggleModal('mainModal');}
        function exitDungeon(){player.currentDungeon=null;player.dungeonFloor=1;isFighting=false;showToast('🚪退出副本');spawnEnemy();}
        function rebirth(){if(player.level<30){showToast('❌需Lv.30');return;}player.rebirthCount++;player.rebirthBonus=player.rebirthCount*0.1;player.rebirthPoints++;const kg=player.gold,kp=player.pet,ki=player.inventory,ks=[...player.learnedSkills],kc=[...player.cardCollection];player.level=1;player.exp=0;player.expToLevel=100;player.maxHp=Math.floor(100*(1+player.rebirthBonus));player.hp=player.maxHp;player.maxMp=Math.floor(50*(1+player.rebirthBonus));player.mp=player.maxMp;player.gold=kg;player.pet=kp;player.inventory=ki;player.learnedSkills=ks;player.cardCollection=kc;player.skillPoints+=3;updatePlayerStats();sound.play('rebirth');addBattleLog(`🔄转生${player.rebirthCount}次`,'system');showToast(`🔄转生${player.rebirthCount}次！+${Math.floor(player.rebirthBonus*100)}%`);isFighting=false;spawnEnemy();updateUI();updateAllTabs();autoSave();}
        function enterArena(){const opp={...arenaOpponents[Math.floor(Math.random()*arenaOpponents.length)]};currentEnemy={...opp,maxHp:opp.hp};isFighting=true;isArenaFight=true;addBattleLog(`⚔️竞技场挑战:${opp.name}`);showToast(`⚔️竞技场:${opp.name}`);updateUI();}
        function fish(){if(player.mp<5){showToast('❌精力不足');return;}player.mp-=5;if(Math.random()<0.5+lifeSkills.fishing.level*0.05){const fs=['🐟小鱼','🐠热带鱼','🐡河豚'];const f=fs[Math.floor(Math.random()*Math.min(lifeSkills.fishing.level,fs.length))];const g=Math.floor(Math.random()*30*lifeSkills.fishing.level+10);player.gold+=g;lifeSkills.fishing.exp+=20;sound.play('fish');showToast(`🎣${f}+${g}💰`);}else{showToast('🎣跑了...');lifeSkills.fishing.exp+=5;}checkLifeSkill('fishing');}
        function mine(){if(player.mp<8){showToast('❌精力不足');return;}player.mp-=8;if(Math.random()<0.4+lifeSkills.mining.level*0.05){const os=['🪨石头','⛏️铁矿','💎宝石'];const o=os[Math.floor(Math.random()*Math.min(lifeSkills.mining.level,os.length))];const g=Math.floor(Math.random()*40*lifeSkills.mining.level+15);player.gold+=g;lifeSkills.mining.exp+=25;showToast(`⛏️${o}+${g}💰`);}else{showToast('⛏️没挖到...');lifeSkills.mining.exp+=8;}checkLifeSkill('mining');}
        function checkLifeSkill(s){if(lifeSkills[s].exp>=lifeSkills[s].expToLevel){lifeSkills[s].level++;lifeSkills[s].exp-=lifeSkills[s].expToLevel;lifeSkills[s].expToLevel=Math.floor(lifeSkills[s].expToLevel*1.5);showToast(`⬆️${s==='fishing'?'🎣钓鱼':'⛏️挖矿'}Lv.${lifeSkills[s].level}`);}}

        // ==================== 战斗系统 ====================
        function spawnEnemy(){
            if(player.currentDungeon){spawnDungeonMonster();return;}
            const mm=monsters[player.currentMap];
            const av=mm.filter(m=>m.level<=player.level+3);
            currentEnemy={...(av.length>0?av[Math.floor(Math.random()*av.length)]:mm[0])};
            // 【新增】10%概率生成精英怪
            if(Math.random()<0.1 && !currentEnemy.isBoss){
                currentEnemy = {
                    ...currentEnemy,
                    name: `精英 ${currentEnemy.name}`,
                    hp: currentEnemy.hp * 3,
                    maxHp: currentEnemy.hp * 3,
                    attack: Math.floor(currentEnemy.attack * 1.5),
                    exp: currentEnemy.exp * 3,
                    gold: currentEnemy.gold * 3,
                    isElite: true
                };
                addBattleLog(`👑精英怪出现:${currentEnemy.name}`,'system');
            }
            currentEnemy.maxHp=currentEnemy.hp;
            if(currentEnemy.phases)currentEnemy.currentPhase=0;
            isFighting=true;updateUI();
            if(currentEnemy.isBoss)sound.play('boss');
            if(currentEnemy.isElite)showToast(`👑精英${currentEnemy.name}出现！`);
        }
        function spawnDungeonMonster(){if(player.dungeonFloor===player.currentDungeon.floors){currentEnemy={...player.currentDungeon.boss};addBattleLog(`👑副本Boss:${currentEnemy.name}`,'system');showToast(`👑Boss:${currentEnemy.name}`);sound.play('boss');}else{const mm=monsters[player.currentMap]||monsters.forest;currentEnemy={...mm[Math.floor(Math.random()*mm.length)]};currentEnemy.hp=Math.floor(currentEnemy.hp*0.8);currentEnemy.maxHp=currentEnemy.hp;}isFighting=true;updateUI();}
        function playerAttack(){
            if(!isFighting||!currentEnemy)return;
            const base=Math.floor((player.attack*player.weatherAttackMod)+Math.random()*10);
            const isCrit=Math.random()<0.15;
            const dmg=isCrit?Math.floor(base*1.5):base;
            currentEnemy.hp-=dmg;battleStats.totalDamageDealt+=dmg;
            if(dmg>battleStats.maxHit)battleStats.maxHit=dmg;
            if(isCrit)battleStats.critsLanded++;
            addBattleLog(`⚔️攻击${isCrit?'暴击!':''}-${dmg}HP`,'damage');
            showFloatingText(isCrit?`${dmg}!!`:`-${dmg}`,150+Math.random()*50,100+Math.random()*30,isCrit?'crit':'normal');
            sound.play(isCrit?'crit':'attack');if(isCrit)screenShake(3);
            if(navigator.vibrate)navigator.vibrate(isCrit?30:15);
            updateUI();if(currentEnemy.phases)checkBossPhase();
            if(currentEnemy.hp<=0){enemyDefeated();return;}
            setTimeout(enemyAttack, 800 / player.battleSpeed);
        }
        function useEquippedSkill(){
            const skill=findSkill(player.equippedSkill);
            if(!skill||player.mp<skill.mpCost){showToast('❌魔力不足');return;}
            player.mp-=skill.mpCost;player.dailySkills++;
            if(skill.damage){const dmg=Math.floor(player.attack*skill.damage*player.weatherAttackMod+Math.random()*20);currentEnemy.hp-=dmg;battleStats.totalDamageDealt+=dmg;if(dmg>battleStats.maxHit)battleStats.maxHit=dmg;addBattleLog(`✨${skill.name}-${dmg}HP`,'damage');showFloatingText(`-${dmg}`,180,80,skill.id.includes('fire')||skill.id.includes('meteor')?'crit':'skill');}
            if(skill.heal){player.hp=Math.min(player.maxHp,player.hp+skill.heal);addBattleLog(`💚治愈+${skill.heal}HP`,'heal');showFloatingText(`+${skill.heal}`,50,200,'heal');}
            if(skill.defense){player.tempDefense=skill.defense;player.shieldTurns=skill.duration;addBattleLog(`🛡️护盾+${skill.defense}`,'system');}
            sound.play('skill');screenShake(4);if(navigator.vibrate)navigator.vibrate([20,30,20,30,50]);
            updateUI();updateDailyQuests();if(currentEnemy.phases)checkBossPhase();
            if(currentEnemy.hp<=0){enemyDefeated();return;}
            setTimeout(enemyAttack, 900 / player.battleSpeed);
        }
        function enemyAttack(){
            if(!isFighting||!currentEnemy||currentEnemy.hp<=0)return;
            const dmg=Math.max(1,currentEnemy.attack-player.defense-player.tempDefense+Math.floor(Math.random()*5));
            player.hp-=dmg;battleStats.totalDamageTaken+=dmg;
            addBattleLog(`👊${currentEnemy.name}反击-${dmg}HP`,'damage');
            if(player.shieldTurns>0){player.shieldTurns--;if(player.shieldTurns<=0)player.tempDefense=0;}
            updateUI();checkPlayerDeath();
        }
        function checkBossPhase(){if(!currentEnemy?.phases||currentEnemy.hp<=0)return;const hpPct=(currentEnemy.hp/currentEnemy.maxHp)*100;for(let i=currentEnemy.phases.length-1;i>=0;i--){if(hpPct<=currentEnemy.phases[i].hpPercent&&i!==currentEnemy.currentPhase){currentEnemy.currentPhase=i;currentEnemy.attack=currentEnemy.phases[i].attack;if(currentEnemy.phases[i].message){addBattleLog(currentEnemy.phases[i].message,'system');showToast(currentEnemy.phases[i].message);}sound.play('boss');screenShake(8);break;}}}
        function enemyDefeated(){
            isFighting=false;
            const expGain=Math.max(1,Math.floor((currentEnemy.exp||10)*player.weatherExpMod));
            const goldGain=Math.max(1,Math.floor((currentEnemy.gold||5)*player.weatherGoldMod));
            player.exp+=expGain;player.gold+=goldGain;
            player.totalKills++;player.dailyKills++;player.dailyGold+=goldGain;
            if(currentEnemy.isBoss){player.dailyBossKills=(player.dailyBossKills||0)+1;battleStats.bossesKilled++;}
            if(currentEnemy.isElite){battleStats.elitesKilled++;}
            updateKillStreak();
            addBattleLog(`🎉击败${currentEnemy.name}+${expGain}EXP+${goldGain}💰`,'system');
            showToast(`🎉击败${currentEnemy.name}！+${expGain}EXP+${goldGain}💰`);
            sound.play('kill');dropMaterials();tryDropCard();checkRandomEvent();
            if(Math.random()<0.3){player.potions++;showToast('🧪获得药水');}
            if(player.currentDungeon){if(player.dungeonFloor>=player.currentDungeon.floors){player.gold+=player.currentDungeon.reward.gold;player.exp+=player.currentDungeon.reward.exp;battleStats.dungeonsCleared++;addBattleLog('🏆副本通关！','system');showToast('🏆副本通关！');player.currentDungeon=null;player.dungeonFloor=1;}else{player.dungeonFloor++;}}
            if(currentEnemy.name==='灭世魔龙'){worldBoss.lastKilled=Date.now();updateBossTimer();}
            if(isArenaFight){player.arenaWins++;addBattleLog(`🏆竞技胜利！累计${player.arenaWins}胜`,'system');showToast(`🏆竞技胜利！累计${player.arenaWins}胜`);isArenaFight=false;}
            checkLevelUp();checkAchievements();updateDailyQuests();updateTitle();updateUI();
            if(navigator.vibrate)navigator.vibrate([30,20,30,20,50]);autoSave();
            setTimeout(()=>{if(player.currentDungeon)spawnDungeonMonster();else spawnEnemy();},2000 / player.battleSpeed);
        }
        function dropMaterials(){(materialDropTable[currentEnemy.name]||[]).forEach(d=>{if(Math.random()<d.chance){const ex=player.inventory.find(i=>i.name===d.item);if(ex)ex.quantity+=d.qty;else player.inventory.push({type:'material',name:d.item,emoji:d.emoji,quantity:d.qty});addBattleLog(`${d.emoji}${d.item}x${d.qty}`,'loot');showToast(`${d.emoji}${d.item}x${d.qty}`);}});}
        function tryDropCard(){const card=allCards.find(c=>c.name===currentEnemy.name.replace('精英 ',''));if(card&&!player.cardCollection.find(c=>c.id===card.id)&&Math.random()<card.dropRate){player.cardCollection.push({...card,obtainedAt:Date.now()});addBattleLog(`🃏获得卡牌:${card.name}`,'system');showToast(`🃏${card.emoji}${card.name}[${card.rarity}]`);sound.play('card');if(player.cardCollection.length>=allCards.length){const a=achievements.find(a=>a.id==='card_collector');if(a&&!a.unlocked){a.unlocked=true;showAchievementPopup(a);}}}}
        function checkPlayerDeath(){if(player.hp<=0){player.hp=0;isFighting=false;addBattleLog('💀被击败...','system');showToast('💀被击败...');updateUI();setTimeout(()=>{player.hp=Math.floor(player.maxHp*0.5);player.mp=Math.floor(player.maxMp*0.5);addBattleLog('✨复活','system');showToast('✨复活');updateUI();if(player.currentDungeon){player.currentDungeon=null;player.dungeonFloor=1;}spawnEnemy();},2000);}}
        function checkLevelUp(){let leveled=false;while(player.exp>=player.expToLevel&&player.expToLevel>0&&player.level<999){player.level++;player.exp-=player.expToLevel;player.expToLevel=Math.floor(player.expToLevel*1.3);player.skillPoints++;player.maxHp+=Math.floor(20*(1+(player.rebirthBonus||0)));player.hp=player.maxHp;player.maxMp+=Math.floor(10*(1+(player.rebirthBonus||0)));player.mp=player.maxMp;leveled=true;}if(leveled){updatePlayerStats();sound.play('levelup');showLevelUpEffect();addBattleLog(`🎊升级！Lv.${player.level}`,'system');showToast(`🎊升级！Lv.${player.level}！`);screenShake(6);checkAchievements();updateTitle();updateUI();autoSave();}}
        function checkAchievements(){achievements.forEach(a=>{if(!a.unlocked){let u=false;if(a.id==='first_kill')u=player.totalKills>=1;else if(a.target&&a.id.includes('slayer_'))u=player.totalKills>=a.target;else if(a.target&&a.id.includes('rich_'))u=player.gold>=a.target;else if(a.target&&a.id.includes('level_'))u=player.level>=a.target;else if(a.id==='dragon_slayer')u=currentEnemy?.name==='远古巨龙'&&currentEnemy?.hp<=0;else if(a.id==='rebirth_1')u=player.rebirthCount>=1;else if(a.id==='card_collector')u=player.cardCollection.length>=allCards.length;else if(a.id==='combo_10')u=player.killStreak>=10;else if(a.id==='elite_10')u=battleStats.elitesKilled>=10;if(u){a.unlocked=true;showAchievementPopup(a);}}});}
        function checkDailyReset(){const today=new Date().toDateString();if(localStorage.getItem('questDate')!==today){dailyQuests.forEach(q=>{q.progress=0;q.claimed=false;});player.dailyKills=0;player.dailySkills=0;player.dailyGold=0;player.dailyBossKills=0;localStorage.setItem('questDate',today);}}
        function updateDailyQuests(){dailyQuests[0].progress=Math.min(player.dailyKills,10);dailyQuests[1].progress=Math.min(player.dailySkills,5);dailyQuests[2].progress=Math.min(player.dailyGold,200);dailyQuests[3].progress=Math.min(player.dailyBossKills||0,1);dailyQuests.forEach(q=>{if(q.progress>=q.target&&!q.claimed){player.gold+=q.reward;q.claimed=true;showToast(`✅任务+${q.reward}💰`);}});}
        function usePotion(){if(player.potions<=0){showToast('❌没药水');return;}if(player.hp>=player.maxHp){showToast('❤️HP已满');return;}player.potions--;battleStats.potionsUsed++;player.hp=Math.min(player.maxHp,player.hp+50);addBattleLog('🧪使用药水+50HP','heal');showFloatingText('+50',50,200,'heal');sound.play('heal');updateUI();autoSave();}
        function selectMap(map){player.currentMap=map;player.currentDungeon=null;isFighting=false;addBattleLog(`🗺️前往${getMapDisplayName()}`);showToast(`🗺️${getMapDisplayName()}`);spawnEnemy();autoSave();toggleModal('mainModal');}
        function createParticles(){const c=document.getElementById('particles');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=Math.random()*2+1+'px';p.style.animationDuration=Math.random()*3+2+'s';p.style.animationDelay=Math.random()*3+'s';c.appendChild(p);}}

        // ==================== 手势 ====================
        let tc=0,tt;
        document.getElementById('enemyContainer').addEventListener('touchstart',e=>{e.preventDefault();tc++;clearTimeout(tt);tt=setTimeout(()=>{if(tc===1)playerAttack();if(tc>=2)useEquippedSkill();tc=0;},300);});
        document.getElementById('enemyContainer').addEventListener('click',()=>playerAttack());
        let sx=0;
        document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
        document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-sx;if(Math.abs(d)>100&&!player.currentDungeon){const maps=['forest','cave','castle','dragon'];const idx=maps.indexOf(player.currentMap);const ni=d>0?Math.max(0,idx-1):Math.min(maps.length-1,idx+1);if(ni!==idx)selectMap(maps[ni]);}},{passive:true});

        // ==================== 初始化 ====================
        function initGame(){
            createParticles();weatherSystem.update();checkDailyReset();checkIn.load();
            const loaded=loadGame();if(!loaded){player.expToLevel=100;updatePlayerStats();}
            updatePlayerStats();updateSpeedButtons();calculateOfflineRewards();spawnEnemy();updateUI();updateTitle();updateBossTimer();updateCheckinBtn();
            setInterval(updateBossTimer,1000);
            setInterval(()=>{if(document.hasFocus())battleStats.playTime++;},1000);
            setInterval(()=>weatherSystem.update(),300000);
            window.addEventListener('beforeunload',()=>{saveGame();localStorage.setItem('lastOnlineTime',Date.now());});
            addBattleLog('🎮游戏开始');
            console.log('🎮最终完美版|⚡速度调节|👑精英怪|📜战斗日志|🔨合成修复');
        }
        initGame();
    </script>
</body>
</html>
