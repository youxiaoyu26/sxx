<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柚小屿 - 智能系统</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --drawer-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "Noto Sans SC", sans-serif;
            touch-action: pan-x pan-y;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #24243e, #302b63, #0f0c29);
            overflow: hidden;
        }

        /* --- 登录注册卡片 --- */
        .container {
            width: 380px;
            height: 480px;
            perspective: 1200px;
            z-index: 10;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flipped { transform: rotateY(180deg); }

        .form-box {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .register-box { transform: rotateY(180deg); }

        h2 { color: #fff; font-weight: 300; margin-bottom: 35px; letter-spacing: 2px; text-align: center; }

        .input-group { position: relative; margin-bottom: 25px; }

        input {
            width: 100%; padding: 12px; background: transparent; border: none;
            border-bottom: 1px solid var(--border); color: #fff; outline: none; transition: 0.3s;
        }

        label {
            position: absolute; left: 0; top: 12px; color: rgba(255,255,255,0.4);
            transition: 0.3s ease; pointer-events: none;
        }

        input:focus ~ label, input:valid ~ label { top: -12px; font-size: 12px; color: var(--primary); }

        button {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .switch-btn { margin-top: auto; color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; cursor: pointer; }
        .switch-btn span { color: var(--primary); font-weight: bold; }

        /* --- 登录后的主页面 --- */
        #main-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5;
            z-index: 100;
        }

        .navbar {
            position: absolute; top: 0; width: 100%; height: 65px;
            padding: 0 30px; display: flex; justify-content: space-between;
            align-items: center; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .logo { font-size: 20px; font-weight: 800; color: #333; }

        /* 三条杠图标 */
        .menu-btn {
            width: 30px; height: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; z-index: 1001;
        }

        .menu-btn span { display: block; width: 100%; height: 3px; background: #333; border-radius: 2px; }

        /* --- 右侧切入页面 (抽屉) --- */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0; visibility: hidden;
            transition: 0.4s; z-index: 1000;
        }

        .sidebar {
            position: fixed;
            top: 0; right: -40%; /* 初始在右侧外部 */
            width: 40%; height: 100%;
            background: var(--drawer-bg);
            backdrop-filter: blur(10px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1001;
            padding: 100px 40px;
        }

        /* 激活状态 */
        .sidebar-active .sidebar { transform: translateX(-100%); }
        .sidebar-active .sidebar-overlay { opacity: 1; visibility: visible; }

        .user-info-card {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .user-info-card p { color: #888; font-size: 14px; }
        .display-name {
            font-size: 24px; color: var(--primary); font-weight: 700; margin-top: 5px;
        }

        .menu-list { list-style: none; }
        .menu-list li {
            padding: 15px 0; border-bottom: 1px solid #f5f5f5;
            color: #444; cursor: pointer; transition: 0.2s;
        }
        .menu-list li:hover { color: var(--primary); padding-left: 10px; }

        @keyframes fadeInPage {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container" id="auth-container">
        <div class="card-inner" id="card-inner">
            <div class="form-box login-box">
                <h2>登录</h2>
                <div class="input-group">
                    <input type="text" id="login-user" required autocomplete="off">
                    <label>账号</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-pass" required>
                    <label>密码</label>
                </div>
                <button onclick="handleLogin()">进入</button>
                <p class="switch-btn">还没有账号？<span onclick="toggleCard()">立即注册</span></p>
            </div>

            <div class="form-box register-box">
                <h2>注册</h2>
                <div class="input-group">
                    <input type="text" id="reg-user" required autocomplete="off">
                    <label>账号名称</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" required>
                    <label>密码</label>
                </div>
                <button onclick="handleRegister()">创建账户</button>
                <p class="switch-btn">已有账号？<span onclick="toggleCard()">返回登录</span></p>
            </div>
        </div>
    </div>

    <div id="main-page">
        <nav class="navbar">
            <div class="logo">柚小屿</div>
            <div class="menu-btn" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </nav>

        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <div class="sidebar">
            <div class="user-info-card">
                <p>当前登录用户</p>
                <div class="display-name" id="sidebar-user-name">未登录</div>
            </div>
            <ul class="menu-list">
                <li>个人中心</li>
                <li>系统设置</li>
                <li>消息通知</li>
                <li onclick="location.reload()" style="color: #ff4757;">退出登录</li>
            </ul>
        </div>
    </div>

    <script>
        const cardInner = document.getElementById('card-inner');
        const authContainer = document.getElementById('auth-container');
        const mainPage = document.getElementById('main-page');
        const sidebarUserName = document.getElementById('sidebar-user-name');

        function toggleCard() { cardInner.classList.toggle('flipped'); }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-active');
        }

        function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            if (user && pass) {
                localStorage.setItem(user, pass);
                alert('注册成功！');
                toggleCard();
            }
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const savedPass = localStorage.getItem(user);

            if (savedPass === pass && user !== "") {
                // 1. 设置侧边栏的名字
                sidebarUserName.innerText = user;

                // 2. 动画转场
                authContainer.style.transition = '0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                authContainer.style.opacity = '0';
                authContainer.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    authContainer.style.display = 'none';
                    mainPage.style.display = 'block';
                    mainPage.style.animation = 'fadeInPage 0.8s ease forwards';
                }, 600);
            } else {
                alert('账号或密码不正确');
            }
        }
    </script>
</body>
</html>
