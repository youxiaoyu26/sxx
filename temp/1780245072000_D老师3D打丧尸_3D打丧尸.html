<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🧟 3D打丧尸·完全版 - D老师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .top-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .info-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 6px 14px;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .info-card .val {
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 30px;
            text-align: center;
        }
        .health-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
        .health-fill {
            width: 80px;
            height: 14px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .health-fill-inner {
            height: 100%;
            background: #ff4757;
            transition: width 0.3s;
        }

        /* 移动摇杆 */
        .move-stick {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .move-thumb {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transition: transform 0.05s;
        }

        /* 悬浮窗 */
        .float-btn {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 20;
            cursor: pointer;
        }
        .float-panel {
            position: absolute;
            top: 50%;
            right: 90px;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            z-index: 20;
        }
        .float-panel.active {
            display: flex;
        }
        .float-panel button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .float-panel button.active {
            background: rgba(255,200,0,0.3);
            border-color: #ffcc00;
        }

        /* 方框、血条等UI元素容器 */
        .zombie-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .zombie-box {
            position: absolute;
            border: 2px solid red;
            border-radius: 4px;
            display: none;
        }
        .zombie-health-div {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            display: none;
            text-align: center;
            white-space: nowrap;
        }
        .line-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 14;
            display: none;
        }
        .game-over-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 30px 36px;
            text-align: center;
            color: #fff;
            display: none;
            pointer-events: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .game-over-panel.active {
            display: block;
        }
        .game-over-panel h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .game-over-panel .final-score {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-over-panel button {
            margin-top: 18px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: #fff;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,71,87,0.5);
        }
    </style>
</head>
<body>
    <canvas id="lineCanvas" class="line-canvas"></canvas>
    <div id="ui">
        <div class="top-bar">
            <div class="info-card">
                <span>🧟</span>
                <span class="val" id="scoreDisplay">0</span>
            </div>
            <div class="health-bar">
                <span>❤️</span>
                <div class="health-fill">
                    <div class="health-fill-inner" id="healthFill" style="width:100%"></div>
                </div>
            </div>
        </div>

        <!-- 移动摇杆 -->
        <div class="move-stick" id="moveStick">
            <div class="move-thumb" id="moveThumb"></div>
        </div>

        <!-- 悬浮功能按钮 -->
        <div class="float-btn" id="floatBtn">⚙️</div>
        <div class="float-panel" id="floatPanel">
            <button id="btnBox">📦 框选丧尸</button>
            <button id="btnAntenna">📡 天线连接</button>
            <button id="btnHealthBar">❤️ 显示血量</button>
            <button id="btnAimbot">🎯 自瞄</button>
        </div>

        <!-- 丧尸叠加层 -->
        <div class="zombie-overlay" id="zombieOverlay"></div>

        <div class="game-over-panel" id="gameOverPanel">
            <h2>☠️ 你被丧尸淹没了</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="color:rgba(255,255,255,0.7)">击杀数</p>
            <button id="restartBtn">🔄 再来一局</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script>
        (function() {
            // ========== 场景初始化 ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 30);

            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.3, 50);
            camera.position.set(0, 1.6, 0);
            camera.rotation.order = 'YXZ';

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 地面
            const groundGeo = new THREE.PlaneGeometry(30, 30);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d2d3a, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.01;
            ground.receiveShadow = true;
            scene.add(ground);

            // 光照
            const ambient = new THREE.AmbientLight(0x334455);
            scene.add(ambient);
            const moonLight = new THREE.DirectionalLight(0x8899cc, 0.7);
            moonLight.position.set(5, 10, -5);
            moonLight.castShadow = true;
            moonLight.shadow.mapSize.width = 1024;
            moonLight.shadow.mapSize.height = 1024;
            moonLight.shadow.camera.near = 1;
            moonLight.shadow.camera.far = 40;
            moonLight.shadow.camera.left = -15;
            moonLight.shadow.camera.right = 15;
            moonLight.shadow.camera.top = 15;
            moonLight.shadow.camera.bottom = -15;
            scene.add(moonLight);

            // 建筑
            function createBuilding(x, z, w, d, h, color) {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
                const building = new THREE.Mesh(geo, mat);
                building.position.set(x, h/2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
            }
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const radius = 13 + Math.random() * 4;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const w = 1.5 + Math.random() * 2;
                const d = 1.5 + Math.random() * 2;
                const h = 2 + Math.random() * 4;
                const gray = 0x3a3a4a + Math.floor(Math.random()*0x222222);
                createBuilding(x, z, w, d, h, gray);
            }

            // ========== 丧尸模型 ==========
            function createZombie() {
                const group = new THREE.Group();
                const skinColor = 0x5a7247;
                const darkSkin = 0x3a4a2e;
                const bodyGeo = new THREE.BoxGeometry(0.7, 1.1, 0.5);
                const bodyMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.9 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.8;
                body.castShadow = true;
                group.add(body);
                const headGeo = new THREE.SphereGeometry(0.35, 8, 8);
                const headMat = new THREE.MeshStandardMaterial({ color: darkSkin, roughness: 0.7 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.5;
                head.castShadow = true;
                group.add(head);
                const armGeo = new THREE.BoxGeometry(0.25, 0.9, 0.25);
                const armMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.9 });
                const leftArm = new THREE.Mesh(armGeo, armMat);
                leftArm.position.set(-0.5, 0.9, 0);
                leftArm.castShadow = true;
                group.add(leftArm);
                const rightArm = new THREE.Mesh(armGeo, armMat);
                rightArm.position.set(0.5, 0.9, 0);
                rightArm.castShadow = true;
                group.add(rightArm);
                const legGeo = new THREE.BoxGeometry(0.3, 0.8, 0.3);
                const legMat = new THREE.MeshStandardMaterial({ color: darkSkin, roughness: 0.9 });
                const leftLeg = new THREE.Mesh(legGeo, legMat);
                leftLeg.position.set(-0.25, 0.4, 0);
                leftLeg.castShadow = true;
                group.add(leftLeg);
                const rightLeg = new THREE.Mesh(legGeo, legMat);
                rightLeg.position.set(0.25, 0.4, 0);
                rightLeg.castShadow = true;
                group.add(rightLeg);
                group.userData = {
                    head,
                    body,
                    leftArm,
                    rightArm,
                    leftLeg,
                    rightLeg,
                    speed: 0.4 + Math.random() * 0.4,
                    hitRadius: 1.0,
                    health: 100,
                    maxHealth: 100,
                };
                return group;
            }

            // ========== 游戏状态 ==========
            let zombies = [];
            let particles = [];
            let score = 0;
            let playerHealth = 100;
            let gameRunning = true;
            let cameraYaw = 0;
            let cameraPitch = 0;
            const pitchMin = -0.4;
            const pitchMax = 0.8;
            let playerPosition = new THREE.Vector3(0, 0, 0);
            let moveInput = new THREE.Vector2(0, 0);

            // 功能开关
            let showBoxes = false;
            let showAntenna = false;
            let showHealthBars = false;
            let aimbotActive = false;
            let aimbotTarget = null;

            let invincibleTimer = 0;
            let leftTouchId = null;
            let lastLeftX = 0;
            let lastLeftY = 0;

            // UI元素
            const scoreDisplay = document.getElementById('scoreDisplay');
            const healthFill = document.getElementById('healthFill');
            const gameOverPanel = document.getElementById('gameOverPanel');
            const finalScore = document.getElementById('finalScore');
            const zombieOverlay = document.getElementById('zombieOverlay');
            const lineCanvas = document.getElementById('lineCanvas');
            const lineCtx = lineCanvas.getContext('2d');
            const floatBtn = document.getElementById('floatBtn');
            const floatPanel = document.getElementById('floatPanel');

            function updateUI() {
                scoreDisplay.textContent = score;
                healthFill.style.width = playerHealth + '%';
            }

            function hurtPlayer(damage) {
                if (!gameRunning || invincibleTimer > 0) return;
                playerHealth = Math.max(0, playerHealth - damage);
                invincibleTimer = 1.0;
                updateUI();
                if (playerHealth <= 0) endGame();
            }

            function endGame() {
                gameRunning = false;
                finalScore.textContent = score;
                gameOverPanel.classList.add('active');
            }

            function restartGame() {
                zombies.forEach(z => scene.remove(z));
                particles.forEach(p => scene.remove(p));
                zombies = [];
                particles = [];
                score = 0;
                playerHealth = 100;
                gameRunning = true;
                cameraYaw = 0;
                cameraPitch = 0;
                invincibleTimer = 0;
                playerPosition.set(0, 0, 0);
                moveInput.set(0, 0);
                aimbotTarget = null;
                gameOverPanel.classList.remove('active');
                updateUI();
                for (let i = 0; i < 4; i++) spawnZombie();
            }

            // ========== 丧尸生成 ==========
            function spawnZombie() {
                const zombie = createZombie();
                const angle = Math.random() * Math.PI * 2;
                const radius = 8 + Math.random() * 7;
                const x = playerPosition.x + Math.cos(angle) * radius;
                const z = playerPosition.z + Math.sin(angle) * radius;
                zombie.position.set(x, 0, z);
                zombie.lookAt(playerPosition.x, zombie.position.y, playerPosition.z);
                scene.add(zombie);
                zombies.push(zombie);
            }

            function spawnZombieDeath(pos) {
                const count = 25;
                const geo = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const darkRed = new THREE.Color(0x8b0000);
                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = pos.x + (Math.random() - 0.5) * 1.5;
                    positions[i+1] = pos.y + Math.random() * 1.5;
                    positions[i+2] = pos.z + (Math.random() - 0.5) * 1.5;
                    colors[i] = darkRed.r;
                    colors[i+1] = darkRed.g;
                    colors[i+2] = darkRed.b;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                const mat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false });
                const ps = new THREE.Points(geo, mat);
                ps.position.copy(pos);
                ps.userData.life = 0.8;
                scene.add(ps);
                particles.push(ps);
            }

            // ========== 射击逻辑 ==========
            function shoot() {
                if (!gameRunning) return;
                const raycaster = new THREE.Raycaster();
                raycaster.set(camera.position, camera.getWorldDirection(new THREE.Vector3()));
                const intersects = raycaster.intersectObjects(zombies, true);
                if (intersects.length > 0) {
                    let hitZombie = null;
                    for (const intersect of intersects) {
                        let obj = intersect.object;
                        while (obj) {
                            if (zombies.includes(obj)) {
                                hitZombie = obj;
                                break;
                            }
                            obj = obj.parent;
                        }
                        if (hitZombie) break;
                    }
                    if (hitZombie) {
                        hitZombie.userData.health -= 34; // 3枪击杀
                        if (hitZombie.userData.health <= 0) {
                            spawnZombieDeath(hitZombie.position);
                            scene.remove(hitZombie);
                            const index = zombies.indexOf(hitZombie);
                            zombies.splice(index, 1);
                            score++;
                            updateUI();
                            // 自瞄切换目标
                            if (aimbotActive && aimbotTarget === hitZombie) {
                                findNewAimbotTarget();
                            }
                        }
                    }
                }
            }

            // ========== 自瞄逻辑 ==========
            function findNewAimbotTarget() {
                if (!aimbotActive || zombies.length === 0) {
                    aimbotTarget = null;
                    return;
                }
                let closestDist = Infinity;
                let closest = null;
                const camPos = camera.position;
                for (const z of zombies) {
                    const dist = camPos.distanceTo(z.position);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closest = z;
                    }
                }
                aimbotTarget = closest;
            }

            // ========== 3D到屏幕投影 ==========
            function toScreenPosition(worldPos) {
                const vector = worldPos.clone().project(camera);
                const x = (vector.x + 1) / 2 * window.innerWidth;
                const y = (-vector.y + 1) / 2 * window.innerHeight;
                return { x, y, visible: vector.z < 1 };
            }

            // ========== 更新UI叠加层 ==========
            function updateOverlays() {
                // 清除之前的方框
                zombieOverlay.innerHTML = '';
                if (!gameRunning && zombies.length === 0) return;

                // 创建/更新每个丧尸的UI
                for (const zombie of zombies) {
                    const headPos = zombie.position.clone();
                    headPos.y += 1.5; // 头部位置
                    const screenHead = toScreenPosition(headPos);
                    const screenFoot = toScreenPosition(zombie.position);

                    if (!screenHead.visible) continue;

                    // 方框
                    if (showBoxes) {
                        const box = document.createElement('div');
                        box.className = 'zombie-box';
                        const height = Math.abs(screenHead.y - screenFoot.y) * 0.8;
                        const width = height * 0.6;
                        box.style.left = (screenHead.x - width/2) + 'px';
                        box.style.top = (screenHead.y) + 'px';
                        box.style.width = width + 'px';
                        box.style.height = height + 'px';
                        box.style.display = 'block';
                        box.style.borderColor = aimbotTarget === zombie ? '#ff0' : '#ff0000';
                        zombieOverlay.appendChild(box);
                    }

                    // 血量条
                    if (showHealthBars) {
                        const healthDiv = document.createElement('div');
                        healthDiv.className = 'zombie-health-div';
                        const percent = Math.ceil(zombie.userData.health / zombie.userData.maxHealth * 100);
                        healthDiv.textContent = percent + '%';
                        healthDiv.style.left = (screenHead.x - 20) + 'px';
                        healthDiv.style.top = (screenHead.y - 25) + 'px';
                        healthDiv.style.display = 'block';
                        healthDiv.style.color = percent > 60 ? '#0f0' : percent > 30 ? '#ff0' : '#f00';
                        zombieOverlay.appendChild(healthDiv);
                    }
                }

                // 天线
                if (showAntenna) {
                    lineCanvas.style.display = 'block';
                    lineCanvas.width = window.innerWidth;
                    lineCanvas.height = window.innerHeight;
                    lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
                    lineCtx.strokeStyle = '#00ff88';
                    lineCtx.lineWidth = 2;
                    const startX = window.innerWidth / 2;
                    const startY = window.innerHeight * 0.05;
                    for (const zombie of zombies) {
                        const headPos = zombie.position.clone();
                        headPos.y += 1.5;
                        const screen = toScreenPosition(headPos);
                        if (!screen.visible) continue;
                        lineCtx.beginPath();
                        lineCtx.moveTo(startX, startY);
                        lineCtx.lineTo(screen.x, screen.y);
                        lineCtx.stroke();
                    }
                } else {
                    lineCanvas.style.display = 'none';
                }
            }

            // ========== 移动摇杆处理 ==========
            const moveStick = document.getElementById('moveStick');
            const moveThumb = document.getElementById('moveThumb');
            let moveTouchId = null;
            let moveStartPos = { x: 0, y: 0 };

            moveStick.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                if (moveTouchId === null) {
                    moveTouchId = touch.identifier;
                    const rect = moveStick.getBoundingClientRect();
                    moveStartPos.x = rect.left + rect.width/2;
                    moveStartPos.y = rect.top + rect.height/2;
                }
            });
            moveStick.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.identifier === moveTouchId) {
                        const dx = touch.clientX - moveStartPos.x;
                        const dy = touch.clientY - moveStartPos.y;
                        const maxDist = 50;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const clampDist = Math.min(dist, maxDist);
                        const angle = Math.atan2(dy, dx);
                        const thumbX = Math.cos(angle) * clampDist;
                        const thumbY = Math.sin(angle) * clampDist;
                        moveThumb.style.transform = `translate(${thumbX}px, ${thumbY}px)`;
                        moveInput.set(dx / maxDist, -dy / maxDist);
                    }
                }
            });
            moveStick.addEventListener('touchend', (e) => {
                for (const touch of e.changedTouches) {
                    if (touch.identifier === moveTouchId) {
                        moveTouchId = null;
                        moveThumb.style.transform = 'translate(0px, 0px)';
                        moveInput.set(0, 0);
                    }
                }
            });

            // ========== 视角控制修复 ==========
            const canvas = renderer.domElement;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.clientX < window.innerWidth / 2 && touch.target === canvas) {
                        if (leftTouchId === null) {
                            leftTouchId = touch.identifier;
                            lastLeftX = touch.clientX;
                            lastLeftY = touch.clientY;
                        }
                    } else if (touch.clientX >= window.innerWidth / 2 && touch.target === canvas) {
                        shoot();
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (touch.identifier === leftTouchId) {
                        const dx = touch.clientX - lastLeftX;
                        const dy = touch.clientY - lastLeftY;
                        cameraYaw -= dx * 0.005;
                        cameraPitch += dy * 0.005;
                        cameraPitch = Math.max(pitchMin, Math.min(pitchMax, cameraPitch));
                        lastLeftX = touch.clientX;
                        lastLeftY = touch.clientY;
                        updateCameraRotation();
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                for (const touch of e.changedTouches) {
                    if (touch.identifier === leftTouchId) leftTouchId = null;
                }
            });

            function updateCameraRotation() {
                const euler = new THREE.Euler(cameraPitch, cameraYaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);
            }

            // ========== 悬浮面板交互 ==========
            floatBtn.addEventListener('click', () => {
                floatPanel.classList.toggle('active');
            });
            floatBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                floatPanel.classList.toggle('active');
            });

            document.getElementById('btnBox').addEventListener('click', function() {
                showBoxes = !showBoxes;
                this.classList.toggle('active', showBoxes);
            });
            document.getElementById('btnAntenna').addEventListener('click', function() {
                showAntenna = !showAntenna;
                this.classList.toggle('active', showAntenna);
            });
            document.getElementById('btnHealthBar').addEventListener('click', function() {
                showHealthBars = !showHealthBars;
                this.classList.toggle('active', showHealthBars);
            });
            document.getElementById('btnAimbot').addEventListener('click', function() {
                aimbotActive = !aimbotActive;
                this.classList.toggle('active', aimbotActive);
                if (aimbotActive) {
                    findNewAimbotTarget();
                } else {
                    aimbotTarget = null;
                }
            });

            document.getElementById('restartBtn').addEventListener('click', restartGame);

            // ========== 游戏循环 ==========
            const clock = new THREE.Clock();
            let spawnTimer = 0;

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.1);

                if (gameRunning) {
                    if (invincibleTimer > 0) invincibleTimer -= dt;

                    // 玩家移动
                    if (moveInput.length() > 0.1) {
                        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                        forward.y = 0;
                        forward.normalize();
                        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                        right.y = 0;
                        right.normalize();
                        const moveDelta = forward.clone().multiplyScalar(moveInput.y * dt * 6)
                            .add(right.clone().multiplyScalar(moveInput.x * dt * 6));
                        playerPosition.add(moveDelta);
                        // 边界限制
                        playerPosition.x = Math.max(-14, Math.min(14, playerPosition.x));
                        playerPosition.z = Math.max(-14, Math.min(14, playerPosition.z));
                    }
                    camera.position.set(playerPosition.x, 1.6, playerPosition.z);

                    // 自瞄
                    if (aimbotActive && aimbotTarget) {
                        const targetPos = aimbotTarget.position.clone();
                        const dir = targetPos.sub(camera.position).normalize();
                        const yaw = Math.atan2(dir.x, dir.z);
                        const pitch = Math.asin(-dir.y);
                        cameraYaw = yaw;
                        cameraPitch = Math.max(pitchMin, Math.min(pitchMax, pitch));
                        updateCameraRotation();
                    }

                    // 丧尸生成
                    spawnTimer += dt;
                    const spawnDelay = Math.max(0.8, 2.5 - score * 0.03);
                    if (spawnTimer > spawnDelay && zombies.length < 12) {
                        spawnZombie();
                        spawnTimer = 0;
                    }

                    // 丧尸移动
                    for (let i = zombies.length - 1; i >= 0; i--) {
                        const z = zombies[i];
                        const dirToPlayer = new THREE.Vector3().copy(playerPosition).sub(z.position).normalize();
                        const speed = z.userData.speed * dt;
                        z.position.add(dirToPlayer.clone().multiplyScalar(speed));
                        z.lookAt(playerPosition.x, z.position.y, playerPosition.z);

                        const time = Date.now() * 0.01;
                        z.position.y = Math.sin(time * z.userData.speed * 8) * 0.05;
                        if (z.userData.leftArm) {
                            z.userData.leftArm.rotation.x = Math.sin(time * 10) * 0.5;
                            z.userData.rightArm.rotation.x = Math.sin(time * 10 + Math.PI) * 0.5;
                        }
                        if (z.userData.leftLeg) {
                            z.userData.leftLeg.rotation.x = Math.sin(time * 10 + Math.PI) * 0.5;
                            z.userData.rightLeg.rotation.x = Math.sin(time * 10) * 0.5;
                        }

                        const dist = playerPosition.distanceTo(z.position);
                        if (dist < 1.5) {
                            hurtPlayer(20);
                            scene.remove(z);
                            zombies.splice(i, 1);
                            if (aimbotTarget === z) findNewAimbotTarget();
                        }
                    }

                    // 粒子更新
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.userData.life -= dt;
                        if (p.userData.life <= 0) {
                            scene.remove(p);
                            particles.splice(i, 1);
                        }
                    }

                    // 更新UI叠加层
                    updateOverlays();
                }

                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 初始启动
            updateUI();
            for (let i = 0; i < 4; i++) spawnZombie();
            animate();

            console.log('🧟 完全版打丧尸已启动！');
            console.log('   👈 左侧屏幕滑动视角');
            console.log('   🕹️ 左下角摇杆移动');
            console.log('   👉 右侧屏幕开火');
            console.log('   ⚙️ 右侧悬浮窗功能：框选/天线/血量/自瞄');
        })();
    </script>
</body>
</html>
