        // ==================== Three.js 初始化 ====================
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.userData = { particles: [], weatherParticles: [] };

            const skyGeo = new THREE.SphereGeometry(150, 32, 32);
            const skyCanvas = document.createElement('canvas');
            skyCanvas.width = 512; skyCanvas.height = 512;
            const skyTex = new THREE.CanvasTexture(skyCanvas);
            const sky = new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide }));
            sky.name = 'sky'; scene.add(sky);
            updateSkyTexture(skyTex, 0);

            const sun = new THREE.Mesh(new THREE.SphereGeometry(8, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffcc }));
            sun.position.set(40, 60, -80); sun.name = 'sun'; scene.add(sun);
            scene.fog = new THREE.Fog(0x87ceeb, DRAW_DISTANCES[qualitySettings.drawDistance] * 0.3, DRAW_DISTANCES[qualitySettings.drawDistance]);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, DRAW_DISTANCES[qualitySettings.drawDistance] + 50);
            camera.position.set(0, 2.5, 15); camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: qualitySettings.shadows >= 1 });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, qualitySettings.shadows >= 2 ? 2 : 1.5));
            renderer.shadowMap.enabled = qualitySettings.shadows >= 1;
            renderer.shadowMap.type = qualitySettings.shadows >= 2 ? THREE.PCFSoftShadowMap : THREE.PCFShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x8899bb, 0.6));
            const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
            sunLight.position.set(40, 70, -30); sunLight.castShadow = true;
            const shadowSize = SHADOW_MAP_SIZES[qualitySettings.shadows];
            sunLight.shadow.mapSize.set(shadowSize, shadowSize);
            sunLight.shadow.camera.near=1; sunLight.shadow.camera.far=DRAW_DISTANCES[qualitySettings.drawDistance];
            sunLight.shadow.camera.left=-70; sunLight.shadow.camera.right=70;
            sunLight.shadow.camera.top=70; sunLight.shadow.camera.bottom=-70;
            scene.add(sunLight);

            const gunLight = new THREE.SpotLight(0xffffcc, 0, 15, 0.3, 0.5, 2);
            gunLight.name = 'gunLight'; camera.add(gunLight); scene.add(camera);

            // 水体（简单河流）
            if (qualitySettings.drawDistance >= 2) {
                const waterGeo = new THREE.PlaneGeometry(200, 4);
                const waterMat = new THREE.MeshStandardMaterial({
                    color: 0x2266aa, roughness: 0.1, metalness: 0.8,
                    transparent: true, opacity: 0.7
                });
                const water = new THREE.Mesh(waterGeo, waterMat);
                water.rotation.x = -Math.PI / 2;
                water.position.set(0, 0.05, 20);
                water.receiveShadow = true;
                water.name = 'river';
                scene.add(water);
            }

            const groundGeo = new THREE.PlaneGeometry(250, 250);
            const gCanvas = document.createElement('canvas');
            gCanvas.width=256; gCanvas.height=256;
            const gctx = gCanvas.getContext('2d');
            gctx.fillStyle='#5a7a4a'; gctx.fillRect(0,0,256,256);
            for (let i=0;i<500;i++) { gctx.fillStyle=`rgba(${80+Math.random()*40},${100+Math.random()*40},${60+Math.random()*30},0.5)`; gctx.fillRect(Math.random()*256,Math.random()*256,4,4); }
            const gTex = new THREE.CanvasTexture(gCanvas);
            gTex.wrapS=gTex.wrapT=THREE.RepeatWrapping; gTex.repeat.set(10,10);
            const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ map:gTex, roughness:0.9 }));
            ground.rotation.x=-Math.PI/2; ground.position.y=-0.1; ground.receiveShadow=true; scene.add(ground);

            const obsMat1 = new THREE.MeshStandardMaterial({ color:0x8b7355, roughness:0.7 });
            const obsMat2 = new THREE.MeshStandardMaterial({ color:0x6b8b5a, roughness:0.8 });
            const breakMat = new THREE.MeshStandardMaterial({ color:0xccaa66, roughness:0.5, transparent:true, opacity:0.8 });
            const obsCount = gameMode === 'defense' ? 15 : 40;
            for (let i=0;i<obsCount;i++) {
                const x=(Math.random()-0.5)*200, z=(Math.random()-0.5)*200;
                if (Math.abs(x)<10&&Math.abs(z)<10) continue;
                if (gameMode==='defense' && Math.sqrt(x*x+z*z)<8) continue;
                const w=1.5+Math.random()*5, h=2+Math.random()*10, d=1.5+Math.random()*5;
                const isBreakable = Math.random() < 0.3;
                const mat = isBreakable ? breakMat.clone() : (Math.random()>0.5?obsMat1:obsMat2);
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
                mesh.position.set(x,h/2,z); mesh.castShadow=mesh.receiveShadow=true;
                mesh.userData = { health: isBreakable ? 5 : Infinity, maxHealth: 5, isBreakable };
                scene.add(mesh);
                if (isBreakable) breakables.push(mesh);
                else obstacles.push({ mesh, box: new THREE.Box3().setFromObject(mesh) });
            }

            const rockMat = new THREE.MeshStandardMaterial({ color:0x999999, roughness:0.6 });
            for (let i=0;i<20;i++) {
                const x=(Math.random()-0.5)*200, z=(Math.random()-0.5)*200;
                if (Math.abs(x)<10&&Math.abs(z)<10) continue;
                if (gameMode==='defense' && Math.sqrt(x*x+z*z)<8) continue;
                const r=0.5+Math.random()*1.5;
                const geo=new THREE.SphereGeometry(r,8,6); geo.scale(1,0.4+Math.random()*0.3,1);
                const rock=new THREE.Mesh(geo,rockMat);
                rock.position.set(x,r*0.5,z); rock.castShadow=rock.receiveShadow=true;
                scene.add(rock);
                obstacles.push({ mesh:rock, box:new THREE.Box3().setFromObject(rock) });
            }

            clock = new THREE.Clock();
            animate();
        }

        function updateSkyTexture(tex, time) {
            const canvas = tex.image || document.createElement('canvas');
            if (!canvas.getContext) { const nc=document.createElement('canvas'); nc.width=512;nc.height=512; tex.image=nc; }
            const c = tex.image || canvas;
            const ctx = c.getContext('2d');
            if (!ctx) return;
            const t = (Math.sin(time*0.015)+1)/2;
            const grad = ctx.createLinearGradient(0,0,0,512);
            grad.addColorStop(0,`rgb(${20+t*30},${40+t*50},${80+t*60})`);
            grad.addColorStop(0.3,`rgb(${100+t*80},${140+t*100},${200+t*40})`);
            grad.addColorStop(0.55,`rgb(${150+t*60},${180+t*30},${210-t*20})`);
            grad.addColorStop(0.7,`rgb(${200+t*50},${180+t*40},${100+t*30})`);
            grad.addColorStop(0.85,`rgb(${220+t*30},${150+t*30},${50+t*30})`);
            grad.addColorStop(1,`rgb(${255-t*20},${100+t*30},${30+t*20})`);
            ctx.fillStyle=grad; ctx.fillRect(0,0,512,512);
            ctx.fillStyle='rgba(255,255,255,0.5)';
            for (let i=0;i<25;i++) { ctx.beginPath(); ctx.arc(Math.random()*512,180+Math.random()*220,18+Math.random()*45,0,Math.PI*2); ctx.fill(); }
            tex.needsUpdate=true;
            if (scene?.fog) scene.fog.color.setRGB((300+t*130)/510,(320+t*140)/510,(310+t*60)/510);
        }

        // ==================== Boss系统 ====================
        function spawnBoss() {
            bossAlive = true;
            const angle=Math.random()*Math.PI*2;
            const dist = gameMode==='defense' ? 15 : 30;
            const x=camera.position.x+Math.cos(angle)*dist, z=camera.position.z+Math.sin(angle)*dist;
            const body=new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({color:0x8b0000,roughness:0.1,emissive:0x440000}));
            body.position.set(x,1.5,z); body.castShadow=true; body.name='boss'; body.userData={headPos:new THREE.Vector3(0,1.2,1.4)};
            scene.add(body);
            const eyeGeo=new THREE.SphereGeometry(0.3,12,12), eyeMat=new THREE.MeshBasicMaterial({color:0xff0000});
            for (let i=-1;i<=1;i+=2) { const eye=new THREE.Mesh(eyeGeo,eyeMat); eye.position.set(i*0.8,0.5,1.4); body.add(eye); }
            const hornGeo=new THREE.ConeGeometry(0.4,1.5,8), hornMat=new THREE.MeshStandardMaterial({color:0x333333});
            for (let i=-1;i<=1;i+=2) { const horn=new THREE.Mesh(hornGeo,hornMat); horn.position.set(i*0.7,2,0); body.add(horn); }
            enemies.push({ mesh:body, box:new THREE.Box3().setFromObject(body), health:settings.enemyHp*8+wave*4, maxHealth:settings.enemyHp*8+wave*4, speed:0.02, type:'boss', isRanged:true, shootTimer:0, shootInterval:0.8, behavior:'boss' });
        }

        // ==================== 敌人生成（AI行为树） ====================
        function spawnEnemy() {
            const angle=Math.random()*Math.PI*2;
            const dist = gameMode==='defense' ? 12+Math.random()*15 : 25+Math.random()*30;
            const x=camera.position.x+Math.cos(angle)*dist, z=camera.position.z+Math.sin(angle)*dist;

            let type,color,size,hpMult,speedMult,isRanged,behavior;
            if (gameMode === 'zombie') {
                type='zombie'; color=0x557744; size=1.2; hpMult=0.7; speedMult=1.5; isRanged=false; behavior='charge';
            } else if (gameMode === 'sniper') {
                type='normal'; color=0xe74c3c; size=1.0; hpMult=0.4; speedMult=0.6; isRanged=true; behavior='sniper_target';
            } else {
                const roll=Math.random();
                if (roll<0.45) { type='normal'; color=0xe74c3c; size=1.3; hpMult=1; speedMult=1; isRanged=false; behavior='flank'; }
                else if (roll<0.7) { type='fast'; color=0xff6600; size=0.9; hpMult=0.5; speedMult=2.2; isRanged=false; behavior='charge'; }
                else { type='tank'; color=0x8b0000; size=2.0; hpMult=3; speedMult=0.5; isRanged=Math.random()<0.5; behavior='cover_seek'; }
            }

            const bodyMat=new THREE.MeshStandardMaterial({color,roughness:0.2,emissive:new THREE.Color(color).multiplyScalar(0.3)});
            const body=new THREE.Mesh(new THREE.BoxGeometry(size,size,size),bodyMat);
            body.position.set(x,size/2,z); body.castShadow=true;
            body.userData={headPos:new THREE.Vector3(0,size*0.35,size*0.45)};
            scene.add(body);
            const eyeGeo=new THREE.SphereGeometry(size*0.12,8,8);
            const eyeMat=new THREE.MeshBasicMaterial({color:isRanged?0xffff00:(type==='zombie'?0x00ff00:0xff0000)});
            const eL=new THREE.Mesh(eyeGeo,eyeMat), eR=new THREE.Mesh(eyeGeo,eyeMat);
            eL.position.set(-size*0.2,size*0.2,size*0.45); eR.position.set(size*0.2,size*0.2,size*0.45);
            body.add(eL,eR);

            if (type==='zombie') {
                const armGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
                const armMat = new THREE.MeshStandardMaterial({ color: 0x336633 });
                for (let i=-1;i<=1;i+=2) {
                    const arm = new THREE.Mesh(armGeo, armMat);
                    arm.position.set(i*0.6, 0.1, 0.5);
                    arm.rotation.z = i * 0.3;
                    body.add(arm);
                }
            }
            if (type==='tank') {
                const hornGeo=new THREE.ConeGeometry(size*0.1,size*0.35,6);
                for (let i=-1;i<=1;i+=2) { const h=new THREE.Mesh(hornGeo,new THREE.MeshStandardMaterial({color:0x333333})); h.position.set(i*size*0.25,size*0.6,0); body.add(h); }
            }

            enemies.push({
                mesh:body, box:new THREE.Box3().setFromObject(body),
                health:Math.ceil(settings.enemyHp*hpMult), maxHealth:Math.ceil(settings.enemyHp*hpMult),
                speed:(0.03+Math.random()*0.05)*speedMult, type, isRanged,
                shootTimer:0, shootInterval:2+Math.random()*3,
                behavior, aiTimer:0, aiState:'chase', coverTarget:null
            });
        }

        // ==================== 道具 ====================
        function spawnPickup(x,z) {
            const types=['health','ammo','shield','coins'], weights=[0.4,0.35,0.15,0.1];
            const r=Math.random(); let type='health',cum=0;
            for (let i=0;i<types.length;i++) { cum+=weights[i]; if (r<cum) { type=types[i]; break; } }
            const colors={health:0x00ff00,ammo:0xffff00,shield:0x4488ff,coins:0xffaa00};
            const geo=type==='coins'?new THREE.CylinderGeometry(0.3,0.3,0.1,16):new THREE.BoxGeometry(0.5,0.5,0.5);
            const mat=new THREE.MeshStandardMaterial({color:colors[type],emissive:new THREE.Color(colors[type]).multiplyScalar(0.5),roughness:0.3});
            const mesh=new THREE.Mesh(geo,mat);
            mesh.position.set(x,0.8,z); mesh.userData={type,bobOffset:Math.random()*Math.PI*2};
            scene.add(mesh); pickups.push(mesh);
        }

        // ==================== 射击 ====================
        function shoot() {
            const wp=WEAPONS[currentWeapon];
            if (ammo<=0||isReloading||!gameRunning) return;
            if (gameMode==='sniper') { sniperAmmo--; if (sniperAmmo<=0) { ammo=0; updateHUD(); return; } }
            else ammo--;
            updateHUD();
            (sfx[wp.sfx]||sfx.shoot)();
            for (let i=0;i<wp.bullets;i++) {
                const bullet=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),new THREE.MeshBasicMaterial({color:0xffff44}));
                bullet.position.copy(camera.position);
                const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
                dir.x+=(Math.random()-0.5)*wp.spread*2;
                dir.y+=(Math.random()-0.5)*wp.spread*2;
                dir.z+=(Math.random()-0.5)*wp.spread*2;
                dir.normalize();
                const extraDmg=(persist.upgrades.dmg||0);
                bullet.userData={velocity:dir.clone().multiplyScalar(2.5),life:80,damage:wp.damage+extraDmg,trail:[]};
                scene.add(bullet); bullets.push(bullet);
            }
            const flash=new THREE.PointLight(0xffff88,5,8);
            flash.position.copy(camera.position).add(new THREE.Vector3(0,-0.1,0).applyQuaternion(camera.quaternion));
            scene.add(flash); setTimeout(()=>scene.remove(flash),50);
            screenShake(0.03);
            // 弹孔效果（简化）
            if (qualitySettings.particles >= 1) {
                const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
                const hitPoint = camera.position.clone().add(dir.clone().multiplyScalar(20));
                if (Math.random() < 0.3) {
                    const decal = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.3, 0.3),
                        new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
                    );
                    decal.position.copy(hitPoint);
                    decal.lookAt(camera.position);
                    scene.add(decal);
                    setTimeout(() => scene.remove(decal), 5000);
                }
            }
        }

        function throwGrenade() {
            if (grenades<=0||!gameRunning) return;
            grenades--; updateHUD();
            const g=new THREE.Mesh(new THREE.SphereGeometry(0.3,12,12),new THREE.MeshStandardMaterial({color:0x336633,emissive:0x003300,roughness:0.3}));
            g.position.copy(camera.position).add(new THREE.Vector3(0,0.5,0));
            const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
            g.userData={velocity:dir.clone().multiplyScalar(0.8),timer:2.0,exploded:false};
            g.userData.velocity.y=0.4;
            scene.add(g); grenadeObjs.push(g);
            playSound(200,'square',0.05,0.08,100);
        }

        function explodeGrenade(g) {
            const pos=g.position.clone(); sfx.explosion();
            const particleCount = Math.floor(30 * PARTICLE_MULT[qualitySettings.particles]);
            for (let i=0;i<particleCount;i++) {
                const p=new THREE.Mesh(new THREE.SphereGeometry(0.1,4,4),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0.1+Math.random()*0.15,1,0.5+Math.random()*0.5)}));
                p.position.copy(pos); p.userData={velocity:new THREE.Vector3((Math.random()-0.5)*0.6,Math.random()*0.6,(Math.random()-0.5)*0.6),life:30};
                scene.add(p); scene.userData.particles.push(p);
            }
            // 火焰蔓延
            spawnFireZone(pos.x, pos.z, 3);
            for (let j=enemies.length-1;j>=0;j--) {
                if (pos.distanceTo(enemies[j].mesh.position)<6) {
                    const dmg=3+(persist.upgrades.dmg||0);
                    enemies[j].health-=dmg;
                    showDamageNumber(enemies[j].mesh.position,dmg);
                    if (enemies[j].health<=0) killEnemy(j);
                }
            }
            for (let k=breakables.length-1;k>=0;k--) {
                if (pos.distanceTo(breakables[k].position)<6) { breakables[k].userData.health=0; destroyBreakable(k); }
            }
            screenShake(0.15);
        }

        // ==================== 火焰系统 ====================
        function spawnFireZone(x, z, radius) {
            const fireGeo = new THREE.CylinderGeometry(radius, radius * 0.5, 0.3, 8);
            const fireMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.7 });
            const fire = new THREE.Mesh(fireGeo, fireMat);
            fire.position.set(x, 0.15, z);
            fire.userData = { timer: 5.0, radius };
            fire.name = 'fireZone';
            scene.add(fire);
            fireZones.push(fire);
            sfx.fire();
            // 火焰光照
            const fireLight = new THREE.PointLight(0xff6600, 2, radius * 3);
            fireLight.position.copy(fire.position).add(new THREE.Vector3(0, 1, 0));
            scene.add(fireLight);
            fire.userData.light = fireLight;
        }

        function updateFireZones(delta) {
            for (let i = fireZones.length - 1; i >= 0; i--) {
                const f = fireZones[i];
                f.userData.timer -= delta;
                f.material.opacity = Math.max(0, f.userData.timer / 5 * 0.7);
                f.scale.setScalar(0.9 + Math.random() * 0.2);
                if (f.userData.light) f.userData.light.intensity = f.userData.timer / 5 * 2;
                // 伤害范围内的敌人
                for (const enemy of enemies) {
                    const dx = enemy.mesh.position.x - f.position.x;
                    const dz = enemy.mesh.position.z - f.position.z;
                    if (Math.sqrt(dx*dx + dz*dz) < f.userData.radius && Math.random() < 0.3) {
                        enemy.health -= 0.5;
                        if (enemy.health <= 0) { killEnemy(enemies.indexOf(enemy)); break; }
                    }
                }
                if (f.userData.timer <= 0) {
                    scene.remove(f);
                    if (f.userData.light) scene.remove(f.userData.light);
                    fireZones.splice(i, 1);
                }
            }
        }

        function destroyBreakable(index) {
            const b=breakables[index];
            if (b.userData.isDefenseWall) {
                b.userData.health = b.userData.health || 10;
                b.userData.health--;
                if (b.userData.health > 0) return;
            }
            const particleCount = Math.floor(10 * PARTICLE_MULT[qualitySettings.particles]);
            for (let i=0;i<particleCount;i++) {
                const p=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2),new THREE.MeshStandardMaterial({color:0xccaa66}));
                p.position.copy(b.position).add(new THREE.Vector3((Math.random()-0.5)*2,Math.random()*2,(Math.random()-0.5)*2));
                p.userData={velocity:new THREE.Vector3((Math.random()-0.5)*0.4,Math.random()*0.5,(Math.random()-0.5)*0.4),life:40};
                scene.add(p); scene.userData.particles.push(p);
            }
            if (Math.random()<0.5) spawnPickup(b.position.x,b.position.z);
            scene.remove(b); breakables.splice(index,1);
        }

        function dash() {
            if (dashCooldown>0||isDashing||!gameRunning) return;
            isDashing=true; dashTimer=0.2; dashCooldown=2.0; sfx.dash();
            const dir=new THREE.Vector3(); camera.getWorldDirection(dir); dir.y=0; dir.normalize();
            const newPos=camera.position.clone().add(dir.multiplyScalar(15));
            if (!checkCollision(newPos)) camera.position.copy(newPos);
        }

        function activateUlt() {
            if (ultCharge<100||!gameRunning) return;
            ultCharge=0; slowMoActive=true; slowMoTimer=3.0; sfx.ult();
            for (let j=enemies.length-1;j>=0;j--) {
                const dmg=5+(persist.upgrades.dmg||0)*2;
                enemies[j].health-=dmg;
                showDamageNumber(enemies[j].mesh.position,dmg);
                if (enemies[j].health<=0) killEnemy(j);
            }
            // 大招也产生火焰
            spawnFireZone(camera.position.x, camera.position.z, 5);
            screenShake(0.3); updateHUD();
        }

        function screenShake(intensity) {
            if (!camera) return;
            const orig=camera.position.clone();
            camera.position.x+=(Math.random()-0.5)*intensity*3;
            camera.position.y+=(Math.random()-0.5)*intensity*3;
            setTimeout(()=>{ if(camera) camera.position.copy(orig); },50);
        }

        // ==================== HUD ====================
        function updateHUD() {
            $('hud-mode').textContent = MODE_NAMES[gameMode] || '生存';
            $('hud-score').textContent=score;
            $('hud-wave').textContent=wave;
            if (comboCount>=3) { $('hud-combo').style.display='inline-block'; $('hud-combo-val').textContent=comboCount; }
            else $('hud-combo').style.display='none';
            $('hud-weapon').textContent=WEAPONS[currentWeapon].name;
            $('hud-ammo').textContent=isReloading?'...':(gameMode==='sniper'?sniperAmmo:ammo);
            $('hud-health').textContent=Math.max(0,Math.round(playerHealth));
            $('hud-grenade-count').textContent=grenades;
            $('hud-coins').textContent=sessionCoins;
            if (shield>0) { $('hud-shield').style.display='inline-block'; $('hud-shield-val').textContent=Math.round(shield); $('shield-bar-wrap').style.display='block'; $('shield-bar-fill').style.width=(shield/((persist.upgrades.shield||1)*20)*100)+'%'; }
            else { $('hud-shield').style.display='none'; $('shield-bar-wrap').style.display='none'; }
            const pct=Math.max(0,playerHealth/playerMaxHealth*100);
            $('health-bar-fill').style.width=pct+'%';
            $('health-bar-fill').style.background=pct<30?'linear-gradient(90deg,#f00,#f44)':'linear-gradient(90deg,#f33,#f60)';
            $('ult-bar-fill').style.width=ultCharge+'%';
            $('ult-btn').classList.toggle('ready',ultCharge>=100);
            $('blood-overlay').style.opacity=pct<25?(1-pct/25)*0.6:'0';
            if (gameMode==='defense') {
                $('hud-wave').textContent = Math.round(defenseHealth);
            }
        }

        function showDamageNumber(pos,dmg,isCrit=false) {
            const sp=pos.clone().project(camera);
            const x=(sp.x*0.5+0.5)*window.innerWidth;
            const y=(-sp.y*0.5+0.5)*window.innerHeight;
            const el=document.createElement('div');
            el.className='dmg-num'+(isCrit?' crit':'');
            el.textContent=isCrit?`💥${dmg}`:dmg;
            el.style.left=x+'px'; el.style.top=y+'px';
            $('damage-numbers').appendChild(el);
            setTimeout(()=>el.remove(),800);
        }

        function showComboPopup() {
            if (comboCount>=5) {
                $('combo-popup').textContent=comboCount>=15?`🔥 ${comboCount}连杀! 传说!`:comboCount>=10?`🔥 ${comboCount}连杀! 无双!`:`⚡ ${comboCount}连杀!`;
                $('combo-popup').style.opacity='1'; $('combo-popup').style.transform='translate(-50%,-50%) scale(1.2)';
                sfx.combo();
                setTimeout(()=>{ $('combo-popup').style.opacity='0'; $('combo-popup').style.transform='translate(-50%,-50%) scale(0.8)'; },1000);
            }
        }

        function killEnemy(index) {
            const enemy=enemies[index];
            score++; comboCount++;
            if (comboCount>maxCombo) maxCombo=comboCount;
            enemiesRemaining--;
            sessionCoins+=enemy.type==='boss'?50:(enemy.type==='tank'?8:(enemy.type==='fast'?3:5));
            ultCharge=Math.min(100,ultCharge+(enemy.type==='boss'?20:3));
            sfx.kill();
            if (enemy.type==='boss') { bossAlive=false; sessionCoins+=20; }
            if (enemy.type==='zombie') sfx.zombie();
            showComboPopup();
            const pos=enemy.mesh.position.clone();
            const particleCount = Math.floor(15 * PARTICLE_MULT[qualitySettings.particles]);
            for (let i=0;i<particleCount;i++) {
                const p=new THREE.Mesh(new THREE.SphereGeometry(0.08,4,4),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0.05+Math.random()*0.1,1,0.5)}));
                p.position.copy(pos); p.userData={velocity:new THREE.Vector3((Math.random()-0.5)*0.3,Math.random()*0.4,(Math.random()-0.5)*0.3),life:25};
                scene.add(p); scene.userData.particles.push(p);
            }
            showDamageNumber(pos,enemy.type==='boss'?'BOSS💀':'💀');
            if (Math.random()<0.4) spawnPickup(pos.x,pos.z);
            scene.remove(enemy.mesh); enemies.splice(index,1);
            updateHUD(); checkWaveComplete(); checkAchievements({wave,maxCombo});
        }

        function damagePlayer(amount) {
            if (shield>0) { const blocked=Math.min(shield,amount*0.5); shield-=blocked; amount-=blocked; }
            playerHealth-=amount; comboCount=0;
            updateHUD();
            $('damage-flash').classList.add('hit');
            setTimeout(()=>$('damage-flash').classList.remove('hit'),150);
            sfx.hit(); screenShake(0.05);
            if (playerHealth<=0) gameOver();
        }

        function checkCollision(pos) {
            const box=new THREE.Box3(new THREE.Vector3(pos.x-0.5,pos.y-1.6,pos.z-0.5),new THREE.Vector3(pos.x+0.5,pos.y+0.3,pos.z+0.5));
            return obstacles.some(o=>box.intersectsBox(o.box))||enemies.some(e=>box.intersectsBox(e.box));
        }

        // ==================== 波次系统 ====================
        function spawnWave() {
            if (waveTransition || !gameRunning) return;
            waveTransition = true;
            let count = settings.enemyCount + wave * 2;
            if (gameMode === 'zombie') count = settings.enemyCount * 2 + wave * 3;
            if (gameMode === 'sniper') count = 3 + wave;
            if (gameMode === 'defense') count = 5 + wave * 2;
            enemiesRemaining = count;
            const isBossWave = wave % 5 === 0;
            if (isBossWave) enemiesRemaining += 1;
            const text = isBossWave ? `⚠️ Boss波! 第${wave}波` : `第 ${wave} 波`;
            showWaveAnnounce(text);
            sfx.wave();
            setTimeout(() => {
                if (!gameRunning) return;
                for (let i = 0; i < count; i++) {
                    setTimeout(() => { if (gameRunning) spawnEnemy(); }, i * (gameMode==='zombie'?60:120));
                }
                if (isBossWave) {
                    setTimeout(() => { if (gameRunning) spawnBoss(); }, count * 120 + 500);
                }
                waveTransition = false;
            }, 1500);
        }

        function showWaveAnnounce(text) {
            $('wave-announce').textContent = text;
            $('wave-announce').classList.remove('show');
            void $('wave-announce').offsetWidth;
            $('wave-announce').classList.add('show');
        }

        function checkWaveComplete() {
            if (waveTransition || !gameRunning) return;
            if (enemies.length === 0 && enemiesRemaining <= 0 && !bossAlive) {
                wave++;
                playerHealth = Math.min(playerMaxHealth, playerHealth + 15);
                shield = Math.min((persist.upgrades.shield||0)*20, shield + 5);
                grenades = Math.min(5, grenades + 1);
                sessionCoins += wave * 5;
                updateHUD();
                checkAchievements({ wave, maxCombo });
                spawnWave();
            }
        }

        // ==================== 小地图 ====================
        function updateMinimap() {
            if (!camera||!gameRunning) return;
            const ctx = $('minimap-canvas').getContext('2d');
            ctx.clearRect(0,0,70,70);
            const scale=0.4, cx=35, cy=35;
            ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(cx,cy,33,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#0f0'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
            const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
            ctx.strokeStyle='#0f0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+dir.x*8,cy-dir.z*8); ctx.stroke();
            ctx.fillStyle='#f00';
            for (const e of enemies) {
                const dx=(e.mesh.position.x-camera.position.x)*scale, dz=(e.mesh.position.z-camera.position.z)*scale;
                if (Math.sqrt(dx*dx+dz*dz)<32) { ctx.beginPath(); ctx.arc(cx+dx,cy-dz,e.type==='boss'?3:2,0,Math.PI*2); ctx.fill(); }
            }
            ctx.fillStyle='#ff0';
            for (const p of pickups) {
                const dx=(p.position.x-camera.position.x)*scale, dz=(p.position.z-camera.position.z)*scale;
                if (Math.sqrt(dx*dx+dz*dz)<32) ctx.fillRect(cx+dx-1,cy-dz-1,2,2);
            }
            // 火焰区域
            ctx.fillStyle='rgba(255,100,0,0.5)';
            for (const f of fireZones) {
                const dx=(f.position.x-camera.position.x)*scale, dz=(f.position.z-camera.position.z)*scale;
                if (Math.sqrt(dx*dx+dz*dz)<32) { ctx.beginPath(); ctx.arc(cx+dx,cy-dz,3,0,Math.PI*2); ctx.fill(); }
            }
            // 防御据点
            if (defensePoint) {
                const dx=(defensePoint.position.x-camera.position.x)*scale, dz=(defensePoint.position.z-camera.position.z)*scale;
                ctx.fillStyle='#44f'; ctx.beginPath(); ctx.arc(cx+dx,cy-dz,4,0,Math.PI*2); ctx.fill();
            }
        }

        // ==================== 性能监控 ====================
        let frameCount = 0, fpsTime = 0, currentFPS = 60;
        function updatePerfMonitor(delta) {
            frameCount++;
            fpsTime += delta;
            if (fpsTime >= 1) {
                currentFPS = Math.round(frameCount / fpsTime);
                frameCount = 0; fpsTime = 0;
                $('perf-monitor').textContent = `FPS: ${currentFPS}`;
            }
        }

        // ==================== 主循环 ====================
        function animate() {
            if (!gameRunning) return;
            animationId=requestAnimationFrame(animate);
            const delta=Math.min(clock.getDelta(),0.12);
            updatePerfMonitor(delta);
            if (slowMoActive) { slowMoTimer-=delta; if (slowMoTimer<=0) slowMoActive=false; }
            const timeScale=slowMoActive?0.3:1.0;
            const dt=delta*timeScale;

            skyTime+=delta;
            const skyObj=scene.children.find(c=>c.name==='sky');
            if (skyObj) { updateSkyTexture(skyObj.material.map,skyTime); skyObj.position.copy(camera.position); }

            // 河流动画
            const river = scene.children.find(c => c.name === 'river');
            if (river) river.position.z = 20 + Math.sin(skyTime * 0.5) * 0.5;

            updateFireZones(delta);

            if (dashCooldown>0) dashCooldown-=delta;
            if (isDashing) { dashTimer-=delta; if (dashTimer<=0) isDashing=false; }

            // 水中减速
            let waterSlow = 1;
            if (river && Math.abs(camera.position.z - river.position.z) < 2) waterSlow = 0.5;

            const speedMult=(1+(persist.upgrades.speed||0)*0.05)*waterSlow;
            if (joystickData.active&&!isDashing) {
                const fwd=new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
                const rgt=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
                const np=camera.position.clone();
                const spd=7*dt*speedMult;
                np.add(fwd.clone().multiplyScalar(joystickData.y*spd));
                np.add(rgt.clone().multiplyScalar(joystickData.x*spd));
                if (!checkCollision(np)) camera.position.copy(np);
                else {
                    const xo=camera.position.clone(); xo.x=np.x; if (!checkCollision(xo)) camera.position.x=np.x;
                    const zo=camera.position.clone(); zo.z=np.z; if (!checkCollision(zo)) camera.position.z=np.z;
                }
                camera.position.x=Math.max(-120,Math.min(120,camera.position.x));
                camera.position.z=Math.max(-120,Math.min(120,camera.position.z));
                camera.position.y=2.2;
            }

            if (shootCooldown>0) shootCooldown-=delta;
            if (shooting&&shootCooldown<=0&&!isReloading&&(gameMode==='sniper'?sniperAmmo>0:ammo>0)) {
                shoot(); shootCooldown=WEAPONS[currentWeapon].fireRate;
            }

            if (settings.autofire==='on' && !isReloading && (gameMode==='sniper'?sniperAmmo>0:ammo>0) && shootCooldown<=0) {
                const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
                let aimed=false;
                for (const e of enemies) {
                    const toEnemy=new THREE.Vector3().subVectors(e.mesh.position,camera.position).normalize();
                    if (dir.dot(toEnemy)>0.95 && camera.position.distanceTo(e.mesh.position)<40) { aimed=true; break; }
                }
                if (aimed) { shoot(); shootCooldown=WEAPONS[currentWeapon].fireRate; }
            }

            // 子弹
            for (let i=bullets.length-1;i>=0;i--) {
                const b=bullets[i];
                b.position.add(b.userData.velocity.clone().multiplyScalar(timeScale));
                b.userData.life--;
                let hit=false;
                for (let k=breakables.length-1;k>=0;k--) {
                    if (b.position.distanceTo(breakables[k].position)<1.5) {
                        breakables[k].userData.health--;
                        showDamageNumber(breakables[k].position,1);
                        if (breakables[k].userData.health<=0) destroyBreakable(k);
                        hit=true; break;
                    }
                }
                if (!hit) {
                    for (let j=enemies.length-1;j>=0;j--) {
                        if (b.position.distanceTo(enemies[j].mesh.position)<1.2) {
                            const headWorld=new THREE.Vector3().copy(enemies[j].mesh.userData.headPos||new THREE.Vector3(0,0.5,0.6)).applyMatrix4(enemies[j].mesh.matrixWorld);
                            const isHeadshot=b.position.distanceTo(headWorld)<0.5;
                            const extraDmg=isHeadshot?b.userData.damage*2:b.userData.damage;
                            enemies[j].health-=extraDmg;
                            showDamageNumber(isHeadshot?headWorld:enemies[j].mesh.position,extraDmg,isHeadshot);
                            if (isHeadshot) { sessionHeadshots++; sfx.headshot(); }
                            if (enemies[j].health<=0) killEnemy(j);
                            hit=true; break;
                        }
                    }
                }
                // 击中防御据点
                if (!hit && defensePoint && b.position.distanceTo(defensePoint.position) < 2.5) {
                    hit = true;
                    defenseHealth -= b.userData.damage || 1;
                    showDamageNumber(defensePoint.position, b.userData.damage || 1);
                    if (defenseHealth <= 0) gameOver();
                }
                if (hit||b.userData.life<=0||b.position.y<0||Math.abs(b.position.x)>DRAW_DISTANCES[qualitySettings.drawDistance]||Math.abs(b.position.z)>DRAW_DISTANCES[qualitySettings.drawDistance]) {
                    scene.remove(b); bullets.splice(i,1);
                }
            }

            // 敌人子弹
            for (let i=bullets.length-1;i>=0;i--) {
                const b=bullets[i];
                if (b.userData.enemyBullet) {
                    if (b.position.distanceTo(camera.position)<1.2) {
                        damagePlayer(b.userData.damage||5);
                        scene.remove(b); bullets.splice(i,1);
                    } else if (defensePoint && b.position.distanceTo(defensePoint.position) < 2.5) {
                        defenseHealth -= b.userData.damage || 3;
                        showDamageNumber(defensePoint.position, b.userData.damage || 3);
                        if (defenseHealth <= 0) gameOver();
                        scene.remove(b); bullets.splice(i,1);
                    }
                }
            }

            // 手雷
            for (let i=grenadeObjs.length-1;i>=0;i--) {
                const g=grenadeObjs[i];
                g.userData.velocity.y-=0.015*timeScale;
                g.position.add(g.userData.velocity.clone().multiplyScalar(timeScale));
                g.userData.timer-=delta;
                if (g.position.y<0.1) { g.position.y=0.1; g.userData.velocity.set(0,0,0); }
                if (g.userData.timer<=0&&!g.userData.exploded) {
                    g.userData.exploded=true; explodeGrenade(g);
                    scene.remove(g); grenadeObjs.splice(i,1);
                }
            }

            // 道具
            for (let i=pickups.length-1;i>=0;i--) {
                const p=pickups[i];
                p.position.y=0.8+Math.sin(skyTime*3+p.userData.bobOffset)*0.2;
                p.rotation.y+=delta*2;
                if (camera.position.distanceTo(p.position)<2) {
                    if (p.userData.type==='health') playerHealth=Math.min(playerMaxHealth,playerHealth+25);
                    else if (p.userData.type==='ammo') { const wp=WEAPONS[currentWeapon]; ammo=Math.floor(wp.ammo*(1+(persist.upgrades.ammo||0)*0.2)); }
                    else if (p.userData.type==='shield') shield=Math.min((persist.upgrades.shield||1)*20,shield+15);
                    else if (p.userData.type==='coins') sessionCoins+=10;
                    sfx.pickup(); updateHUD();
                    scene.remove(p); pickups.splice(i,1);
                }
            }

            // 粒子
            if (scene.userData.particles) {
                for (let i=scene.userData.particles.length-1;i>=0;i--) {
                    const p=scene.userData.particles[i];
                    p.position.add(p.userData.velocity.clone().multiplyScalar(timeScale));
                    p.userData.life--;
                    if (p.userData.life<=0) { scene.remove(p); scene.userData.particles.splice(i,1); }
                }
            }

            const gunLight=scene.children.find(c=>c.name==='gunLight');
            if (gunLight) gunLight.intensity=shooting?2:0;

            // 敌人AI（行为树）
            for (let j=enemies.length-1;j>=0;j--) {
                const enemy=enemies[j];
                const d=new THREE.Vector3().subVectors(camera.position,enemy.mesh.position);
                const dist=d.length(); d.y=0; d.normalize();
                enemy.aiTimer -= delta;

                // 行为决策
                if (enemy.aiTimer <= 0) {
                    enemy.aiTimer = 0.5 + Math.random();
                    if (enemy.type !== 'boss') {
                        if (enemy.behavior === 'cover_seek' && dist < 15 && Math.random() < 0.3) {
                            // 找掩体
                            enemy.aiState = 'cover';
                            const coverAngle = Math.random() * Math.PI * 2;
                            enemy.coverTarget = new THREE.Vector3(
                                enemy.mesh.position.x + Math.cos(coverAngle) * 5,
                                0,
                                enemy.mesh.position.z + Math.sin(coverAngle) * 5
                            );
                        } else if (enemy.behavior === 'flank' && Math.random() < 0.4) {
                            enemy.aiState = 'flank';
                            const flankAngle = (Math.random() - 0.5) * Math.PI;
                            const toPlayer = new THREE.Vector3().subVectors(camera.position, enemy.mesh.position).normalize();
                            enemy.coverTarget = camera.position.clone().add(
                                new THREE.Vector3(Math.cos(flankAngle) * 10, 0, Math.sin(flankAngle) * 10)
                            );
                        } else {
                            enemy.aiState = 'chase';
                        }
                    }
                }

                // 执行行为
                let moveDir = d;
                if (enemy.aiState === 'cover' && enemy.coverTarget) {
                    moveDir = new THREE.Vector3().subVectors(enemy.coverTarget, enemy.mesh.position);
                    moveDir.y = 0; moveDir.normalize();
                    if (enemy.mesh.position.distanceTo(enemy.coverTarget) < 2) enemy.aiState = 'chase';
                } else if (enemy.aiState === 'flank' && enemy.coverTarget) {
                    moveDir = new THREE.Vector3().subVectors(enemy.coverTarget, enemy.mesh.position);
                    moveDir.y = 0; moveDir.normalize();
                    if (enemy.mesh.position.distanceTo(enemy.coverTarget) < 3) enemy.aiState = 'chase';
                }

                // 远程攻击
                if (enemy.isRanged) {
                    enemy.shootTimer-=delta;
                    if (enemy.shootTimer<=0) {
                        enemy.shootTimer=enemy.shootInterval;
                        const bc=enemy.type==='boss'?5:1;
                        for (let bi=0;bi<bc;bi++) {
                            const eb=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,6),new THREE.MeshBasicMaterial({color:0xff4444}));
                            eb.position.copy(enemy.mesh.position).add(new THREE.Vector3(0,1.5,0));
                            const target = defensePoint && gameMode==='defense' && Math.random()<0.5 ? defensePoint.position : camera.position;
                            const toTarget=new THREE.Vector3().subVectors(target,eb.position).normalize();
                            if (bc>1) { toTarget.x+=(Math.random()-0.5)*0.3; toTarget.z+=(Math.random()-0.5)*0.3; toTarget.normalize(); }
                            eb.userData={velocity:toTarget.multiplyScalar(enemy.type==='boss'?0.7:0.4),life:80,enemyBullet:true,damage:enemy.type==='boss'?8:4};
                            scene.add(eb); bullets.push(eb);
                        }
                    }
                }

                // 移动
                const targetDist = gameMode==='defense' && defensePoint && Math.random()<0.4 ? enemy.mesh.position.distanceTo(defensePoint.position) : dist;
                if (targetDist>1.8) {
                    enemy.mesh.position.x+=moveDir.x*enemy.speed*timeScale;
                    enemy.mesh.position.z+=moveDir.z*enemy.speed*timeScale;
                }
                enemy.mesh.lookAt(new THREE.Vector3(camera.position.x,enemy.mesh.position.y,camera.position.z));
                enemy.box.setFromObject(enemy.mesh);

                // 近战伤害
                if (dist<2.0&&!enemy.isRanged) {
                    damagePlayer(enemy.type==='boss'?3:(gameMode==='zombie'?1.5:0.5));
                    if (gameMode==='zombie') screenShake(0.03);
                }
                // 守城模式攻击据点
                if (gameMode==='defense' && defensePoint && enemy.mesh.position.distanceTo(defensePoint.position) < 3) {
                    defenseHealth -= 0.3;
                    if (defenseHealth <= 0) gameOver();
                }
            }

            checkWaveComplete();
            updateMinimap();
            renderer.render(scene,camera);
        }

        // ==================== 触控 ====================
        let joyId=null, shootId=null, lookId=null, lookX=0, lookY=0;
        const sensitivityMul=()=>settings.sensitivity/5;

        $('joystick-zone').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); if(joyId===null&&e.changedTouches[0]){ joyId=e.changedTouches[0].identifier; joystickData.active=true; updateJoy(e.changedTouches[0]); } });
        $('joystick-zone').addEventListener('touchmove',e=>{ e.preventDefault();e.stopPropagation(); for(let t of e.changedTouches) if(t.identifier===joyId) updateJoy(t); });
        $('joystick-zone').addEventListener('touchend',e=>{ e.preventDefault();e.stopPropagation(); for(let t of e.changedTouches) if(t.identifier===joyId){ joyId=null;joystickData.active=false;joystickData.x=joystickData.y=0; $('joystick-thumb').style.transform='translate(-50%,-50%)'; $('joystick-thumb').classList.remove('active'); } });
        $('joystick-zone').addEventListener('touchcancel',()=>{ joyId=null;joystickData.active=false;joystickData.x=joystickData.y=0; $('joystick-thumb').style.transform='translate(-50%,-50%)'; $('joystick-thumb').classList.remove('active'); });
        function updateJoy(t){ const r=$('joystick-zone').getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2; let dx=t.clientX-cx,dy=t.clientY-cy; const max=34,dist=Math.sqrt(dx*dx+dy*dy); if(dist>max){ dx=dx/dist*max; dy=dy/dist*max; } joystickData.x=dx/max; joystickData.y=-dy/max; $('joystick-thumb').style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; $('joystick-thumb').classList.add('active'); }

        $('shoot-btn').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); if(shootId===null&&e.changedTouches[0]){ shootId=e.changedTouches[0].identifier; shooting=true; $('shoot-btn').classList.add('pressed'); } });
        $('shoot-btn').addEventListener('touchend',e=>{ e.preventDefault();e.stopPropagation(); for(let t of e.changedTouches) if(t.identifier===shootId){ shootId=null;shooting=false;$('shoot-btn').classList.remove('pressed'); } });
        $('shoot-btn').addEventListener('touchcancel',()=>{ shootId=null;shooting=false;$('shoot-btn').classList.remove('pressed'); });
        $('shoot-btn').addEventListener('mousedown',e=>{ e.preventDefault();shooting=true;$('shoot-btn').classList.add('pressed'); });
        $('shoot-btn').addEventListener('mouseup',()=>{ shooting=false;$('shoot-btn').classList.remove('pressed'); });
        $('shoot-btn').addEventListener('mouseleave',()=>{ shooting=false;$('shoot-btn').classList.remove('pressed'); });

        $('reload-btn').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); const wp=WEAPONS[currentWeapon]; const maxA=Math.floor(wp.ammo*(1+(persist.upgrades.ammo||0)*0.2)); if(!isReloading&&ammo<maxA){ isReloading=true;updateHUD();sfx.reload(); setTimeout(()=>{ ammo=maxA; isReloading=false;updateHUD(); },wp.reloadTime); } });
        $('reload-btn').addEventListener('mousedown',e=>{ e.preventDefault(); const wp=WEAPONS[currentWeapon]; const maxA=Math.floor(wp.ammo*(1+(persist.upgrades.ammo||0)*0.2)); if(!isReloading&&ammo<maxA){ isReloading=true;updateHUD();sfx.reload(); setTimeout(()=>{ ammo=maxA; isReloading=false;updateHUD(); },wp.reloadTime); } });

        $('weapon-switch').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); const keys=Object.keys(WEAPONS); currentWeapon=keys[(keys.indexOf(currentWeapon)+1)%keys.length]; const wp=WEAPONS[currentWeapon]; ammo=Math.floor(wp.ammo*(1+(persist.upgrades.ammo||0)*0.2)); isReloading=false;updateHUD(); });
        $('weapon-switch').addEventListener('mousedown',e=>{ e.preventDefault(); const keys=Object.keys(WEAPONS); currentWeapon=keys[(keys.indexOf(currentWeapon)+1)%keys.length]; const wp=WEAPONS[currentWeapon]; ammo=Math.floor(wp.ammo*(1+(persist.upgrades.ammo||0)*0.2)); isReloading=false;updateHUD(); });

        $('grenade-btn').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); throwGrenade(); });
        $('grenade-btn').addEventListener('mousedown',e=>{ e.preventDefault(); throwGrenade(); });

        $('dash-btn').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); dash(); });
        $('dash-btn').addEventListener('mousedown',e=>{ e.preventDefault(); dash(); });

        $('ult-btn').addEventListener('touchstart',e=>{ e.preventDefault();e.stopPropagation(); activateUlt(); });
        $('ult-btn').addEventListener('mousedown',e=>{ e.preventDefault(); activateUlt(); });

        document.addEventListener('touchstart',e=>{ if(!gameRunning) return; for(let t of e.changedTouches){ const el=document.elementFromPoint(t.clientX,t.clientY); if(el?.closest('#joystick-zone, #shoot-btn, #reload-btn, #weapon-switch, #grenade-btn, #dash-btn, #ult-btn')) continue; if(lookId===null){ lookId=t.identifier; lookX=t.clientX; lookY=t.clientY; } } },{passive:false});
        document.addEventListener('touchmove',e=>{ if(!gameRunning||lookId===null||!camera) return; for(let t of e.changedTouches){ if(t.identifier===lookId){ const dx=(t.clientX-lookX)*0.003*sensitivityMul(),dy=(t.clientY-lookY)*0.003*sensitivityMul(); cameraYaw-=dx; cameraPitch-=dy; cameraPitch=Math.max(-1.4,Math.min(1.4,cameraPitch)); euler.set(cameraPitch,cameraYaw,0); camera.quaternion.setFromEuler(euler); lookX=t.clientX; lookY=t.clientY; if($('look-hint').style.opacity!=='0') $('look-hint').style.opacity='0'; } } },{passive:false});
        document.addEventListener('touchend',e=>{ for(let t of e.changedTouches) if(t.identifier===lookId) lookId=null; });
        document.addEventListener('touchcancel',()=>{ lookId=null; });

        window.addEventListener('resize',()=>{ if(camera&&renderer){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); } });

        console.log('🎮 终极版 3D 射击游戏就绪！');
        console.log('   4种游戏模式: 生存 | 狙击 | 丧尸 | 守城');
        console.log('   敌人AI行为树: 包抄 | 找掩体 | 冲锋');
        console.log('   火焰蔓延系统 | 水体河流 | 弹孔贴花 | 性能监控');
        console.log('   画质设置(低/中/高) | PWA离线缓存');
        console.log('   开发者模式密码: ande123');
    </script>
