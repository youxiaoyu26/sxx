<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>移动端 3D 射击 - 终极版</title>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
        }

        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        /* ========== 入场动画 ========== */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; align-items: center;
            justify-content: center; flex-direction: column;
            transition: opacity 0.8s, visibility 0.8s;
        }
        #intro-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #intro-logo { font-size: 56px; animation: logoBounce 0.6s ease-out; }
        #intro-title {
            color: #fff; font-size: 32px; font-weight: 900; letter-spacing: 4px;
            margin-top: 16px; animation: fadeInUp 0.8s 0.3s both;
            text-shadow: 0 0 40px rgba(255, 150, 0, 0.8);
        }
        #intro-subtitle {
            color: #ffaa00; font-size: 13px; letter-spacing: 6px;
            margin-top: 8px; animation: fadeInUp 0.8s 0.6s both;
        }
        #intro-bar {
            width: 100px; height: 3px;
            background: linear-gradient(90deg, transparent, #ff6600, transparent);
            margin-top: 24px; animation: fadeInUp 0.8s 0.9s both, barPulse 1.5s 1.7s infinite;
        }
        @keyframes logoBounce {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes barPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ========== 菜单面板 ========== */
        #menu-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: flex; align-items: center; justify-content: center;
            flex-direction: column; transition: opacity 0.5s, visibility 0.5s;
        }
        #menu-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .menu-btn {
            width: 200px; height: 52px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 26px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 2px;
            cursor: pointer; margin: 8px 0; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .menu-btn:active { background: rgba(255,150,0,0.3); border-color: #ff8800; transform: scale(0.95); }
        .menu-btn.start {
            background: rgba(255,100,0,0.5); border-color: #ff6600;
            font-size: 22px; height: 60px; animation: btnGlow 2s infinite;
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 16px rgba(255,100,0,0.3); }
            50% { box-shadow: 0 0 32px rgba(255,100,0,0.7); }
        }
        #menu-stats {
            color: #aaa; font-size: 12px; margin-top: 16px; text-align: center; line-height: 1.6;
        }
        #menu-stats span { color: #ffaa00; font-weight: 700; }

        /* ========== 设置面板 ========== */
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 600; display: flex; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.4s, visibility 0.4s; overflow-y: auto; padding: 40px 0;
        }
        #settings-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .settings-title { color: #ffaa00; font-size: 22px; font-weight: 800; letter-spacing: 3px; margin-bottom: 20px; }
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            width: 280px; margin: 8px 0; color: #ccc; font-size: 14px;
        }
        .setting-row label { font-weight: 600; font-size: 13px; flex: 1; }
        .setting-row input[type="range"] {
            -webkit-appearance: none; width: 100px; height: 5px;
            border-radius: 3px; background: #444; outline: none; margin: 0 8px;
        }
        .setting-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            border-radius: 50%; background: #ff6600; cursor: pointer; border: 2px solid #fff;
        }
        .setting-row select {
            padding: 6px 10px; border-radius: 6px; background: #333;
            color: #fff; border: 1px solid #555; font-size: 13px; font-family: inherit;
        }
        .setting-val { color: #ffaa00; font-weight: 700; min-width: 28px; text-align: right; font-size: 13px; }
        .settings-close {
            margin-top: 20px; width: 140px; height: 44px; border-radius: 22px;
            border: 2px solid #ff6600; background: rgba(255,100,0,0.3);
            color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .settings-close:active { background: #ff6600; transform: scale(0.95); }

        /* ========== 商店面板 ========== */
        #shop-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 700; display: flex; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.4s, visibility 0.4s; overflow-y: auto; padding: 30px 0;
        }
        #shop-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .shop-title { color: #ffaa00; font-size: 22px; font-weight: 800; letter-spacing: 3px; margin-bottom: 8px; }
        #shop-coins { color: #ff0; font-size: 16px; margin-bottom: 16px; }
        .shop-item {
            width: 260px; padding: 12px 16px; margin: 6px 0;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
            background: rgba(0,0,0,0.5); color: #fff; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.3s;
        }
        .shop-item:active { background: rgba(255,150,0,0.3); transform: scale(0.97); }
        .shop-item.owned { border-color: #0f0; opacity: 0.7; }
        .shop-item .price { color: #ff0; font-weight: 700; }
        .shop-item .owned-label { color: #0f0; font-size: 12px; }
        .shop-close {
            margin-top: 16px; width: 140px; height: 44px; border-radius: 22px;
            border: 2px solid #ff6600; background: rgba(255,100,0,0.3);
            color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .shop-close:active { background: #ff6600; transform: scale(0.95); }

        /* ========== 开发者面板相关 ========== */
        #dev-login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1100; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); flex-direction: column;
            transition: opacity 0.3s, visibility 0.3s;
        }
        #dev-login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #dev-login-box {
            background: #1a1a2e; border: 2px solid #ff6600; border-radius: 16px;
            padding: 30px 24px; text-align: center; width: 280px;
        }
        #dev-login-box h3 { color: #ffaa00; font-size: 20px; margin-bottom: 16px; }
        #dev-login-box input {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid #555; background: #111; color: #fff;
            font-size: 16px; text-align: center; outline: none; margin-bottom: 12px;
        }
        #dev-login-box input:focus { border-color: #ff6600; }
        #dev-login-msg { color: #f44; font-size: 12px; margin-bottom: 8px; min-height: 16px; }
        #dev-login-box .menu-btn { margin: 4px auto; display: block; }

        #dev-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1050; display: flex; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.4s, visibility 0.4s; overflow-y: auto; padding: 30px 0;
        }
        #dev-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .dev-title { color: #ff4444; font-size: 22px; font-weight: 800; letter-spacing: 3px; margin-bottom: 4px; }
        .dev-subtitle { color: #ffaa00; font-size: 12px; margin-bottom: 16px; }
        .dev-section {
            width: 300px; margin: 10px 0; padding: 12px;
            border: 1px solid rgba(255,100,0,0.3); border-radius: 12px;
            background: rgba(255,100,0,0.05);
        }
        .dev-section h4 { color: #ffaa00; font-size: 14px; margin-bottom: 8px; }
        .dev-row {
            display: flex; align-items: center; justify-content: space-between;
            margin: 5px 0; color: #ccc; font-size: 13px;
        }
        .dev-row label { flex: 1; font-size: 12px; }
        .dev-row input[type="number"] {
            width: 60px; padding: 4px 6px; border-radius: 4px;
            border: 1px solid #555; background: #222; color: #fff;
            font-size: 13px; text-align: center; outline: none;
        }
        .dev-btn {
            width: 100%; padding: 8px; margin: 4px 0; border-radius: 8px;
            border: 1px solid rgba(255,100,0,0.5); background: rgba(255,100,0,0.2);
            color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.3s;
        }
        .dev-btn:active { transform: scale(0.97); }
        .dev-btn.danger { border-color: #f44; background: rgba(255,0,0,0.2); }
        .dev-btn.success { border-color: #0f0; background: rgba(0,255,0,0.2); }
        .dev-close {
            margin-top: 12px; width: 140px; height: 44px; border-radius: 22px;
            border: 2px solid #ff4444; background: rgba(255,0,0,0.3);
            color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .dev-close:active { background: #f44; transform: scale(0.95); }

        /* ========== 模式选择面板 ========== */
        #mode-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 550; display: flex; align-items: center; justify-content: center;
            flex-direction: column; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.4s, visibility 0.4s;
        }
        #mode-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .mode-btn {
            width: 220px; height: 50px; border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5); color: #fff;
            font-size: 16px; font-weight: 700; letter-spacing: 2px;
            cursor: pointer; margin: 6px 0; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .mode-btn:active { background: rgba(255,150,0,0.3); border-color: #ff8800; transform: scale(0.95); }
        .mode-btn.survival { border-color: rgba(255,100,0,0.5); }
        .mode-btn.sniper { border-color: rgba(100,200,255,0.5); }
        .mode-btn.zombie { border-color: rgba(100,255,100,0.5); }
        .mode-btn.defense { border-color: rgba(255,100,200,0.5); }
        .mode-btn.back { border-color: #555; margin-top: 16px; }

        /* ========== HUD ========== */
        #game-hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; pointer-events: none; transition: opacity 0.3s;
        }
        #game-hud.hidden { opacity: 0; }
        #hud-top {
            position: absolute; top: calc(6px + var(--safe-top)); left: 4px; right: 4px;
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 2px; flex-wrap: wrap;
        }
        .hud-stat {
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px); border-radius: 8px; padding: 4px 8px;
            color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.15); white-space: nowrap;
        }
        .hud-stat.kills { border-color: rgba(255,150,0,0.4); }
        .hud-stat.wave { border-color: rgba(100,200,255,0.4); }
        .hud-stat.mode { border-color: rgba(200,100,255,0.4); }
        .hud-stat.combo { border-color: rgba(255,50,200,0.4); }
        .hud-stat.health { border-color: rgba(255,50,50,0.4); }
        .hud-stat.shield { border-color: rgba(100,150,255,0.4); }
        .hud-stat.ammo { border-color: rgba(255,255,100,0.4); }
        .hud-stat.weapon { border-color: rgba(100,255,100,0.4); }
        .hud-stat.coins { border-color: rgba(255,255,0,0.4); }

        #health-bar-wrap {
            position: absolute; top: calc(38px + var(--safe-top)); left: 50%;
            transform: translateX(-50%); width: 50%; max-width: 200px; height: 4px;
            background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden;
        }
        #health-bar-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6600);
            border-radius: 2px; transition: width 0.3s;
        }
        #shield-bar-wrap {
            position: absolute; top: calc(44px + var(--safe-top)); left: 50%;
            transform: translateX(-50%); width: 50%; max-width: 200px; height: 3px;
            background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; display: none;
        }
        #shield-bar-fill { width: 100%; height: 100%; background: #4488ff; border-radius: 2px; transition: width 0.3s; }
        #ult-bar-wrap {
            position: absolute; top: calc(50px + var(--safe-top)); left: 50%;
            transform: translateX(-50%); width: 40%; max-width: 160px; height: 3px;
            background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
        }
        #ult-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff00ff, #ff8800);
            border-radius: 2px; transition: width 0.3s;
        }
        #minimap {
            position: absolute; top: calc(70px + var(--safe-top)); right: 8px;
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5); overflow: hidden; pointer-events: none;
        }
        #minimap canvas { width: 100%; height: 100%; position: relative; }

        #wave-announce {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255,150,0,0.8); opacity: 0;
            transition: opacity 0.3s; text-align: center; white-space: nowrap;
        }
        #wave-announce.show { opacity: 1; animation: waveAnim 2s forwards; }
        @keyframes waveAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
        }

        #combo-popup {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0; font-size: 20px; font-weight: 900; pointer-events: none; opacity: 0;
            text-shadow: 0 0 20px rgba(255,255,0,0.8); transition: all 0.3s;
        }
        #damage-numbers {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 250;
        }
        .dmg-num {
            position: absolute; color: #ff0; font-weight: 900; font-size: 16px;
            text-shadow: 0 0 8px rgba(255,0,0,0.8);
            animation: dmgFloat 0.8s forwards; pointer-events: none;
        }
        .dmg-num.crit { color: #ff0; font-size: 24px; text-shadow: 0 0 12px rgba(255,200,0,0.9); }
        @keyframes dmgFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        #bottom-controls {
            position: absolute; bottom: calc(10px + var(--safe-bottom)); left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px; pointer-events: none;
        }
        #joystick-zone {
            width: 110px; height: 110px; pointer-events: auto;
            position: relative; flex-shrink: 0;
        }
        #joystick-base {
            position: absolute; width: 90px; height: 90px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        #joystick-thumb {
            position: absolute; width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.45);
            top: 50%; left: 50%; transform: translate(-50%, -50%); transition: background 0.15s;
        }
        #joystick-thumb.active { background: rgba(255,150,0,0.65); }

        #right-buttons { display: flex; align-items: center; gap: 5px; pointer-events: auto; flex-shrink: 0; }
        .side-btn {
            width: 34px; height: 34px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3); display: flex;
            align-items: center; justify-content: center; font-size: 13px;
            color: #fff; transition: all 0.15s; cursor: pointer;
        }
        .side-btn:active { transform: scale(0.9); }
        #dash-btn { background: rgba(200,150,255,0.2); border-color: rgba(200,150,255,0.35); }
        #dash-btn:active { background: rgba(150,50,255,0.5); }
        #grenade-btn { background: rgba(100,255,100,0.2); border-color: rgba(100,255,100,0.35); }
        #grenade-btn:active { background: rgba(0,200,0,0.5); }
        #weapon-switch { background: rgba(100,200,255,0.2); border-color: rgba(100,200,255,0.35); }
        #weapon-switch:active { background: rgba(0,150,255,0.5); }
        #reload-btn { background: rgba(255,255,100,0.2); border-color: rgba(255,255,150,0.35); }
        #reload-btn:active { background: rgba(255,200,0,0.5); }
        #shoot-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,50,50,0.3); border: 3px solid rgba(255,100,100,0.45);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff; transition: all 0.15s; cursor: pointer;
        }
        #shoot-btn:active, #shoot-btn.pressed {
            background: rgba(255,0,0,0.65); border-color: #f00;
            transform: scale(0.9); box-shadow: 0 0 28px rgba(255,0,0,0.5);
        }
        #ult-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,0,200,0.2); border: 2px solid rgba(255,100,200,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff; transition: all 0.15s; cursor: pointer;
        }
        #ult-btn.ready { animation: ultGlow 0.8s infinite; }
        #ult-btn:active { transform: scale(0.9); }
        @keyframes ultGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255,0,200,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,0,200,1); }
        }

        #look-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 205; color: rgba(255,255,255,0.3);
            font-size: 11px; letter-spacing: 1px; transition: opacity 1s; text-align: center;
        }
        #damage-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 150; background: transparent; transition: background 0.1s;
        }
        #damage-flash.hit { background: rgba(255,0,0,0.3); }
        #blood-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 155; opacity: 0; transition: opacity 0.5s;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(139,0,0,0.5) 100%);
            border: 3px solid transparent;
        }

        #death-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 800; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        #death-panel.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #death-panel h2 { color: #ff3333; font-size: 32px; margin-bottom: 4px; }
        #death-panel .death-info { color: #ccc; font-size: 14px; margin: 2px 0; }
        #death-panel .death-best { color: #ffaa00; font-size: 16px; margin: 8px 0; }
        #death-panel p { color: #fff; font-size: 18px; margin-bottom: 20px; }
        #achievement-popup {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 2px solid #ffaa00;
            border-radius: 12px; padding: 10px 20px; color: #fff;
            font-size: 14px; font-weight: 700; z-index: 900; opacity: 0;
            transition: all 0.5s; pointer-events: none; white-space: nowrap;
        }

        #crosshair-el {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 300; display: none;
        }
        #crosshair-el.cross { width: 20px; height: 20px; }
        #crosshair-el.cross::before, #crosshair-el.cross::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        #crosshair-el.cross::before { width: 2px; height: 20px; left: 9px; top: 0; }
        #crosshair-el.cross::after { width: 20px; height: 2px; left: 0; top: 9px; }

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== DOM 引用 ====================
        const $ = id => document.getElementById(id);

        // ==================== 音效系统 ====================
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx, masterGain;
        function initAudio() { if (!audioCtx) { audioCtx = new AudioCtx(); masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination); } }
        function setMasterVolume(v) { if (masterGain) masterGain.gain.value = v / 100; }
        function playSound(f, t, d, v = 0.3, f2, s) {
            if (!audioCtx || !masterGain) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.value = f; g.gain.value = v;
            if (f2) o.frequency.linearRampToValueAtTime(f2, audioCtx.currentTime + d);
            if (s) o.frequency.linearRampToValueAtTime(s, audioCtx.currentTime + d);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(masterGain);
            o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + d);
        }
        const sfx = {
            shoot: ()=>playSound(200,'square',0.08,0.15,100,50),
            shotgun: ()=>playSound(80,'sawtooth',0.12,0.2,40),
            rifle: ()=>playSound(300,'square',0.06,0.1,200,80),
            reload: ()=>{playSound(400,'triangle',0.05,0.1);setTimeout(()=>playSound(600,'triangle',0.08,0.1),100)},
            kill: ()=>playSound(500,'square',0.1,0.15,800),
            headshot: ()=>playSound(800,'square',0.08,0.12,1200),
            hit: ()=>playSound(100,'sawtooth',0.05,0.08),
            explosion: ()=>playSound(40,'sawtooth',0.3,0.4,20),
            wave: ()=>{playSound(300,'triangle',0.15,0.2,600);setTimeout(()=>playSound(600,'triangle',0.15,0.2,900),200)},
            dash: ()=>playSound(150,'sine',0.08,0.1,300),
            pickup: ()=>playSound(800,'sine',0.08,0.1,1200),
            combo: ()=>playSound(600,'square',0.1,0.15,1000),
            ult: ()=>playSound(100,'sawtooth',0.5,0.6,30),
            achievement: ()=>{playSound(500,'triangle',0.1,0.15,800);setTimeout(()=>playSound(800,'triangle',0.1,0.15,1200),150)},
            zombie: ()=>playSound(30,'sawtooth',0.2,0.3,10),
            fire: ()=>playSound(50,'sawtooth',0.3,0.2,20),
        };

        // ==================== PWA 离线缓存注册 ====================
        if ('serviceWorker' in navigator) {
            // 简化版 PWA 缓存策略
            const cacheName = 'shooter-ultimate-v1';
            const urlsToCache = [location.href];
            // 尝试注册 Service Worker
            try {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    if (regs.length === 0) {
                        // 内联简单 SW
                        const swBlob = new Blob([`
                            self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                            self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                            self.addEventListener('fetch', e => {
                                e.respondWith(
                                    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                                        const clone = res.clone();
                                        caches.open('${cacheName}').then(c => c.put(e.request, clone));
                                        return res;
                                    }))
                                );
                            });
                        `], {type: 'application/javascript'});
                        const swUrl = URL.createObjectURL(swBlob);
                        // 注意：Blob URL 不能用于注册 SW，这里用简化方式
                    }
                });
            } catch(e) {}
            // 预缓存当前页面
            if (window.caches) {
                caches.open(cacheName).then(cache => {
                    cache.add(location.href).catch(()=>{});
                });
            }
        }

        // ==================== 默认武器配置 ====================
        const DEFAULT_WEAPONS = {
            pistol: { name:'手枪', ammo:12, maxAmmo:12, damage:1, fireRate:0.3, spread:0.02, bullets:1, reloadTime:1200, sfx:'shoot' },
            rifle: { name:'步枪', ammo:30, maxAmmo:30, damage:1, fireRate:0.12, spread:0.03, bullets:1, reloadTime:1800, sfx:'rifle' },
            shotgun: { name:'霰弹枪', ammo:8, maxAmmo:8, damage:1, fireRate:0.6, spread:0.12, bullets:5, reloadTime:2200, sfx:'shotgun' },
        };

        // ==================== 持久化数据 ====================
        function loadData() {
            try {
                const d = JSON.parse(localStorage.getItem('shooter_ultimate') || '{}');
                if (!d.weapons) d.weapons = JSON.parse(JSON.stringify(DEFAULT_WEAPONS));
                if (!d.coins) d.coins = 0;
                if (!d.best) d.best = 0;
                if (!d.totalKills) d.totalKills = 0;
                if (!d.headshots) d.headshots = 0;
                if (!d.gamesPlayed) d.gamesPlayed = 0;
                if (!d.upgrades) d.upgrades = {};
                ['dmg','hp','speed','shield','ammo'].forEach(k => { if (!d.upgrades[k]) d.upgrades[k] = 0; });
                if (!d.achievements) d.achievements = [];
                if (!d.quality) d.quality = { particles:1, shadows:1, drawDistance:2 };
                return d;
            } catch(e) {
                return {
                    coins:0, best:0, totalKills:0, headshots:0, gamesPlayed:0,
                    upgrades:{dmg:0,hp:0,speed:0,shield:0,ammo:0},
                    achievements:[], weapons:JSON.parse(JSON.stringify(DEFAULT_WEAPONS)),
                    quality:{particles:1,shadows:1,drawDistance:2}
                };
            }
        }
        function saveData(d) { localStorage.setItem('shooter_ultimate', JSON.stringify(d)); }
        let persist = loadData();
        let WEAPONS = JSON.parse(JSON.stringify(persist.weapons || DEFAULT_WEAPONS));
        let currentWeapon = 'pistol';
        saveData(persist);

        // 画质设置
        let qualitySettings = persist.quality || { particles:1, shadows:1, drawDistance:2 };
        const PARTICLE_MULT = [0.2, 1, 2];
        const SHADOW_MAP_SIZES = [256, 512, 1024];
        const DRAW_DISTANCES = [80, 150, 300];

        function getRank(kills) {
            if (kills >= 5000) return '元帅'; if (kills >= 2000) return '上将';
            if (kills >= 1000) return '中将'; if (kills >= 500) return '少将';
            if (kills >= 200) return '上校'; if (kills >= 100) return '中尉';
            if (kills >= 50) return '少尉'; if (kills >= 20) return '士官';
            if (kills >= 5) return '列兵'; return '新兵';
        }

        const ACHIEVEMENTS = [
            { id:'first_kill', name:'初次击杀', desc:'击杀第一个敌人' },
            { id:'kill_100', name:'百人斩', desc:'累计击杀100' },
            { id:'kill_1000', name:'千人斩', desc:'累计击杀1000' },
            { id:'headshot_50', name:'爆头专家', desc:'累计爆头50次' },
            { id:'wave_10', name:'波次幸存者', desc:'存活到第10波' },
            { id:'combo_10', name:'连杀大师', desc:'单次10连杀' },
            { id:'rich', name:'暴发户', desc:'累计获得1000金币' },
        ];

        function checkAchievements(gameStats) {
            for (const a of ACHIEVEMENTS) {
                if (!persist.achievements.includes(a.id)) {
                    let met = false;
                    if (a.id === 'first_kill') met = persist.totalKills >= 1;
                    else if (a.id === 'kill_100') met = persist.totalKills >= 100;
                    else if (a.id === 'kill_1000') met = persist.totalKills >= 1000;
                    else if (a.id === 'headshot_50') met = persist.headshots >= 50;
                    else if (a.id === 'wave_10') met = gameStats && gameStats.wave >= 10;
                    else if (a.id === 'combo_10') met = gameStats && gameStats.maxCombo >= 10;
                    else if (a.id === 'rich') met = persist.coins >= 1000;
                    if (met) {
                        persist.achievements.push(a.id);
                        saveData(persist);
                        showAchievement(a.name, a.desc);
                    }
                }
            }
        }

        function showAchievement(name, desc) {
            const el = $('achievement-popup');
            el.textContent = `🏆 ${name}: ${desc}`;
            el.style.opacity = '1'; el.style.top = '60px';
            sfx.achievement();
            setTimeout(() => { el.style.opacity = '0'; }, 3000);
        }

        const SHOP_ITEMS = [
            { id:'dmg', name:'伤害+1', desc:'所有武器伤害+1', baseCost:100, max:10 },
            { id:'hp', name:'最大生命+20', desc:'基础生命+20', baseCost:150, max:10 },
            { id:'speed', name:'移动速度+5%', desc:'移动速度+5%', baseCost:200, max:8 },
            { id:'shield', name:'开局护甲', desc:'每局开始获得护甲', baseCost:300, max:3 },
            { id:'ammo', name:'弹匣扩容', desc:'所有武器弹匣+20%', baseCost:250, max:5 },
        ];

        function renderShop() {
            const container = $('shop-items');
            container.innerHTML = '';
            $('shop-coin-val').textContent = persist.coins;
            for (const item of SHOP_ITEMS) {
                const lvl = persist.upgrades[item.id] || 0;
                const cost = item.baseCost * (lvl + 1);
                const owned = lvl >= item.max;
                const div = document.createElement('div');
                div.className = 'shop-item' + (owned ? ' owned' : '');
                div.innerHTML = `<div><div>${item.name} (Lv${lvl}/${item.max})</div><div style="font-size:11px;color:#aaa">${item.desc}</div></div><div>${owned ? '<span class="owned-label">已满级</span>' : `<span class="price">${cost}💰</span>`}</div>`;
                if (!owned) div.addEventListener('click', () => {
                    if (persist.coins >= cost) {
                        persist.coins -= cost;
                        persist.upgrades[item.id] = lvl + 1;
                        saveData(persist);
                        renderShop();
                        updateMenuStats();
                        renderDevPanel();
                    } else { alert('金币不足！'); }
                });
                container.appendChild(div);
            }
        }

        function updateMenuStats() {
            $('menu-best').textContent = persist.best;
            $('menu-coins').textContent = persist.coins;
            $('menu-rank').textContent = getRank(persist.totalKills);
        }

        function updateCrosshair() {
            const el = $('crosshair-el');
            el.className = settings.crosshair;
            el.style.display = 'block';
        }

        // ==================== 游戏设置 ====================
        let settings = {
            enemyCount:8, enemyHp:3, playerHp:100,
            crosshair:'cross', sensitivity:5, autofire:'off', gyro:'off', volume:50
        };
        function updateSettingsDisplay() {
            $('val-enemy-count').textContent = $('set-enemy-count').value;
            $('val-enemy-hp').textContent = $('set-enemy-hp').value;
            $('val-player-hp').textContent = $('set-player-hp').value;
            $('val-sensitivity').textContent = $('set-sensitivity').value;
            $('val-volume').textContent = $('set-volume').value;
        }
