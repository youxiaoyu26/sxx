<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属你的浪漫表白</title>
    <style>
        :root {
            --primary-color: #ff4d79;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --radius: 15px;
            --speed: 1s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #feb47b 0%, #ff7e5f 100%);
            transition: background 0.5s ease;
        }

        /* 磨砂玻璃容器 */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease;
        }

        section { display: none; }
        section.active { display: block; }

        h2 { margin-bottom: 1.5rem; font-weight: 300; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.8);
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }
        button.prev { background: rgba(0,0,0,0.2); }

        /* 祝福语弹窗样式 */
        .blessing-popup {
            position: fixed;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container" id="mainBg">
    <section id="step1" class="active">
        <div class="card">
            <h2>你是谁？</h2>
            <input type="text" id="myName" placeholder="输入你的名字...">
            <button onclick="nextStep(2)">下一步</button>
        </div>
    </section>

    <section id="step2">
        <div class="card">
            <h2>你想对谁表白？</h2>
            <input type="text" id="targetName" placeholder="TA的名字...">
            <div class="btn-group">
                <button class="prev" onclick="nextStep(1)">上一步</button>
                <button onclick="nextStep(3)">下一步</button>
            </div>
        </div>
    </section>

    <section id="step3">
        <div class="card">
            <h2>选择背景音乐</h2>
            <select id="musicSelect">
                <option value="441491828">告白气球 - 周杰伦</option>
                <option value="1859245">恋爱循环 - 花泽香菜</option>
                <option value="1397345903">我想和你在一起 - 郑国锋</option>
            </select>
            <p style="font-size: 0.8rem; opacity: 0.8;">(音乐将在最后一步播放)</p>
            <div class="btn-group">
                <button class="prev" onclick="nextStep(2)">上一步</button>
                <button onclick="nextStep(4)">下一步</button>
            </div>
        </div>
    </section>

    <section id="step4">
        <div class="card">
            <h2>定制你的浪漫风格</h2>
            <label>背景主题：</label>
            <select id="themeSelect" onchange="changeBg(this.value)">
                <option value="linear-gradient(135deg, #feb47b 0%, #ff7e5f 100%)">经典浪漫</option>
                <option value="linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)">梦幻紫罗兰</option>
                <option value="linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)">清新薄荷</option>
            </select>
            <label>弹窗圆角程度：</label>
            <input type="range" id="radiusInput" min="0" max="50" value="15">
            <div class="btn-group">
                <button class="prev" onclick="nextStep(3)">上一步</button>
                <button onclick="nextStep(5)">下一步</button>
            </div>
        </div>
    </section>

    <section id="step5">
        <div class="card">
            <h2>表白寄语</h2>
            <select id="msgType">
                <option value="official">使用官方 100+ 祝福语</option>
                <option value="custom">自定义单条深情告白</option>
            </select>
            <input type="text" id="customMsg" placeholder="若选自定义，请在此输入...">
            <label>弹窗速度 (秒)：</label>
            <input type="number" id="speedInput" value="1.5" step="0.5" min="0.5">
            <div class="btn-group">
                <button class="prev" onclick="nextStep(4)">上一步</button>
                <button onclick="startShow()">开始表白 ✨</button>
            </div>
        </div>
    </section>

    <div id="musicContainer"></div>
</div>

<script>
    // 官方 100+ 祝福语（部分展示，数组可无限扩充）
    const blessings = [
        "遇见你，是我这辈子最美的意外。", "往后余生，风雪是你，平淡是你。", 
        "你是我所有温柔的归宿。", "如果你累了，我的肩膀永远给你靠。",
        "众生皆苦，唯有你是草莓味。", "你出现的那一刻，世界都亮了。",
        "山河远阔，人间烟火，无一是你，无一不是你。", "想和你一起看清晨的日出。",
        "你是我唯一的偏爱。", "我的心里从此住了一个人。"
        // ... 此处可扩展至100条
    ];
    for(let i=11; i<=110; i++) blessings.push(`第${i}份爱：你是人间理想，是我心头的白月光。`);

    function nextStep(step) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
    }

    function changeBg(val) {
        document.getElementById('mainBg').style.background = val;
    }

    function startShow() {
        const myName = document.getElementById('myName').value || "我";
        const targetName = document.getElementById('targetName').value || "你";
        const musicId = document.getElementById('musicSelect').value;
        const radius = document.getElementById('radiusInput').value + "px";
        const speed = document.getElementById('speedInput').value * 1000;
        const msgType = document.getElementById('msgType').value;
        const customMsg = document.getElementById('customMsg').value;

        // 1. 隐藏配置卡片
        document.getElementById('step5').classList.remove('active');

        // 2. 播放音乐 (网易云外链)
        const iframe = document.createElement('iframe');
        iframe.style.display = "none";
        iframe.src = `//music.163.com/outchain/player?type=2&id=${musicId}&auto=1&height=66`;
        document.getElementById('musicContainer').appendChild(iframe);

        // 3. 开始循环弹窗
        setInterval(() => {
            const popup = document.createElement('div');
            popup.className = 'blessing-popup';
            popup.style.borderRadius = radius;
            
            // 随机内容
            let content = "";
            if(msgType === 'custom' && customMsg) {
                content = `${targetName}，${customMsg} —— ${myName}`;
            } else {
                content = blessings[Math.floor(Math.random() * blessings.length)];
            }
            
            popup.innerText = content;

            // 随机位置
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 100);
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            document.body.appendChild(popup);

            // 自动消失
            setTimeout(() => popup.style.opacity = '0', speed * 0.8);
            setTimeout(() => popup.remove(), speed);
        }, 800); // 弹出的频率
    }
</script>

</body>
</html>
