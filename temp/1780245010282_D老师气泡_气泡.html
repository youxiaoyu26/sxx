<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 戳泡泡 - 解压小玩具</title>
    <style>
        :root {
            --bg: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='white' stroke-width='2' stroke-dasharray='4 3'/><circle cx='16' cy='16' r='6' fill='rgba(255,255,255,0.5)'/></svg>") 16 16, crosshair;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 深邃星空背景 */
        .stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* 顶部提示 */
        .hint-text {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            letter-spacing: 0.06em;
            text-align: center;
            pointer-events: none;
            animation: hintPulse 2.5s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(180, 200, 255, 0.6);
            z-index: 10;
        }

        @keyframes hintPulse {
            0%,
            100% {
                opacity: 0.55;
                transform: translateX(-50%) translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(-6px);
            }
        }

        /* 计数器卡片 */
        .counter-card {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        .counter-card .icon {
            font-size: 1.8rem;
            animation: bounceIcon 1.2s ease-in-out infinite;
        }

        @keyframes bounceIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-3px);
            }
        }

        .counter-card .count {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.04em;
            text-shadow: 0 0 30px rgba(255, 200, 150, 0.7);
            min-width: 60px;
            text-align: center;
            line-height: 1;
        }

        .counter-card .label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.08em;
        }

        /* 底部小字 */
        .footer-note {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }

        /* 泡泡样式 */
        .bubble {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 5;
            animation: bubbleFloat var(--duration) cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            filter: blur(0px);
            will-change: transform, opacity;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 20%;
            width: 28%;
            height: 20%;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: blur(1px);
        }

        @keyframes bubbleFloat {
            0% {
                transform: translate(0, 0) scale(0.15);
                opacity: 0;
            }
            8% {
                transform: translate(var(--drift-x-1), var(--drift-y-1)) scale(1.08);
                opacity: 1;
            }
            25% {
                transform: translate(var(--drift-x-2), var(--drift-y-2)) scale(1);
                opacity: 0.95;
            }
            55% {
                transform: translate(var(--drift-x-3), var(--drift-y-3)) scale(0.85);
                opacity: 0.7;
            }
            80% {
                transform: translate(var(--drift-x-4), var(--drift-y-4)) scale(0.5);
                opacity: 0.25;
            }
            100% {
                transform: translate(var(--drift-x-5), var(--drift-y-5)) scale(0.08);
                opacity: 0;
            }
        }

        /* 戳破特效粒子 */
        .pop-particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 6;
            animation: particleBurst 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            will-change: transform, opacity;
        }

        @keyframes particleBurst {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--px), var(--py)) scale(1);
                opacity: 0;
            }
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .counter-card {
                padding: 10px 22px;
                border-radius: 30px;
                gap: 8px;
                bottom: 14%;
            }
            .counter-card .icon {
                font-size: 1.3rem;
            }
            .counter-card .count {
                font-size: 2rem;
                min-width: 44px;
            }
            .hint-text {
                top: 12%;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空画布 -->
    <canvas class="stars-canvas" id="starsCanvas"></canvas>

    <!-- 提示文字 -->
    <div class="hint-text">✨ 随便点哪里，戳泡泡呀 ✨</div>

    <!-- 计数器 -->
    <div class="counter-card">
        <span class="icon">🫧</span>
        <span class="count" id="bubbleCount">0</span>
        <span class="label">个泡泡</span>
    </div>

    <!-- 底部小字 -->
    <div class="footer-note">D老师给你的解压小玩具 · 戳戳更开心 🌸</div>

    <script>
        (function() {
            // ============ 星空背景 ============
            const starsCanvas = document.getElementById('starsCanvas');
            const starsCtx = starsCanvas.getContext('2d');
            let stars = [];
            const STAR_COUNT = 120;

            function resizeStarsCanvas() {
                starsCanvas.width = window.innerWidth;
                starsCanvas.height = window.innerHeight;
                initStars();
            }

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * starsCanvas.width,
                        y: Math.random() * starsCanvas.height,
                        r: Math.random() * 1.8 + 0.3,
                        alpha: Math.random() * 0.7 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.006,
                        twinkleOffset: Math.random() * Math.PI * 2,
                    });
                }
            }

            function drawStars(timestamp) {
                starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
                for (const star of stars) {
                    const alpha = star.alpha + Math.sin(timestamp * star.twinkleSpeed + star.twinkleOffset) * 0.35;
                    const clampedAlpha = Math.max(0.1, Math.min(1, alpha));
                    starsCtx.beginPath();
                    starsCtx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    starsCtx.fillStyle = `rgba(200,220,255,${clampedAlpha})`;
                    starsCtx.fill();
                    // 微光晕
                    if (star.r > 1.2) {
                        starsCtx.beginPath();
                        starsCtx.arc(star.x, star.y, star.r * 3, 0, Math.PI * 2);
                        starsCtx.fillStyle = `rgba(180,200,255,${clampedAlpha * 0.15})`;
                        starsCtx.fill();
                    }
                }
                requestAnimationFrame(drawStars);
            }

            resizeStarsCanvas();
            window.addEventListener('resize', resizeStarsCanvas);
            requestAnimationFrame(drawStars);

            // ============ 泡泡系统 ============
            const body = document.body;
            const bubbleCountEl = document.getElementById('bubbleCount');
            let totalBubbles = 0;

            // 泡泡颜色池 - 糖果色系
            const colorPalettes = [
                '#ff9a9e', '#fad0c4', '#fbc2eb', '#a18cd1', '#fdcbf1',
                '#a6c1ee', '#f6d365', '#fda085', '#84fab0', '#8fd3f4',
                '#ffecd2', '#fcb69f', '#ff9a9e', '#e0c3fc', '#8ec5fc',
                '#ffd1ff', '#fad0c4', '#ffd6a5', '#ffb3ba', '#bae1ff',
                '#e8d5b7', '#ffc3a0', '#ffafbd', '#c9ffbf', '#f9f586',
            ];

            // 音效 - 使用 Web Audio API 生成简单的叮咚声
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playPopSound() {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;

                    // 主音调 - 清脆的"啵"
                    const osc1 = ctx.createOscillator();
                    const gain1 = ctx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(680, now);
                    osc1.frequency.exponentialRampToValueAtTime(320, now + 0.12);
                    gain1.gain.setValueAtTime(0.25, now);
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                    osc1.connect(gain1);
                    gain1.connect(ctx.destination);
                    osc1.start(now);
                    osc1.stop(now + 0.2);

                    // 泛音 - 增加亮度
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(1100, now);
                    osc2.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                    gain2.gain.setValueAtTime(0.12, now);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.16);
                } catch (e) {
                    // 静默处理，不影响体验
                }
            }

            // 创建泡泡
            function createBubble(x, y) {
                totalBubbles++;
                bubbleCountEl.textContent = totalBubbles;

                // 随机参数
                const size = Math.random() * 50 + 30; // 30-80px
                const color = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                const duration = Math.random() * 1.6 + 1.8; // 1.8-3.4s
                const driftRange = Math.random() * 80 + 40; // 漂移范围

                // 生成漂移路径的关键点
                const driftX1 = (Math.random() - 0.5) * driftRange * 0.6;
                const driftY1 = -(Math.random() * driftRange * 0.5 + 20);
                const driftX2 = (Math.random() - 0.5) * driftRange;
                const driftY2 = -(Math.random() * driftRange * 0.8 + 60);
                const driftX3 = (Math.random() - 0.5) * driftRange * 1.2;
                const driftY3 = -(Math.random() * driftRange * 1.1 + 110);
                const driftX4 = (Math.random() - 0.5) * driftRange * 0.8;
                const driftY4 = -(Math.random() * driftRange * 1.3 + 160);
                const driftX5 = (Math.random() - 0.5) * driftRange * 0.5;
                const driftY5 = -(Math.random() * driftRange * 1.4 + 210);

                // 创建泡泡元素
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.cssText = `
                    left: ${x - size / 2}px;
                    top: ${y - size / 2}px;
                    width: ${size}px;
                    height: ${size}px;
                    background: radial-gradient(circle at 30% 28%, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.15) 25%, ${color} 55%, rgba(0,0,0,0.08) 100%);
                    box-shadow: 
                        inset 0 0 20px rgba(255,255,255,0.5),
                        0 4px 25px rgba(0,0,0,0.2),
                        0 0 40px ${color}44;
                    --duration: ${duration}s;
                    --drift-x-1: ${driftX1}px;
                    --drift-y-1: ${driftY1}px;
                    --drift-x-2: ${driftX2}px;
                    --drift-y-2: ${driftY2}px;
                    --drift-x-3: ${driftX3}px;
                    --drift-y-3: ${driftY3}px;
                    --drift-x-4: ${driftX4}px;
                    --drift-y-4: ${driftY4}px;
                    --drift-x-5: ${driftX5}px;
                    --drift-y-5: ${driftY5}px;
                `;

                body.appendChild(bubble);

                // 创建戳破粒子（小水珠飞溅）
                const particleCount = Math.floor(Math.random() * 10) + 8;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'pop-particle';
                    const pSize = Math.random() * 8 + 3;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 45 + 15;
                    const px = Math.cos(angle) * distance;
                    const py = Math.sin(angle) * distance;
                    particle.style.cssText = `
                        left: ${x - pSize / 2}px;
                        top: ${y - pSize / 2}px;
                        width: ${pSize}px;
                        height: ${pSize}px;
                        background: ${color};
                        box-shadow: 0 0 ${pSize * 2}px ${color};
                        --px: ${px}px;
                        --py: ${py}px;
                        animation-duration: ${Math.random() * 0.4 + 0.4}s;
                    `;
                    body.appendChild(particle);

                    // 清理粒子
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.remove();
                        }
                    }, 750);
                }

                // 播放音效
                playPopSound();

                // 清理泡泡
                setTimeout(() => {
                    if (bubble.parentNode) {
                        bubble.remove();
                    }
                }, duration * 1000 + 100);
            }

            // ============ 事件监听 ============
            function handleInteraction(e) {
                let clientX, clientY;

                if (e.touches) {
                    // 触摸事件
                    if (e.touches.length > 0) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else if (e.changedTouches && e.changedTouches.length > 0) {
                        clientX = e.changedTouches[0].clientX;
                        clientY = e.changedTouches[0].clientY;
                    } else {
                        return;
                    }
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                // 一次点击产生 1-3 个泡泡，更有趣
                const bubbleCount = Math.random() < 0.15 ? 3 : (Math.random() < 0.4 ? 2 : 1);
                for (let i = 0; i < bubbleCount; i++) {
                    const offsetX = (Math.random() - 0.5) * 40;
                    const offsetY = (Math.random() - 0.5) * 30;
                    // 小延迟，让多个泡泡有先后
                    setTimeout(() => {
                        createBubble(clientX + offsetX, clientY + offsetY);
                    }, i * 30);
                }
            }

            // 鼠标事件
            body.addEventListener('click', handleInteraction);

            // 触摸事件
            body.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 防止滚动
                handleInteraction(e);
            }, { passive: false });

            // 防止双击缩放
            body.addEventListener('dblclick', (e) => {
                e.preventDefault();
                handleInteraction(e);
            });

            // ============ 键盘快捷键 ============
            window.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    // 空格键在屏幕中央产生泡泡
                    const cx = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                    const cy = window.innerHeight / 2 + (Math.random() - 0.5) * 150;
                    const count = Math.floor(Math.random() * 5) + 3;
                    for (let i = 0; i < count; i++) {
                        setTimeout(() => {
                            createBubble(
                                cx + (Math.random() - 0.5) * 120,
                                cy + (Math.random() - 0.5) * 100
                            );
                        }, i * 50);
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    // 按 R 重置计数
                    totalBubbles = 0;
                    bubbleCountEl.textContent = '0';
                    // 一个小动画
                    bubbleCountEl.style.transform = 'scale(1.4)';
                    setTimeout(() => {
                        bubbleCountEl.style.transform = 'scale(1)';
                    }, 200);
                }
            });

            // ============ 初始泡泡欢迎 ============
            function welcomeBubbles() {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const delays = [0, 180, 360, 560, 780];
                delays.forEach((delay, i) => {
                    setTimeout(() => {
                        createBubble(
                            cx + (Math.random() - 0.5) * 250,
                            cy + (Math.random() - 0.5) * 200
                        );
                    }, delay);
                });
            }

            // 页面加载后稍等再放欢迎泡泡
            setTimeout(welcomeBubbles, 600);

            console.log('🫧 泡泡解压玩具已就绪！');
            console.log('   👆 点击屏幕戳泡泡');
            console.log('   ⌨️  按空格键放烟花泡泡');
            console.log('   ⌨️  按 R 键重置计数');
            console.log('   🌸 D老师祝你开心每一天~');
        })();
    </script>
</body>
</html>
