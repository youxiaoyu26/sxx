<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>给1的信</title><style>body{background:#1a1612;color:#d4b87a;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:serif;}.card{width:85%;max-width:400px;background:#26201a;padding:30px;border-radius:20px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.5);}input{width:100%;padding:12px;margin:10px 0;background:#000;border:1px solid #444;color:#fff;border-radius:10px;}button{background:#d4b87a;border:none;padding:12px 30px;border-radius:20px;cursor:pointer;font-weight:bold;}#txt{display:none;text-align:left;line-height:1.8;white-space:pre-wrap;}</style></head><body><div class="card" id="lock"><h2>🔐 专属锦书</h2><p>请输入名字和密码</p><input id="vN" placeholder="名字"><input type="password" id="vP" placeholder="密码"><button onclick="v()">拆开</button></div><div class="card" id="txt"><h3>致 1:</h3><p>1</p></div><script>function v(){if(document.getElementById('vN').value==='1'&&document.getElementById('vP').value==='1'){document.getElementById('lock').style.display='none';document.getElementById('txt').style.display='block';}else{alert('错误');}}</script></body></html>
