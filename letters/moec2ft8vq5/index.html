<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云中锦书</title>
    <style>
        :root {
            --env-bg: #c5a367;
            --env-front: #d4b87a;
            --paper: #fffef0;
            --text: #3d352b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1612;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "STKaiti", "楷体", serif;
            overflow: hidden;
        }

        /* --- 身份验证界面 --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: #1a1612;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        .auth-card {
            background: #26201a;
            padding: 2.5rem;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #3d352b;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .auth-card h2 { color: #d4b87a; margin-bottom: 20px; letter-spacing: 2px; }

        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #120e0a;
            border: 1px solid #554a3a;
            color: #fff;
            border-radius: 15px;
            text-align: center;
            outline: none;
        }

        .auth-card button {
            background: #d4b87a;
            color: #1a1a1a;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            font-size: 1rem;
        }

        /* --- 3D 信封场景 --- */
        .scene {
            width: 320px;
            height: 220px;
            perspective: 1500px;
            display: none; /* 初始隐藏 */
            cursor: pointer;
        }

        .envelope {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 翻转状态 */
        .envelope.is-flipped { transform: rotateY(180deg); }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 信封背面（第一眼看到的） */
        .back {
            background: var(--env-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .back::after {
            content: "✉️";
            font-size: 3rem;
            opacity: 0.3;
        }

        /* 信封正面 */
        .front {
            background: var(--env-front);
            transform: rotateY(180deg);
        }

        /* 信封盖子 */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 110px solid #b69456;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
            z-index: 10;
        }

        /* 火漆印 */
        .seal {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: #8e1a1a;
            border-radius: 50%;
            z-index: 11;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4b87a;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: opacity 0.3s 0.3s;
        }

        /* 信纸 */
        .paper {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 300px;
            height: 190px;
            background: var(--paper);
            padding: 25px;
            transition: transform 0.8s 0.6s, height 0.8s 0.6s;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow-y: auto;
            color: var(--text);
            line-height: 1.8;
            font-size: 1.05rem;
        }

        /* --- 展开动画激活状态 --- */
        .envelope.is-opened .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope.is-opened .seal {
            opacity: 0;
            pointer-events: none;
        }

        .envelope.is-opened .paper {
            transform: translateY(-150px) scale(1.1);
            height: 380px;
            z-index: 20;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* 提示文字 */
        #hint {
            position: absolute;
            bottom: -80px;
            width: 100%;
            text-align: center;
            color: #d4b87a;
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.6;
            animation: breathe 2s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>🔐 开启锦书</h2>
            <input type="text" id="vName" placeholder="收信人姓名">
            <input type="password" id="vPass" placeholder="查看密码">
            <button onclick="verify()">拆开此封</button>
        </div>
    </div>

    <div class="scene" id="letterScene">
        <div class="envelope" id="envelopeBox" onclick="nextStep()">
            <div class="side back"></div>
            
            <div class="side front">
                <div class="flap"></div>
                <div class="seal">印</div>
                <div class="paper">
                    <div id="letterContent">
                        <strong>展信舒颜：</strong><br><br>
                        见字如晤。<br>
                        这是一封跨越云端而来的锦书。<br><br>
                        （此处为信件正文内容示例）
                    </div>
                </div>
            </div>
        </div>
        <div id="hint">点击信封进行翻转</div>
    </div>

    <script>
        // 假设这些是从云端生成时硬编码进去的数据
        const VALID_NAME = "云中人"; 
        const VALID_PASS = "123456";
        
        let currentState = 0; // 0: 背面, 1: 正面, 2: 拆开

        function verify() {
            const n = document.getElementById('vName').value;
            const p = document.getElementById('vPass').value;

            if (n === VALID_NAME && p === VALID_PASS) {
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('letterScene').style.display = 'block';
                }, 600);
            } else {
                alert("凭证有误，无法拆阅");
            }
        }

        function nextStep() {
            const env = document.getElementById('envelopeBox');
            const hint = document.getElementById('hint');

            if (currentState === 0) {
                // 第一步：反转到正面
                env.classList.add('is-flipped');
                hint.innerText = "再次点击开启信封";
                currentState = 1;
            } else if (currentState === 1) {
                // 第二步：向上拆开并抽信
                env.classList.add('is-opened');
                hint.innerText = "愿你岁岁平安，见字如晤";
                currentState = 2;
            }
        }
    </script>
</body>
</html>
