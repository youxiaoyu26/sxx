<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致 1 的锦书</title>
    <style>
        body { background: #1a1612; color: #d4b87a; font-family: serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { width: 85%; max-width: 450px; background: #251f18; padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #3d3428; }
        h3 { text-align: center; letter-spacing: 0.2em; color: #e6d7b8; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1612; border: 1px solid #4d4335; color: #fff; border-radius: 12px; outline: none; text-align: center; }
        button { width: 100%; background: #c9aa6b; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #msg { display: none; line-height: 2; color: #f7efd6; }
    </style>
</head>
<body>
    <div class="box" id="lock">
        <h3>🔐 锦书待启</h3>
        <p style="text-align:center; font-size:0.9rem; opacity:0.7;">请输入姓名和约定密码</p>
        <input type="text" id="un" placeholder="你的名字">
        <input type="password" id="up" placeholder="输入密码">
        <button onclick="openLetter()">拆开锦书</button>
    </div>
    <div class="box" id="msg">
        <p style="border-bottom: 1px solid #3d3428; padding-bottom: 15px; margin-bottom: 20px; color: #c9aa6b;">致 1：</p>
        <div>行</div>
        <p style="text-align:right; margin-top:30px; font-size:0.8rem; opacity:0.5;">—— 见字如晤</p>
    </div>
    <script>
        function openLetter() {
            const name = document.getElementById('un').value;
            const pass = document.getElementById('up').value;
            if(name === "1" && pass === "1") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('msg').style.display = 'block';
            } else {
                alert('身份验证未通过，请核对后再试');
            }
        }
    </script>
</body>
</html>
