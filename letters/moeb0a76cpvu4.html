<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给 1 的一封信</title>
    <style>
        body { background: #1c1814; color: #e3d5b5; font-family: serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #2a241e; padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1612; border: 1px solid #554a3a; color: #fff; border-radius: 10px; outline: none; }
        button { background: #c9aa6b; color: #1a1a1a; border: none; padding: 12px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #content { display: none; text-align: left; line-height: 2; white-space: pre-line; }
    </style>
</head>
<body>
    <div class="card" id="lock">
        <h3>🔐 专属信件</h3>
        <p>请输入收信人名字和约定密码</p>
        <input type="text" id="vName" placeholder="你的名字">
        <input type="password" id="vPass" placeholder="查看密码">
        <button onclick="verify()">拆开锦书</button>
    </div>
    <div class="card" id="content">
        <p style="border-bottom: 1px solid #554a3a; padding-bottom: 10px; margin-bottom: 20px;">致 1：</p>
        <div>测试</div>
    </div>
    <script>
        function verify() {
            const n = document.getElementById('vName').value;
            const p = document.getElementById('vPass').value;
            if(n === "1" && p === "1111") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert('验证失败，请核对名字和密码');
            }
        }
    </script>
</body>
</html>
