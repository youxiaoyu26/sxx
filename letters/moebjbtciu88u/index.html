<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦书已至</title>
    <style>
        body { background: #1a1612; color: #d4b87a; font-family: serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { width: 85%; max-width: 450px; background: #26201a; padding: 30px; border-radius: 30px; text-align: center; border: 1px solid #3d352b; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #120e0a; border: 1px solid #554a3a; color: #fff; border-radius: 12px; outline: none; box-sizing: border-box; }
        button { background: #c9aa6b; color: #1a1a1a; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #letter { display: none; text-align: left; line-height: 2; white-space: pre-line; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="box" id="lock">
        <h2 style="color:#e6d7b8">🔐 开启锦书</h2>
        <p style="font-size:0.9rem; opacity:0.7">此信件受物理隔离保护，请输入凭证</p>
        <input type="text" id="vN" placeholder="你的称呼">
        <input type="password" id="vP" placeholder="查看密码">
        <button onclick="check()">拆开锦书</button>
        <p id="err" style="color:#e0886e; font-size:0.8rem; margin-top:10px; display:none;">凭证有误，无法开启</p>
    </div>
    <div class="box" id="letter">
        <p style="color:#8e7b5c; border-bottom:1px solid #3d352b; padding-bottom:10px;">致 1：</p>
        <div style="margin-top:20px; color:#f7efd6;">1</div>
        <p style="text-align:right; margin-top:30px; font-size:0.8rem; opacity:0.5;">—— 云中锦书</p>
    </div>
    <script>
        function check() {
            if(document.getElementById('vN').value === "1" && document.getElementById('vP').value === "1") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('letter').style.display = 'block';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }
    </script>
</body>
</html>
